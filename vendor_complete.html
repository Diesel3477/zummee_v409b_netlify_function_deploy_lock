<body>
  <div class="wrap">
    <div class="card">
      <h1>Vendor Job Completion</h1>
      <div class="sub">Use this page to mark the assigned maintenance request complete.</div>
      <div class="row">
        <div>
          <label class="label">Work Order ID</label>
          <input id="workOrderId" class="input" readonly />
        </div>
        <div>
          <label class="label">Vendor Email</label>
          <input id="vendorEmail" class="input" readonly />
        </div>
      </div>
      <div style="margin-top:18px">
        <label class="label">Completion Note</label>
        <textarea id="completionNote" class="textarea" placeholder="Optional note for the manager and resident."></textarea>
      </div>
      <div style="margin-top:18px">
        <label class="label">Upload Completion Photos</label>
        <input id="vendorPhotos" class="file-input" type="file" accept="image/*" multiple />
      </div>
      <div class="row" style="margin-top:10px">
        <button id="completeBtn" class="btn">Mark Job Complete</button>
        <button id="reloadBtn" class="btn secondary" type="button">Reload Link Details</button>
      </div>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const workOrderId = params.get('work_order_id') || '';
    const vendorEmail = params.get('vendor_email') || '';
    const token = params.get('token') || '';
    const msgEl = document.getElementById('msg');

    function setMsg(text, ok){
      msgEl.textContent = text;
      msgEl.className = 'msg ' + (ok ? 'ok' : 'err');
    }

    function hydrate(){
      document.getElementById('workOrderId').value = workOrderId;
      document.getElementById('vendorEmail').value = vendorEmail;
    }
    hydrate();

    async function fileToBase64(file){
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('Unable to read selected photo.'));
        reader.readAsDataURL(file);
      });
    }

    async function uploadVendorPhotos(files){
      const uploaded = [];
      for(const file of Array.from(files || [])){
        const dataBase64 = await fileToBase64(file);
        const res = await fetch('https://slcwuuwyrgnmlmxpcaim.supabase.co/functions/v1/upload-work-order-photo', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': (window.SUPABASE_ANON_KEY || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864')
          },
          body: JSON.stringify({
            work_order_id: workOrderId,
            uploader_type: 'vendor',
            uploader_email: vendorEmail,
            token,
            file_name: file.name,
            content_type: file.type || 'image/jpeg',
            data_base64: dataBase64
          })
        });
        const raw = await res.text();
        let parsed = null;
        try{ parsed = raw ? JSON.parse(raw) : null; }catch(_e){ parsed = raw; }
        if(!res.ok){
          throw new Error((parsed && (parsed.error || parsed.message)) || 'Photo upload failed.');
        }
        uploaded.push(parsed);
      }
      return uploaded;
    }

    async function submitComplete(){
      if(!workOrderId || !vendorEmail || !token){
        setMsg('This completion link is missing required information.', false);
        return;
      }
      const note = document.getElementById('completionNote').value.trim();
      try{
        const res = await fetch('https://slcwuuwyrgnmlmxpcaim.supabase.co/functions/v1/complete-vendor-job', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': (window.SUPABASE_ANON_KEY || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864')
          },
          body: JSON.stringify({
            work_order_id: workOrderId,
            vendor_email: vendorEmail,
            token,
            completion_note: note
          })
        });
        const raw = await res.text();
        let data = null;
        try{ data = raw ? JSON.parse(raw) : null; }catch(_e){ data = raw; }
        if(!res.ok){
          throw new Error((data && (data.error || data.message)) || 'Completion request failed.');
        }

        let photoCount = 0;
        const vendorFiles = document.getElementById('vendorPhotos')?.files || [];
        if(vendorFiles.length){
          const uploaded = await uploadVendorPhotos(vendorFiles);
          photoCount = uploaded.length;
        }

        const successText = (data && data.message) || 'Work marked complete.';
        setMsg(photoCount ? `${successText} ${photoCount} completion photo(s) uploaded.` : successText, true);
      }catch(err){
        setMsg(err && err.message ? err.message : 'Completion request failed.', false);
      }
    }

    document.getElementById('completeBtn').addEventListener('click', submitComplete);
    document.getElementById('reloadBtn').addEventListener('click', hydrate);
  </script>
