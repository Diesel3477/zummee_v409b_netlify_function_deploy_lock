    .hidden{display:none}.row{margin-top:16px}.small{font-size:14px;color:var(--muted)}
    @media (max-width:600px){.body{padding:24px 18px}.title{font-size:28px}.actions{flex-direction:column}.btn{width:100%}}

<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <h1>Zummee</h1>
        <p>Management Assistant</p>
      </div>
      <div class="body">
        <div id="screenInitial">
          <div class="title" id="pageTitle">Board Minutes Action</div>
          <div class="muted" id="pageIntro">Preparing your secure board-minutes action...</div>
          <div class="status warn" id="messageBox">Preparing your secure action link...</div>
          <div class="row hidden" id="rejectBox">
            <label for="rejectReason" style="font-weight:700;display:block;margin-bottom:8px;">Optional comments for the manager</label>
            <textarea id="rejectReason" placeholder="Add any comments you want the manager to receive."></textarea>
            <div class="small">Your rejection is already recorded. Sending comments here is optional.</div>
          </div>
          <div class="actions" id="actionRow">
            <button class="btn btn-bad hidden" id="commentBtn" type="button">Email Comments to Manager</button>
            <a class="btn btn-soft" href="https://zummee.net">Open Zummee</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function(){
      var params = new URLSearchParams(window.location.search || "");
      var token = params.get("token") || "";
      var action = String(params.get("action") || "").toLowerCase();
      var pageTitle = document.getElementById("pageTitle");
      var pageIntro = document.getElementById("pageIntro");
      var messageBox = document.getElementById("messageBox");
      var rejectBox = document.getElementById("rejectBox");
      var commentBtn = document.getElementById("commentBtn");
      var rejectReason = document.getElementById("rejectReason");
      var lastResult = null;
      var base = (window.SUPABASE_URL || "https://slcwuuwyrgnmlmxpcaim.supabase.co").replace(/\/$/, "");
      var anon = window.SUPABASE_ANON_KEY || "sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864";

      function setStatus(kind, msg){
        messageBox.className = 'status ' + (kind || 'warn');
        messageBox.textContent = msg;
      }

      async function submit(chosenAction){
        if(!token){ setStatus('bad', 'This action link is missing its token.'); return; }
        setStatus('warn', chosenAction === 'approve' ? 'Submitting approval...' : 'Submitting rejection...');
        try{
          var res = await fetch(base + '/functions/v1/board-minutes-email-action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': anon },
            body: JSON.stringify({ token: token, action: chosenAction })
          });
          var raw = await res.text();
          var obj = null;
          try{ obj = raw ? JSON.parse(raw) : null; }catch(_e){ obj = raw; }
          if(!res.ok) throw new Error((obj && (obj.error || obj.message)) || 'Action failed.');
          lastResult = obj || null;
          var label = chosenAction === 'approve' ? 'approved' : 'rejected';
          pageTitle.textContent = chosenAction === 'approve' ? 'Minutes Approved' : 'Minutes Rejected';
          pageIntro.textContent = 'Thank you. Your response has been recorded.';
          setStatus(chosenAction === 'approve' ? 'ok' : 'bad', 'These minutes were successfully ' + label + '.');
          if(chosenAction === 'reject'){
            rejectBox.classList.remove('hidden');
            if(commentBtn) commentBtn.classList.remove('hidden');
            if(commentBtn){
              commentBtn.onclick = function(){
                var managerEmail = lastResult && lastResult.manager_email ? String(lastResult.manager_email) : '';
                if(!managerEmail){
                  setStatus('warn', 'Your rejection was recorded. Manager email was not available for comments.');
                  return;
                }
                var managerName = lastResult && lastResult.manager_name ? String(lastResult.manager_name) : 'Manager';
                var communityName = lastResult && lastResult.community_name ? String(lastResult.community_name) : 'your community';
                var meetingDate = lastResult && lastResult.meeting_date ? String(lastResult.meeting_date) : 'this meeting';
                var senderName = lastResult && lastResult.recipient_name ? String(lastResult.recipient_name) : 'Board Member';
                var comment = String(rejectReason.value || '').trim();
                var subject = 'Board Minutes Rejection Comments – ' + communityName;
                var body = 'Hello ' + managerName + ',\n\n' +
                  'I rejected the board meeting minutes for ' + communityName + ' (' + meetingDate + ').\n\n' +
                  'Comments:\n' + (comment || '[No additional comments provided]') + '\n\n' +
                  'Thank you,\n' + senderName;
                window.location.href = 'mailto:' + encodeURIComponent(managerEmail) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
              };
            }
          } else {
            rejectBox.classList.add('hidden');
            if(commentBtn) commentBtn.classList.add('hidden');
          }
        }catch(err){
          setStatus('bad', (err && err.message) ? err.message : 'Action failed.');
          rejectBox.classList.add('hidden');
          if(commentBtn) commentBtn.classList.add('hidden');
        }
      }

      if(!token){
        pageTitle.textContent = 'Invalid Link';
        pageIntro.textContent = 'This minutes action link is incomplete.';
        setStatus('bad', 'Missing token. Please use the original email link.');
        return;
      }
      if(action === 'approve'){
        pageTitle.textContent = 'Approving Minutes';
        pageIntro.textContent = 'Please wait while we record your approval.';
        setStatus('warn', 'Submitting approval...');
        submit('approve');
      } else if(action === 'reject'){
        pageTitle.textContent = 'Rejecting Minutes';
        pageIntro.textContent = 'Please wait while we record your rejection.';
        setStatus('warn', 'Submitting rejection...');
        submit('reject');
      } else {
        pageTitle.textContent = 'Invalid Action';
        pageIntro.textContent = 'This email link does not specify a valid action.';
        setStatus('bad', 'Unsupported action. Please use the original email link.');
      }
    })();
  </script>
