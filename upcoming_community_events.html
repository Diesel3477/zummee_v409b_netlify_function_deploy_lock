<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Community Events</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase-client.js?v=2026-04-26-200"></script>
  <script src="shared/resident-auth.js?v=2026-04-26-200"></script>
  <script src="company_logo_sync.js?v=2026-04-26-200"></script>
  
  <script>
    (function(){
      try{
        var t = localStorage.getItem('mh2-theme') || localStorage.getItem('zummee-theme') || (localStorage.getItem('zummee_dark_mode') === 'true' ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      }catch(_e){ document.documentElement.setAttribute('data-theme','light'); }
    })();
  </script>
  <link rel="stylesheet" href="dark-mode.css?v=2026-04-27-v266">
  <style>
    :root{--blue:#12324d;--line:#9bc9ff;--muted:#5f7288;--bg:#eef5fb;--ok:#166534;--warn:#8a5b00}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f1f7ff 0%,#edf5fd 55%,#f8fbff 100%);color:var(--blue)}.shell{max-width:1080px;margin:0 auto;padding:24px 18px 50px}.hero,.panel{background:rgba(255,255,255,.97);border:2px solid var(--line);border-radius:30px;box-shadow:0 18px 46px rgba(18,50,77,.10)}.hero{padding:22px 26px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:18px}.kicker{font-size:12px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#6c7f94}.hero h1{margin:4px 0 0;font-size:32px;line-height:1.03;letter-spacing:-.04em}.heroRight{display:flex;flex-direction:column;align-items:flex-end;gap:10px}.logo{height:52px;max-width:210px;object-fit:contain;display:none}.logo.is-visible{display:block}.btn{border:2px solid var(--line);background:#fff;color:var(--blue);border-radius:16px;padding:11px 15px;font-weight:950;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.panel{margin-top:20px;padding:22px}.panelHead{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}.panel h2{margin:0;font-size:26px;letter-spacing:-.04em}.sub{margin:7px 0 0;color:var(--muted);font-size:15px;line-height:1.4}.status{margin-top:12px;color:var(--muted);font-weight:850}.status.bad{color:#991b1b}.eventGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.eventCard{background:#fff;border:2px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 10px 24px rgba(18,50,77,.06)}.eventTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.dateBox{width:68px;min-width:68px;height:68px;border-radius:20px;background:#eef6ff;border:1px solid rgba(59,130,246,.18);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:950}.dateBox span:first-child{font-size:12px;color:#1d4ed8;text-transform:uppercase}.dateBox span:last-child{font-size:24px}.eventTitle{font-size:21px;font-weight:950;letter-spacing:-.03em;margin:0}.meta{color:var(--muted);font-size:13px;font-weight:800;margin-top:5px}.desc{margin-top:12px;color:#2c4660;line-height:1.42}.flyer{margin-top:14px;border:1px solid rgba(18,50,77,.12);border-radius:18px;overflow:hidden;background:#f8fbff}.flyer img{display:block;width:100%;max-height:260px;object-fit:cover}.flyerPdf{padding:18px;font-weight:950;color:#365b80}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.rsvpBox{margin-top:14px;padding:12px;border-radius:18px;background:#f8fbff;border:1px solid rgba(18,50,77,.10)}.rsvpTitle{font-weight:950;margin-bottom:10px}.rsvpChoices{display:flex;gap:8px;flex-wrap:wrap}.rsvpChoices .btn{padding:9px 12px;border-radius:999px}.rsvpMsg{font-size:13px;color:var(--ok);font-weight:850;margin-top:8px}.empty{border:2px dashed rgba(59,130,246,.28);border-radius:22px;padding:22px;color:var(--muted);font-weight:850;background:#fbfdff;margin-top:18px}.adminNote{display:none;margin-top:12px;border-radius:18px;background:#fff8e6;border:1px solid rgba(180,120,0,.18);color:#725000;padding:12px;font-weight:850}@media(max-width:820px){.eventGrid{grid-template-columns:1fr}.hero{grid-template-columns:1fr auto;padding:20px}.hero h1{font-size:28px}.logo{height:44px;max-width:170px}.panel{padding:18px;border-radius:24px}.shell{padding:18px 14px 42px}}@media(max-width:560px){.hero{grid-template-columns:1fr}.heroRight{align-items:flex-start}.eventTop{flex-direction:column}.dateBox{width:62px;height:62px;min-width:62px}}
  </style>
<style id="zummee-global-hero-header-refactor">
/* v224: safe header refactor - stack contextual actions under the wired logo */
.heroRight{display:flex !important;flex-direction:column !important;align-items:flex-end !important;justify-content:flex-start !important;gap:10px !important;}
.heroRight img,.heroRight .logo,.heroRight .heroLogo{margin:0 !important;}
.heroRight .btn,.heroRight button,.heroRight a{align-self:flex-end !important;}
@media(max-width:800px){.heroRight{width:100% !important;align-items:flex-end !important;}}
</style>

</head>
<body>
  <main class="shell">
    <section class="hero">
      <div><div class="kicker" id="communityName">Community</div><h1>Upcoming Community Events</h1></div>
      <div class="heroRight"><img id="pageCompanyLogo" class="logo" alt="Company logo"><button class="btn" type="button" onclick="return goBackToCommunityExperience()">Back</button></div>
    </section>
    <section class="panel">
      <div class="panelHead"><div><h2>Approved Events</h2><p class="sub">Board-approved community events, flyers, and RSVP options.</p></div><button class="btn" id="refreshBtn" type="button">Refresh</button></div>
      <div id="eventStatus" class="status"></div>
      <div id="eventGrid" class="eventGrid"></div>
    </section>
  </main>
<script>
const $=id=>document.getElementById(id);const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function getClient(){if(window.ensureSupabase)return await window.ensureSupabase();return window.supabaseClient||window.sb||null}let ctx={communityId:'',communityName:'Your Community',companyId:'',residentId:'',residentName:'Resident',residentEmail:''};
function getLS(keys){for(const k of keys){const v=localStorage.getItem(k);if(v)return v}return''}
async function loadContext(){try{if(window.ZummeeResidentAuth){const res=await window.ZummeeResidentAuth.requireResident({redirect:false});if(res&&res.ctx&&res.ctx.resident){const r=res.ctx.resident;ctx.residentId=r.id||r.resident_id||'';ctx.residentName=r.name||r.resident_name||r.full_name||'Resident';ctx.residentEmail=r.email||r.resident_email||'';ctx.communityId=r.community_id||r.communityId||'';ctx.communityName=r.community_name||r.community||r.communityName||ctx.communityName;ctx.companyId=r.company_id||''}}}catch(e){}
ctx.communityId=ctx.communityId||getLS(['zummee_selected_community_id','activeCommunityId','currentCommunityId','zummee_community_id']);ctx.communityName=ctx.communityName||getLS(['currentCommunityName','zummeeCurrentCommunityName','selectedCommunityName','zummee_community'])||'Your Community';ctx.companyId=ctx.companyId||getLS(['zummee_company_id','company_id','activeCompanyId']);ctx.residentEmail=ctx.residentEmail||getLS(['resident_email','zummee_user_email']);ctx.residentName=ctx.residentName||getLS(['resident_name','zummee_user_name'])||'Resident';$('communityName').textContent=ctx.communityName;await loadLogo();await loadEvents()}
async function loadLogo(){try{const sb=await getClient();if(!sb||!ctx.companyId)return;const r=await sb.from('companies').select('logo_path,company_logo_url').eq('id',ctx.companyId).maybeSingle();const path=r?.data?.company_logo_url||r?.data?.logo_path;if(path){const url=/^https?:\/\//i.test(path)?path:sb.storage.from('company_logos').getPublicUrl(path).data.publicUrl;const img=$('pageCompanyLogo');img.src=url;img.classList.add('is-visible');img.style.display='block'}}catch(e){}}
function flyerUrl(row){const sb=window.supabaseClient||window.sb;if(row.flyer_url)return row.flyer_url;if(row.flyer_path&&sb){try{return sb.storage.from('community_event_flyers').getPublicUrl(row.flyer_path).data.publicUrl}catch(e){}}return''}
function dateBits(value){const d=value?new Date(value):null;if(!d||isNaN(d))return['TBD',''];return [d.toLocaleString(undefined,{month:'short'}),String(d.getDate()),d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})]}
async function loadEvents(){const sb=await getClient();const grid=$('eventGrid');if(!sb){$('eventStatus').textContent='Events are still loading.';return}try{$('eventStatus').textContent='Loading approved events…';let q=sb.from('community_events').select('*').eq('status','approved').order('event_date',{ascending:true,nullsFirst:false});if(ctx.communityId)q=q.eq('community_id',ctx.communityId);else if(ctx.communityName)q=q.eq('community_name',ctx.communityName);const r=await q;if(r.error)throw r.error;const rows=r.data||[];grid.innerHTML=rows.length?rows.map(renderEvent).join(''):'<div class="empty">No approved community events are posted yet.</div>';$('eventStatus').textContent=rows.length?`${rows.length} approved event${rows.length===1?'':'s'} posted.`:'';await loadMyRsvps(rows.map(x=>x.id).filter(Boolean))}catch(e){console.error(e);grid.innerHTML='';$('eventStatus').textContent='Could not load events. Run COMMUNITY_EVENTS_APPROVAL_RSVP_SETUP.sql if needed.';$('eventStatus').className='status bad'}}
function renderEvent(row){const [mon,day,full]=dateBits(row.event_date);const url=flyerUrl(row);const isPdf=/\.pdf($|\?)/i.test(url||row.flyer_path||'');return `<article class="eventCard" data-event-id="${esc(row.id)}"><div class="eventTop"><div><h3 class="eventTitle">${esc(row.title||'Community Event')}</h3><div class="meta">${esc(full||'Date/time to be announced')}${row.event_location?' • '+esc(row.event_location):''}</div></div><div class="dateBox"><span>${esc(mon)}</span><span>${esc(day)}</span></div></div>${row.description?`<div class="desc">${esc(row.description)}</div>`:''}${url?`<div class="flyer">${isPdf?`<div class="flyerPdf">PDF flyer attached</div>`:`<img src="${esc(url)}" alt="${esc(row.title||'Event flyer')} flyer">`}</div><div class="actions"><a class="btn primary" href="${esc(url)}" target="_blank" rel="noopener">View Flyer</a></div>`:''}${row.requires_rsvp?`<div class="rsvpBox"><div class="rsvpTitle">RSVP</div><div class="rsvpChoices"><button class="btn" data-rsvp="yes" data-event="${esc(row.id)}">Yes</button><button class="btn" data-rsvp="maybe" data-event="${esc(row.id)}">Maybe</button><button class="btn" data-rsvp="no" data-event="${esc(row.id)}">No</button></div><div class="rsvpMsg" id="rsvp_${esc(row.id)}"></div></div>`:''}</article>`}
async function loadMyRsvps(ids){if(!ids.length||!ctx.residentEmail)return;try{const sb=await getClient();const r=await sb.from('community_event_rsvps').select('event_id,response').in('event_id',ids).eq('resident_email',ctx.residentEmail);(r.data||[]).forEach(x=>{const el=$('rsvp_'+x.event_id);if(el)el.textContent='Your RSVP: '+String(x.response||'').toUpperCase()})}catch(e){}}
async function submitRsvp(eventId,response){const sb=await getClient();if(!sb||!eventId)return;const payload={event_id:eventId,resident_id:ctx.residentId||null,resident_name:ctx.residentName||'Resident',resident_email:ctx.residentEmail||('resident-'+Date.now()+'@zummee.local'),response,updated_at:new Date().toISOString()};try{let r=await sb.from('community_event_rsvps').upsert(payload,{onConflict:'event_id,resident_email'});if(r.error)throw r.error;const el=$('rsvp_'+eventId);if(el)el.textContent='Your RSVP: '+response.toUpperCase()}catch(e){console.error(e);const el=$('rsvp_'+eventId);if(el){el.style.color='#991b1b';el.textContent='Could not save RSVP yet.'}}}
function goBackToCommunityExperience(){window.location.href='community_experience.html?preview=manager';return false;}
document.addEventListener('click',e=>{const b=e.target.closest('[data-rsvp]');if(b){e.preventDefault();submitRsvp(b.getAttribute('data-event'),b.getAttribute('data-rsvp'))}});$('refreshBtn').addEventListener('click',loadEvents);loadContext();
</script>

  <script src="shared/dark-mode.js?v=2026-04-27-v266"></script>
</body>
</html>
