<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Board Member Hub</title>
<style id="board-hub-annual-approval-requests-v700-style">
  .bhAnnualApprovalWrap {
    margin: 22px auto;
    width: min(1120px, calc(100% - 36px));
    border: 2px solid rgba(141, 188, 247, 0.7);
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,251,255,.96));
    box-shadow: 0 18px 44px rgba(16, 47, 79, 0.12);
    padding: 22px;
  }
  .bhAnnualApprovalHead {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    margin-bottom:16px;
  }
  .bhAnnualApprovalKicker {
    color:#2f5b8f;
    font-size:11px;
    font-weight:900;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin-bottom:7px;
  }
  .bhAnnualApprovalTitle {
    margin:0;
    color:#143453;
    font-size:24px;
    line-height:1.08;
    letter-spacing:-.02em;
  }
  .bhAnnualApprovalSub {
    margin:8px 0 0;
    color:#63788d;
    font-size:14px;
    line-height:1.45;
    max-width:760px;
  }
  .bhAnnualApprovalBadge {
    min-height:38px;
    border-radius:999px;
    padding:0 14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:900;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:#2f5b8f;
    background:#f5f9ff;
    border:1px solid #cfe0f3;
    white-space:nowrap;
  }
  .bhAnnualApprovalList {
    display:grid;
    gap:14px;
  }
  .bhAnnualApprovalCard {
    border:1px solid rgba(123,164,211,.38);
    border-radius:22px;
    background:#fff;
    padding:18px;
    box-shadow:0 12px 28px rgba(16,47,79,.08);
  }
  .bhAnnualApprovalCardTop {
    display:flex;
    justify-content:space-between;
    gap:14px;
    align-items:flex-start;
    margin-bottom:14px;
  }
  .bhAnnualApprovalCardTitle {
    color:#143453;
    font-size:20px;
    line-height:1.15;
    margin:0;
    font-weight:900;
  }
  .bhAnnualApprovalMeta {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .bhAnnualApprovalPill {
    border:1px solid #d8e6f4;
    background:#f8fbff;
    color:#24415f;
    border-radius:999px;
    padding:8px 11px;
    font-size:12px;
    font-weight:900;
  }
  .bhAnnualApprovalPill.pending {
    border-color:#ead38f;
    background:#fff9eb;
    color:#9a6700;
  }
  .bhAnnualApprovalNote {
    color:#5f748a;
    line-height:1.45;
    font-size:14px;
    margin:10px 0 0;
  }
  .bhAnnualApprovalActions {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-end;
    align-items:center;
    margin-top:16px;
  }
  .bhAnnualApprovalBtn {
    appearance:none;
    border:2px solid #cfe0f3;
    background:#fff;
    color:#143453;
    border-radius:999px;
    min-height:44px;
    padding:0 16px;
    font-weight:900;
    cursor:pointer;
    font-size:13px;
  }
  .bhAnnualApprovalBtn.primary {
    background:#2f5b8f;
    border-color:#2f5b8f;
    color:#fff;
    box-shadow:0 12px 24px rgba(47,91,143,.20);
  }
  .bhAnnualApprovalBtn.danger {
    border-color:#f0c2c2;
    color:#9f2f2f;
  }
  .bhAnnualApprovalBtn:disabled {
    opacity:.65;
    cursor:wait;
  }
  .bhAnnualApprovalEmpty,
  .bhAnnualApprovalError {
    border:1px dashed #cbdced;
    background:#f8fbff;
    color:#5f748a;
    border-radius:18px;
    padding:16px;
    font-weight:800;
  }
  .bhAnnualApprovalError {
    background:#fff5f5;
    border-color:#f0c2c2;
    color:#9f2f2f;
  }
  .bhAnnualApprovalRejectBox {
    margin-top:12px;
    display:none;
  }
  .bhAnnualApprovalRejectBox.is-open {
    display:block;
  }
  .bhAnnualApprovalTextarea {
    width:100%;
    min-height:78px;
    box-sizing:border-box;
    border-radius:16px;
    border:1px solid rgba(46,91,143,.24);
    background:#fff;
    color:#143453;
    padding:12px 14px;
    font-weight:800;
    font-size:14px;
    outline:none;
    resize:vertical;
  }
  @media (max-width: 760px) {
    .bhAnnualApprovalWrap {
      width: calc(100% - 24px);
      padding:18px;
      border-radius:24px;
    }
    .bhAnnualApprovalHead,
    .bhAnnualApprovalCardTop {
      flex-direction:column;
    }
    .bhAnnualApprovalActions {
      justify-content:flex-start;
    }
  }
</style>

</head>
<body>
<script>
  (function(){
    var target = 'board_member_hub_v2.html' + (window.location.search || '');
    window.location.replace(target);
  })();
</script>

<script id="board-hub-annual-approval-requests-v700">
/*
  Board Member Hub v700 — Annual Meeting Approval Requests

  Scope:
  - Read annual_meeting_approval_requests.
  - Show only requests where current_step = pending_board.
  - Board approve/reject.
  - Advance route:
      board_then_supervisor -> pending_supervisor
      board_only -> pending_admin_mailing
      supervisor_then_board -> pending_admin_mailing
  - Does not touch Manager Hub or Annual Meetings page.
*/
(function(){
  if(window.__BoardHubAnnualApprovalsV700) return;
  window.__BoardHubAnnualApprovalsV700 = true;

  const SUPABASE_URL = 'https://slcwuuwyrgnmlmxpcaim.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DqOtjzILWph7-bFjKIFN0w_kSpPI864';

  let lastRows = [];
  let loading = false;

  function s(v){ return String(v == null ? '' : v).trim(); }
  function el(id){ return document.getElementById(id); }
  function esc(v){ return s(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
  function uuidish(v){ return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s(v)); }

  function formatDate(v){
    v = s(v).slice(0,10);
    if(!v) return '—';
    const d = new Date(v + 'T00:00:00');
    if(Number.isNaN(d.getTime())) return v;
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  function client(){
    try{ if(window.supabaseClient && window.supabaseClient.from) return window.supabaseClient; }catch(_e){}
    try{ if(window.sb && window.sb.from) return window.sb; }catch(_e){}
    try{ if(window.getSupabase && typeof window.getSupabase === 'function'){ const c = window.getSupabase(); if(c && c.from) return c; }}catch(_e2){}
    try{
      if(window.supabase && window.supabase.createClient){
        if(!window.__BoardHubAnnualApprovalsSbV700){
          window.__BoardHubAnnualApprovalsSbV700 = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }
        return window.__BoardHubAnnualApprovalsSbV700;
      }
    }catch(_e3){}
    return null;
  }

  function activeCommunity(){
    try{
      if(window.ZummeeCommunityState && typeof window.ZummeeCommunityState.getActiveCommunity === 'function'){
        const active = window.ZummeeCommunityState.getActiveCommunity();
        if(active && active.id) return { id:s(active.id), name:s(active.name) };
      }
    }catch(_e){}

    const selectors = [
      '#boardCommunitySelect',
      '#communitySelect',
      '#zummeeCommunitySelect',
      'select[data-community-select]',
      'select[name="community"]'
    ];
    for(const sel of selectors){
      const node = document.querySelector(sel);
      if(node && node.value){
        const opt = node.options && node.selectedIndex >= 0 ? node.options[node.selectedIndex] : null;
        return { id:s(node.value), name:s(opt && opt.textContent) };
      }
    }

    try{
      const raw = localStorage.getItem('zummee_active_community_v601') || sessionStorage.getItem('zummee_active_community_v601') || '';
      const obj = raw ? JSON.parse(raw) : null;
      if(obj && obj.id) return { id:s(obj.id), name:s(obj.name) };
    }catch(_e2){}

    return { id:'', name:'' };
  }

  function currentUser(){
    try{
      const keys = ['zummee_user_id_v1','zummeeUserId','activeUserId','currentUserId'];
      for(const key of keys){
        const v = s(localStorage.getItem(key) || sessionStorage.getItem(key));
        if(v) return v;
      }
    }catch(_e){}
    try{
      if(window.ZummeeAuth && window.ZummeeAuth.currentUser && window.ZummeeAuth.currentUser.id){
        return s(window.ZummeeAuth.currentUser.id);
      }
    }catch(_e2){}
    return '';
  }

  function ensureContainer(){
    let wrap = el('bhAnnualApprovalRequestsV700');
    if(wrap) return wrap;

    wrap = document.createElement('section');
    wrap.id = 'bhAnnualApprovalRequestsV700';
    wrap.className = 'bhAnnualApprovalWrap';
    wrap.innerHTML =
      '<div class="bhAnnualApprovalHead">' +
        '<div>' +
          '<div class="bhAnnualApprovalKicker">Annual Meeting Approvals</div>' +
          '<h2 class="bhAnnualApprovalTitle">Packets awaiting Board approval</h2>' +
          '<p class="bhAnnualApprovalSub">Review annual meeting packets routed to the Board. Approved packets automatically move to the next required step.</p>' +
        '</div>' +
        '<div id="bhAnnualApprovalBadgeV700" class="bhAnnualApprovalBadge">Loading</div>' +
      '</div>' +
      '<div id="bhAnnualApprovalListV700" class="bhAnnualApprovalList">' +
        '<div class="bhAnnualApprovalEmpty">Loading annual meeting approvals…</div>' +
      '</div>';

    const anchors = [
      document.querySelector('#needsAttentionSection'),
      document.querySelector('#boardNeedsAttention'),
      document.querySelector('[data-section="needs-attention"]'),
      document.querySelector('.needs-attention'),
      document.querySelector('main'),
      document.body
    ].filter(Boolean);

    const anchor = anchors[0] || document.body;
    if(anchor === document.body || anchor.tagName === 'MAIN'){
      anchor.insertBefore(wrap, anchor.firstChild || null);
    }else{
      anchor.parentNode.insertBefore(wrap, anchor.nextSibling);
    }
    return wrap;
  }

  async function loadRows(){
    const sb = client();
    const community = activeCommunity();
    const result = {
      ok:false,
      community,
      rows:[],
      error:'',
      source:'annual_meeting_approval_requests',
      loadedAt:Date.now()
    };

    if(!sb){
      result.error = 'Supabase client not ready';
      return result;
    }
    if(!community.id){
      result.error = 'No selected community';
      return result;
    }

    try{
      let query = sb
        .from('annual_meeting_approval_requests')
        .select('*')
        .eq('current_step', 'pending_board')
        .is('archived_at', null)
        .order('updated_at', { ascending:false });

      // Community ID is text in this table, so use string value.
      query = query.eq('community_id', community.id);

      const res = await query;
      if(res && res.error){
        result.error = res.error.message || JSON.stringify(res.error);
        return result;
      }
      result.ok = true;
      result.rows = Array.isArray(res && res.data) ? res.data : [];
      return result;
    }catch(err){
      result.error = err && err.message ? err.message : String(err);
      return result;
    }
  }

  function nextAfterBoard(row){
    const route = s(row && row.approval_route);
    if(route === 'board_then_supervisor'){
      return {
        approval_status:'pending_supervisor',
        current_step:'pending_supervisor'
      };
    }
    if(route === 'board_only' || route === 'supervisor_then_board'){
      return {
        approval_status:'pending_admin_mailing',
        current_step:'pending_admin_mailing',
        admin_ready_at:new Date().toISOString()
      };
    }
    return {
      approval_status:'board_approved',
      current_step:'board_approved'
    };
  }

  function cardHtml(row){
    const id = esc(row.id);
    const routeLabel = esc(row.approval_route_label || row.approval_route || 'Approval Route');
    const association = esc(row.association_legal_name || 'Annual Meeting Packet');
    const meetingDate = esc(formatDate(row.next_annual_meeting_date));
    const note = s(row.approval_note);
    const snapshot = row.packet_preview_snapshot && typeof row.packet_preview_snapshot === 'object' ? row.packet_preview_snapshot : {};
    const communityName = esc((snapshot.community && snapshot.community.name) || activeCommunity().name || row.community_id);

    return '' +
      '<article class="bhAnnualApprovalCard" data-approval-id="' + id + '">' +
        '<div class="bhAnnualApprovalCardTop">' +
          '<div>' +
            '<h3 class="bhAnnualApprovalCardTitle">' + association + '</h3>' +
            '<div class="bhAnnualApprovalMeta">' +
              '<span class="bhAnnualApprovalPill pending">Pending Board</span>' +
              '<span class="bhAnnualApprovalPill">' + routeLabel + '</span>' +
              '<span class="bhAnnualApprovalPill">Meeting: ' + meetingDate + '</span>' +
              '<span class="bhAnnualApprovalPill">' + communityName + '</span>' +
            '</div>' +
            (note ? '<p class="bhAnnualApprovalNote"><strong>Approval note:</strong> ' + esc(note) + '</p>' : '') +
          '</div>' +
        '</div>' +
        '<div class="bhAnnualApprovalRejectBox" id="bhAnnualRejectBox_' + id + '">' +
          '<textarea class="bhAnnualApprovalTextarea" id="bhAnnualRejectNote_' + id + '" placeholder="Add rejection notes for the employee or manager."></textarea>' +
        '</div>' +
        '<div class="bhAnnualApprovalActions">' +
          '<button type="button" class="bhAnnualApprovalBtn danger" data-action="toggle-reject" data-id="' + id + '">Reject</button>' +
          '<button type="button" class="bhAnnualApprovalBtn danger" data-action="confirm-reject" data-id="' + id + '">Submit Rejection</button>' +
          '<button type="button" class="bhAnnualApprovalBtn primary" data-action="approve" data-id="' + id + '">Approve Packet</button>' +
        '</div>' +
      '</article>';
  }

  function render(result){
    ensureContainer();
    const list = el('bhAnnualApprovalListV700');
    const badge = el('bhAnnualApprovalBadgeV700');
    if(!list || !badge) return;

    if(!result.ok){
      badge.textContent = 'Needs setup';
      list.innerHTML = '<div class="bhAnnualApprovalError">' + esc(result.error || 'Could not load annual meeting approvals.') + '</div>';
      return;
    }

    lastRows = result.rows || [];
    badge.textContent = String(lastRows.length) + ' Pending';

    if(!lastRows.length){
      list.innerHTML = '<div class="bhAnnualApprovalEmpty">No annual meeting packets are waiting for Board approval for this community.</div>';
      return;
    }

    list.innerHTML = lastRows.map(cardHtml).join('');
  }

  async function refresh(){
    if(loading) return;
    loading = true;
    try{
      const result = await loadRows();
      window.__BoardHubAnnualApprovalsV700Summary = result;
      render(result);
      return result;
    }finally{
      loading = false;
    }
  }

  function findRow(id){
    return (lastRows || []).find(r => s(r.id) === s(id)) || null;
  }

  function setCardBusy(id, busy){
    const card = document.querySelector('[data-approval-id="' + CSS.escape(id) + '"]');
    if(!card) return;
    card.querySelectorAll('button').forEach(btn => btn.disabled = !!busy);
  }

  async function approve(id){
    const sb = client();
    const row = findRow(id);
    if(!sb || !row) return;
    setCardBusy(id, true);
    try{
      const patch = Object.assign({}, nextAfterBoard(row), {
        board_approved_at:new Date().toISOString(),
        board_approved_by:currentUser() || null,
        board_response_note:null,
        updated_at:new Date().toISOString()
      });

      const res = await sb
        .from('annual_meeting_approval_requests')
        .update(patch)
        .eq('id', id)
        .select('*')
        .maybeSingle();

      if(res && res.error){
        alert('Could not approve packet: ' + (res.error.message || JSON.stringify(res.error)));
        return;
      }
      await refresh();
    }catch(err){
      alert('Could not approve packet. Check console for details.');
      console.error('[Board Hub v700] approve failed', err);
    }finally{
      setCardBusy(id, false);
    }
  }

  async function reject(id){
    const sb = client();
    const row = findRow(id);
    if(!sb || !row) return;
    const noteNode = el('bhAnnualRejectNote_' + id);
    const note = s(noteNode && noteNode.value);
    if(!note){
      alert('Add a rejection note before submitting.');
      return;
    }

    setCardBusy(id, true);
    try{
      const patch = {
        approval_status:'board_rejected',
        current_step:'board_rejected',
        board_rejected_at:new Date().toISOString(),
        board_rejected_by:currentUser() || null,
        board_response_note:note,
        updated_at:new Date().toISOString()
      };

      const res = await sb
        .from('annual_meeting_approval_requests')
        .update(patch)
        .eq('id', id)
        .select('*')
        .maybeSingle();

      if(res && res.error){
        alert('Could not reject packet: ' + (res.error.message || JSON.stringify(res.error)));
        return;
      }
      await refresh();
    }catch(err){
      alert('Could not reject packet. Check console for details.');
      console.error('[Board Hub v700] reject failed', err);
    }finally{
      setCardBusy(id, false);
    }
  }

  function bindActions(){
    document.addEventListener('click', function(e){
      const btn = e.target && e.target.closest ? e.target.closest('[data-action][data-id]') : null;
      if(!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if(!id) return;

      if(action === 'toggle-reject'){
        e.preventDefault();
        const box = el('bhAnnualRejectBox_' + id);
        if(box) box.classList.toggle('is-open');
        return;
      }
      if(action === 'approve'){
        e.preventDefault();
        approve(id);
        return;
      }
      if(action === 'confirm-reject'){
        e.preventDefault();
        reject(id);
        return;
      }
    }, true);
  }

  window.refreshBoardHubAnnualApprovalRequests = refresh;
  window.getBoardHubAnnualApprovalRequestsStatus = function(){
    return {
      installed:!!window.__BoardHubAnnualApprovalsV700,
      summary:window.__BoardHubAnnualApprovalsV700Summary || null,
      cardCount:document.querySelectorAll('[data-approval-id]').length,
      containerExists:!!el('bhAnnualApprovalRequestsV700'),
      community:activeCommunity()
    };
  };

  function boot(){
    ensureContainer();
    bindActions();
    refresh();
    setTimeout(refresh, 1200);
    setTimeout(refresh, 3500);
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot, { once:true });
  }else{
    boot();
  }
  window.addEventListener('pageshow', function(){ setTimeout(refresh, 200); });
  window.addEventListener('focus', function(){ setTimeout(refresh, 200); });
  window.addEventListener('zummee:community-changed', function(){ setTimeout(refresh, 250); });
  document.addEventListener('change', function(e){
    const target = e && e.target;
    if(target && target.matches && target.matches('#boardCommunitySelect, #communitySelect, #zummeeCommunitySelect, select[data-community-select], select[name="community"]')){
      setTimeout(refresh, 250);
    }
  }, true);
})();
</script>

</body>
</html>
