<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Board Member Hub</title>




<style id="board-hub-annual-approval-requests-v703-style">
  .bhAnnualApprovalWrap {
    margin: 22px auto;
    width: min(1120px, calc(100% - 36px));
    border: 2px solid rgba(141, 188, 247, 0.7);
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,251,255,.96));
    box-shadow: 0 18px 44px rgba(16, 47, 79, 0.12);
    padding: 22px;
  }
  .bhAnnualApprovalHead { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; }
  .bhAnnualApprovalKicker { color:#2f5b8f; font-size:11px; font-weight:900; letter-spacing:.14em; text-transform:uppercase; margin-bottom:7px; }
  .bhAnnualApprovalTitle { margin:0; color:#143453; font-size:24px; line-height:1.08; letter-spacing:-.02em; }
  .bhAnnualApprovalSub { margin:8px 0 0; color:#63788d; font-size:14px; line-height:1.45; max-width:760px; }
  .bhAnnualApprovalBadge {
    min-height:38px; border-radius:999px; padding:0 14px; display:inline-flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; color:#2f5b8f;
    background:#f5f9ff; border:1px solid #cfe0f3; white-space:nowrap;
  }
  .bhAnnualApprovalList { display:grid; gap:14px; }
  .bhAnnualApprovalCard {
    border:1px solid rgba(123,164,211,.38); border-radius:22px; background:#fff; padding:18px;
    box-shadow:0 12px 28px rgba(16,47,79,.08);
  }
  .bhAnnualApprovalCardTop { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin-bottom:14px; }
  .bhAnnualApprovalCardTitle { color:#143453; font-size:20px; line-height:1.15; margin:0; font-weight:900; }
  .bhAnnualApprovalMeta { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .bhAnnualApprovalPill {
    border:1px solid #d8e6f4; background:#f8fbff; color:#24415f; border-radius:999px; padding:8px 11px;
    font-size:12px; font-weight:900;
  }
  .bhAnnualApprovalPill.pending { border-color:#ead38f; background:#fff9eb; color:#9a6700; }
  .bhAnnualApprovalNote { color:#5f748a; line-height:1.45; font-size:14px; margin:10px 0 0; }
  .bhAnnualApprovalActions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; align-items:center; margin-top:16px; }
  .bhAnnualApprovalBtn {
    appearance:none; border:2px solid #cfe0f3; background:#fff; color:#143453; border-radius:999px;
    min-height:44px; padding:0 16px; font-weight:900; cursor:pointer; font-size:13px;
  }
  .bhAnnualApprovalBtn.primary { background:#2f5b8f; border-color:#2f5b8f; color:#fff; box-shadow:0 12px 24px rgba(47,91,143,.20); }
  .bhAnnualApprovalBtn.danger { border-color:#f0c2c2; color:#9f2f2f; }
  .bhAnnualApprovalBtn:disabled { opacity:.65; cursor:wait; }
  .bhAnnualApprovalEmpty, .bhAnnualApprovalError {
    border:1px dashed #cbdced; background:#f8fbff; color:#5f748a; border-radius:18px; padding:16px; font-weight:800;
  }
  .bhAnnualApprovalError { background:#fff5f5; border-color:#f0c2c2; color:#9f2f2f; }
  .bhAnnualApprovalRejectBox { margin-top:12px; display:none; }
  .bhAnnualApprovalRejectBox.is-open { display:block; }
  .bhAnnualApprovalTextarea {
    width:100%; min-height:78px; box-sizing:border-box; border-radius:16px; border:1px solid rgba(46,91,143,.24);
    background:#fff; color:#143453; padding:12px 14px; font-weight:800; font-size:14px; outline:none; resize:vertical;
  }
  @media (max-width:760px) {
    .bhAnnualApprovalWrap { width:calc(100% - 24px); padding:18px; border-radius:24px; }
    .bhAnnualApprovalHead, .bhAnnualApprovalCardTop { flex-direction:column; }
    .bhAnnualApprovalActions { justify-content:flex-start; }
  }
</style>

</head>
<body>
<script>
  (function(){
    var target = 'board_member_hub_v2.html' + (window.location.search || '');
    window.location.replace(target);
  })();
</script>





<script id="board-hub-annual-approval-requests-v703">
/*
  Board Member Hub v703 — Annual Meeting Approval Requests
  Adds direct REST fallback for pages where Supabase client is unavailable.
*/
(function(){
  if(window.__BoardHubAnnualApprovalsV703) return;
  window.__BoardHubAnnualApprovalsV703 = true;

  const SUPABASE_URL = 'https://slcwuuwyrgnmlmxpcaim.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_DqOtjzILWph7-bFjKIFN0w_kSpPI864';
  const SUPABASE_CDN = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';

  let lastRows = [];
  let loading = false;
  let bound = false;
  let clientPromise = null;
  let lastTransport = 'none';

  function s(v){ return String(v == null ? '' : v).trim(); }
  function el(id){ return document.getElementById(id); }
  function esc(v){ return s(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

  function formatDate(v){
    v = s(v).slice(0,10);
    if(!v) return '—';
    const d = new Date(v + 'T00:00:00');
    if(Number.isNaN(d.getTime())) return v;
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  function loadScript(src){
    return new Promise(function(resolve, reject){
      const existing = Array.from(document.scripts).find(sc => sc.src && sc.src.indexOf('@supabase/supabase-js') !== -1);
      if(existing){
        if(window.supabase && window.supabase.createClient) return resolve();
        existing.addEventListener('load', resolve, { once:true });
        existing.addEventListener('error', reject, { once:true });
        return;
      }
      const sc = document.createElement('script');
      sc.src = src;
      sc.async = true;
      sc.onload = resolve;
      sc.onerror = reject;
      document.head.appendChild(sc);
    });
  }

  async function getClient(){
    if(clientPromise) return clientPromise;
    clientPromise = (async function(){
      try{ if(window.supabaseClient && window.supabaseClient.from) return { client:window.supabaseClient, source:'window.supabaseClient' }; }catch(_e){}
      try{ if(window.sb && window.sb.from) return { client:window.sb, source:'window.sb' }; }catch(_e){}
      try{
        if(window.getSupabase && typeof window.getSupabase === 'function'){
          const c = window.getSupabase();
          if(c && c.from) return { client:c, source:'getSupabase()' };
        }
      }catch(_e2){}
      try{
        if(window.supabase && window.supabase.createClient){
          if(!window.__BoardHubAnnualApprovalsSbV703){
            window.__BoardHubAnnualApprovalsSbV703 = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          }
          return { client:window.__BoardHubAnnualApprovalsSbV703, source:'window.supabase.createClient' };
        }
      }catch(_e3){}
      try{
        await loadScript(SUPABASE_CDN);
        if(window.supabase && window.supabase.createClient){
          window.__BoardHubAnnualApprovalsSbV703 = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
          return { client:window.__BoardHubAnnualApprovalsSbV703, source:'dynamic-supabase-js' };
        }
      }catch(err){
        console.warn('[Board Hub v703] supabase-js load failed, REST fallback will be used', err);
      }
      return { client:null, source:'none' };
    })();
    return clientPromise;
  }

  function authTokenFromStorage(){
    const stores = [];
    try{ stores.push(localStorage); }catch(_e){}
    try{ stores.push(sessionStorage); }catch(_e){}
    for(const store of stores){
      for(let i = 0; i < store.length; i++){
        const key = store.key(i);
        if(!key) continue;
        const val = store.getItem(key);
        if(!val) continue;

        // Supabase v2 stores auth sessions as JSON with access_token.
        if(key.indexOf('auth-token') !== -1 || val.indexOf('access_token') !== -1){
          try{
            const obj = JSON.parse(val);
            if(obj && obj.access_token) return obj.access_token;
            if(obj && obj.currentSession && obj.currentSession.access_token) return obj.currentSession.access_token;
            if(obj && obj.session && obj.session.access_token) return obj.session.access_token;
          }catch(_e){}
        }
      }
    }
    return '';
  }

  function restHeaders(){
    const token = authTokenFromStorage();
    return {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + (token || SUPABASE_KEY),
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    };
  }

  function buildQuery(params){
    return Object.keys(params).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k])).join('&');
  }

  async function restSelectPendingBoard(communityId){
    const url = SUPABASE_URL + '/rest/v1/annual_meeting_approval_requests?' + buildQuery({
      select:'*',
      current_step:'eq.pending_board',
      community_id:'eq.' + communityId,
      archived_at:'is.null',
      order:'updated_at.desc'
    });
    const res = await fetch(url, { headers:restHeaders() });
    const text = await res.text();
    if(!res.ok){
      throw new Error('REST select failed ' + res.status + ': ' + text);
    }
    return text ? JSON.parse(text) : [];
  }

  async function restUpdate(id, patch){
    const url = SUPABASE_URL + '/rest/v1/annual_meeting_approval_requests?' + buildQuery({ id:'eq.' + id });
    const res = await fetch(url, {
      method:'PATCH',
      headers:restHeaders(),
      body:JSON.stringify(patch)
    });
    const text = await res.text();
    if(!res.ok){
      throw new Error('REST update failed ' + res.status + ': ' + text);
    }
    const data = text ? JSON.parse(text) : [];
    return Array.isArray(data) ? data[0] : data;
  }

  function activeCommunity(){
    try{
      if(window.ZummeeCommunityState && typeof window.ZummeeCommunityState.getActiveCommunity === 'function'){
        const active = window.ZummeeCommunityState.getActiveCommunity();
        if(active && active.id) return { id:s(active.id), name:s(active.name), source:'ZummeeCommunityState' };
      }
    }catch(_e){}
    const selectors = ['#boardCommunitySelect','#communitySelect','#zummeeCommunitySelect','select[data-community-select]','select[name="community"]'];
    for(const sel of selectors){
      const node = document.querySelector(sel);
      if(node && node.value){
        const opt = node.options && node.selectedIndex >= 0 ? node.options[node.selectedIndex] : null;
        return { id:s(node.value), name:s(opt && opt.textContent), source:sel };
      }
    }
    try{
      const raw = localStorage.getItem('zummee_active_community_v601') || sessionStorage.getItem('zummee_active_community_v601') || '';
      const obj = raw ? JSON.parse(raw) : null;
      if(obj && obj.id) return { id:s(obj.id), name:s(obj.name), source:'storage-v601' };
    }catch(_e2){}
    return { id:'', name:'', source:'none' };
  }

  function currentUser(){
    const token = authTokenFromStorage();
    if(token){
      try{
        const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        if(payload && payload.sub) return String(payload.sub);
      }catch(_e){}
    }
    try{
      const keys = ['zummee_user_id_v1','zummeeUserId','activeUserId','currentUserId'];
      for(const key of keys){
        const v = s(localStorage.getItem(key) || sessionStorage.getItem(key));
        if(v) return v;
      }
    }catch(_e2){}
    return '';
  }

  function ensureContainer(){
    let wrap = el('bhAnnualApprovalRequestsV703') || el('bhAnnualApprovalRequestsV701') || el('bhAnnualApprovalRequestsV700');
    if(wrap){
      wrap.id = 'bhAnnualApprovalRequestsV703';
      return wrap;
    }
    wrap = document.createElement('section');
    wrap.id = 'bhAnnualApprovalRequestsV703';
    wrap.className = 'bhAnnualApprovalWrap';
    wrap.innerHTML =
      '<div class="bhAnnualApprovalHead">' +
        '<div>' +
          '<div class="bhAnnualApprovalKicker">Annual Meeting Approvals</div>' +
          '<h2 class="bhAnnualApprovalTitle">Packets awaiting Board approval</h2>' +
          '<p class="bhAnnualApprovalSub">Review annual meeting packets routed to the Board. Approved packets automatically move to the next required step.</p>' +
        '</div>' +
        '<div id="bhAnnualApprovalBadgeV703" class="bhAnnualApprovalBadge">Loading</div>' +
      '</div>' +
      '<div id="bhAnnualApprovalListV703" class="bhAnnualApprovalList">' +
        '<div class="bhAnnualApprovalEmpty">Loading annual meeting approvals…</div>' +
      '</div>';

    const anchor =
      document.querySelector('#needsAttentionSection') ||
      document.querySelector('#boardNeedsAttention') ||
      document.querySelector('[data-section="needs-attention"]') ||
      document.querySelector('.needs-attention') ||
      document.querySelector('main') ||
      document.body;

    if(anchor === document.body || anchor.tagName === 'MAIN'){
      anchor.insertBefore(wrap, anchor.firstChild || null);
    }else{
      anchor.parentNode.insertBefore(wrap, anchor.nextSibling);
    }
    return wrap;
  }

  async function loadRows(){
    const resolved = await getClient();
    const sb = resolved.client;
    const community = activeCommunity();
    const result = {
      ok:false,
      community,
      clientReady:!!sb,
      clientSource:resolved.source,
      restTokenReady:!!authTokenFromStorage(),
      rows:[],
      error:'',
      source:'annual_meeting_approval_requests',
      transport:'none',
      loadedAt:Date.now()
    };

    if(!community.id){
      result.error = 'No selected community';
      return result;
    }

    if(sb){
      try{
        const res = await sb
          .from('annual_meeting_approval_requests')
          .select('*')
          .eq('current_step', 'pending_board')
          .eq('community_id', community.id)
          .is('archived_at', null)
          .order('updated_at', { ascending:false });

        if(res && !res.error){
          result.ok = true;
          result.rows = Array.isArray(res.data) ? res.data : [];
          result.transport = resolved.source;
          lastTransport = result.transport;
          return result;
        }
        result.error = res && res.error ? (res.error.message || JSON.stringify(res.error)) : '';
      }catch(err){
        result.error = err && err.message ? err.message : String(err);
      }
    }

    // REST fallback.
    try{
      const rows = await restSelectPendingBoard(community.id);
      result.ok = true;
      result.rows = Array.isArray(rows) ? rows : [];
      result.transport = 'direct-rest';
      result.clientReady = !!sb;
      lastTransport = 'direct-rest';
      result.error = '';
      return result;
    }catch(err){
      result.error = (result.error ? result.error + ' | ' : '') + (err && err.message ? err.message : String(err));
      result.transport = 'failed';
      return result;
    }
  }

  function nextAfterBoard(row){
    const route = s(row && row.approval_route);
    if(route === 'board_then_supervisor') return { approval_status:'pending_supervisor', current_step:'pending_supervisor' };
    if(route === 'board_only' || route === 'supervisor_then_board') return { approval_status:'pending_admin_mailing', current_step:'pending_admin_mailing', admin_ready_at:new Date().toISOString() };
    return { approval_status:'board_approved', current_step:'board_approved' };
  }

  function cardHtml(row){
    const id = esc(row.id);
    const routeLabel = esc(row.approval_route_label || row.approval_route || 'Approval Route');
    const association = esc(row.association_legal_name || 'Annual Meeting Packet');
    const meetingDate = esc(formatDate(row.next_annual_meeting_date));
    const note = s(row.approval_note);
    const snapshot = row.packet_preview_snapshot && typeof row.packet_preview_snapshot === 'object' ? row.packet_preview_snapshot : {};
    const communityName = esc((snapshot.community && snapshot.community.name) || activeCommunity().name || row.community_id);
    return '' +
      '<article class="bhAnnualApprovalCard" data-approval-id="' + id + '">' +
        '<div class="bhAnnualApprovalCardTop"><div>' +
          '<h3 class="bhAnnualApprovalCardTitle">' + association + '</h3>' +
          '<div class="bhAnnualApprovalMeta">' +
            '<span class="bhAnnualApprovalPill pending">Pending Board</span>' +
            '<span class="bhAnnualApprovalPill">' + routeLabel + '</span>' +
            '<span class="bhAnnualApprovalPill">Meeting: ' + meetingDate + '</span>' +
            '<span class="bhAnnualApprovalPill">' + communityName + '</span>' +
          '</div>' +
          (note ? '<p class="bhAnnualApprovalNote"><strong>Approval note:</strong> ' + esc(note) + '</p>' : '') +
        '</div></div>' +
        '<div class="bhAnnualApprovalRejectBox" id="bhAnnualRejectBox_' + id + '">' +
          '<textarea class="bhAnnualApprovalTextarea" id="bhAnnualRejectNote_' + id + '" placeholder="Add rejection notes for the employee or manager."></textarea>' +
        '</div>' +
        '<div class="bhAnnualApprovalActions">' +
          '<button type="button" class="bhAnnualApprovalBtn danger" data-action="toggle-reject" data-id="' + id + '">Reject</button>' +
          '<button type="button" class="bhAnnualApprovalBtn danger" data-action="confirm-reject" data-id="' + id + '">Submit Rejection</button>' +
          '<button type="button" class="bhAnnualApprovalBtn primary" data-action="approve" data-id="' + id + '">Approve Packet</button>' +
        '</div>' +
      '</article>';
  }

  function render(result){
    ensureContainer();
    const list = el('bhAnnualApprovalListV703') || el('bhAnnualApprovalListV701') || el('bhAnnualApprovalListV700');
    const badge = el('bhAnnualApprovalBadgeV703') || el('bhAnnualApprovalBadgeV701') || el('bhAnnualApprovalBadgeV700');
    if(!list || !badge) return;

    if(!result.ok){
      badge.textContent = 'Needs Setup';
      list.innerHTML = '<div class="bhAnnualApprovalError">Approval requests could not load. This is usually an RLS policy issue. Details: ' + esc(result.error || 'Could not load annual meeting approvals.') + '</div>';
      return;
    }

    lastRows = result.rows || [];
    badge.textContent = String(lastRows.length) + ' Pending';
    if(!lastRows.length){
      list.innerHTML = '<div class="bhAnnualApprovalEmpty">No annual meeting packets are waiting for Board approval for this community.</div>';
      return;
    }
    list.innerHTML = lastRows.map(cardHtml).join('');
  }

  async function refresh(){
    if(loading) return window.__BoardHubAnnualApprovalsV703Summary || null;
    loading = true;
    try{
      ensureContainer();
      const result = await loadRows();
      window.__BoardHubAnnualApprovalsV703Summary = result;
      render(result);
      return result;
    }finally{
      loading = false;
    }
  }

  function findRow(id){ return (lastRows || []).find(r => s(r.id) === s(id)) || null; }

  function setCardBusy(id, busy){
    const card = document.querySelector('[data-approval-id="' + CSS.escape(id) + '"]');
    if(!card) return;
    card.querySelectorAll('button').forEach(btn => btn.disabled = !!busy);
  }

  async function updateRow(id, patch){
    const resolved = await getClient();
    const sb = resolved.client;

    if(sb && lastTransport !== 'direct-rest'){
      const res = await sb.from('annual_meeting_approval_requests').update(patch).eq('id', id).select('*').maybeSingle();
      if(res && !res.error) return res.data || null;
      console.warn('[Board Hub v703] client update failed; trying REST', res && res.error);
    }
    return await restUpdate(id, patch);
  }

  async function approve(id){
    const row = findRow(id);
    if(!row) return;
    setCardBusy(id, true);
    try{
      const patch = Object.assign({}, nextAfterBoard(row), {
        board_approved_at:new Date().toISOString(),
        board_approved_by:currentUser() || null,
        board_response_note:null,
        updated_at:new Date().toISOString()
      });
      await updateRow(id, patch);
      await refresh();
    }catch(err){
      alert('Could not approve packet: ' + (err && err.message ? err.message : String(err)));
      console.error('[Board Hub v703] approve failed', err);
    }finally{
      setCardBusy(id, false);
    }
  }

  async function reject(id){
    const row = findRow(id);
    if(!row) return;
    const noteNode = el('bhAnnualRejectNote_' + id);
    const note = s(noteNode && noteNode.value);
    if(!note){
      alert('Add a rejection note before submitting.');
      return;
    }
    setCardBusy(id, true);
    try{
      const patch = {
        approval_status:'board_rejected',
        current_step:'board_rejected',
        board_rejected_at:new Date().toISOString(),
        board_rejected_by:currentUser() || null,
        board_response_note:note,
        updated_at:new Date().toISOString()
      };
      await updateRow(id, patch);
      await refresh();
    }catch(err){
      alert('Could not reject packet: ' + (err && err.message ? err.message : String(err)));
      console.error('[Board Hub v703] reject failed', err);
    }finally{
      setCardBusy(id, false);
    }
  }

  function bindActions(){
    if(bound) return;
    bound = true;
    document.addEventListener('click', function(e){
      const btn = e.target && e.target.closest ? e.target.closest('[data-action][data-id]') : null;
      if(!btn) return;
      const action = btn.dataset.action;
      const id = btn.dataset.id;
      if(!id) return;

      if(action === 'toggle-reject'){
        e.preventDefault();
        const box = el('bhAnnualRejectBox_' + id);
        if(box) box.classList.toggle('is-open');
        return;
      }
      if(action === 'approve'){
        e.preventDefault();
        approve(id);
        return;
      }
      if(action === 'confirm-reject'){
        e.preventDefault();
        reject(id);
        return;
      }
    }, true);
  }

  window.refreshBoardHubAnnualApprovalRequests = refresh;
  window.getBoardHubAnnualApprovalRequestsStatus = function(){
    return {
      installed:!!window.__BoardHubAnnualApprovalsV703,
      summary:window.__BoardHubAnnualApprovalsV703Summary || null,
      cardCount:document.querySelectorAll('[data-approval-id]').length,
      containerExists:!!el('bhAnnualApprovalRequestsV703'),
      community:activeCommunity(),
      supabaseGlobal:!!(window.supabase && window.supabase.createClient),
      clientCreated:!!window.__BoardHubAnnualApprovalsSbV703,
      restTokenReady:!!authTokenFromStorage(),
      lastTransport:lastTransport,
      localStorageKeys:(function(){
        try{ return Object.keys(localStorage).filter(k => k.indexOf('supabase') !== -1 || k.indexOf('sb-') !== -1).slice(0,10); }catch(_e){ return []; }
      })()
    };
  };

  function boot(){
    ensureContainer();
    bindActions();
    refresh();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once:true });
  else boot();

  // Stable by default: refresh only when the community dropdown changes or manually via console.
  document.addEventListener('change', function(e){
    const target = e && e.target;
    if(target && target.matches && target.matches('#boardCommunitySelect, #communitySelect, #zummeeCommunitySelect, select[data-community-select], select[name="community"]')){
      setTimeout(refresh, 250);
    }
  }, true);
})();
</script>

</body>
