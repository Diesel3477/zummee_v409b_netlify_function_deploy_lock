<body>
<div class="wrap">
  <div class="card">
    <div class="eyebrow">Annual Meeting Mailing</div>
    <h1>Confirm Items Mailed</h1>
    <p>After the annual meeting packet has been printed and mailed, press the button below to mark the packet mailed in Zummee.</p>
    <button class="btn" id="confirmBtn" type="button">Confirm Mailing Complete</button>
    <div class="status" id="statusText"></div>
  </div>
</div>
<script>
(function(){
  const statusEl = document.getElementById('statusText');
  const btn = document.getElementById('confirmBtn');
  const params = new URLSearchParams(window.location.search || '');
  const requestId = String(params.get('request_id') || '').trim();
  const token = String(params.get('token') || '').trim();
  const DEFAULT_SUPABASE_URL = 'https://slcwuuwyrgnmlmxpcaim.supabase.co';
  const DEFAULT_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsY3d1dXd5cmdubWxteHBjYWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMjI5MTAsImV4cCI6MjA4NDU5ODkxMH0.3pZZLufFv5SUHREjgPys-q8SnYVMzHona-yeXMVHuOg';
  const SUPABASE_URL = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || DEFAULT_SUPABASE_URL;
  const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || localStorage.getItem('SUPABASE_ANON_KEY') || DEFAULT_SUPABASE_ANON_KEY;
  const sb = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase && window.supabase.createClient) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:false } }) : null;

  function archiveMeetingYear(row){
    try{
      var explicitYear = Number(row && row.meeting_year);
      if(Number.isFinite(explicitYear) && explicitYear > 2000) return explicitYear;
    }catch(_eYear){}
    try{
      var payloadDate = String((row && row.packet_payload && (row.packet_payload.nextAnnualMeetingDate || row.packet_payload.meetingDate)) || '').trim();
      if(payloadDate){
        var d = new Date(payloadDate);
        var y = Number(d.getFullYear());
        if(Number.isFinite(y) && y > 2000) return y;
      }
    }catch(_ePayloadYear){}
    try{
      var submitted = new Date(String((row && row.submitted_at) || ''));
      var y2 = Number(submitted.getFullYear());
      if(Number.isFinite(y2) && y2 > 2000) return y2;
    }catch(_eSubmittedYear){}
    return new Date().getFullYear();
  }

  function archivePacketAttachment(row){
    try{
      return (row && row.packet_payload && row.packet_payload.pdf_attachment) ? row.packet_payload.pdf_attachment : null;
    }catch(_e){ return null; }
  }

  function sanitizeStoragePart(value, fallback){
    var s = String(value || '').trim();
    if(!s) return String(fallback || 'item');
    s = s.replace(/[^a-zA-Z0-9._-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    return s || String(fallback || 'item');
  }

  function base64ToUint8Array(b64){
    var clean = String(b64 || '').trim();
    if(!clean) return null;
    clean = clean.replace(/^data:[^;]+;base64,/, '');
    var binary = atob(clean);
    var bytes = new Uint8Array(binary.length);
    for(var i = 0; i < binary.length; i += 1){
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }

  async function uploadArchivePacketToStorage(row, attachment){
    if(!sb || !row || !attachment || !attachment.content) return null;
    try{
      var bucket = 'annual-meeting-packets';
      var meetingYear = archiveMeetingYear(row);
      var communitySlug = sanitizeStoragePart(row.community_name || row.community_id || 'community', 'community');
      var requestSlug = sanitizeStoragePart(row.id || Date.now(), 'request');
      var originalName = sanitizeStoragePart(attachment.filename || ('annual_meeting_packet_' + communitySlug + '_' + meetingYear + '.pdf'), 'packet.pdf');
      if(!/\.(pdf|html?)$/i.test(originalName)){
        originalName += '.pdf';
      }
      var path = [sanitizeStoragePart(row.company_id || 'company', 'company'), communitySlug, String(meetingYear), requestSlug + '__' + originalName].join('/');
      var bytes = base64ToUint8Array(attachment.content);
      if(!bytes) return null;
      var contentType = String(attachment.type || 'application/pdf');
      var up = await sb.storage.from(bucket).upload(path, bytes, { upsert:true, contentType:contentType });
      if(up && up.error) throw up.error;
      var pub = sb.storage.from(bucket).getPublicUrl(path);
      var packetUrl = (((pub || {}).data || {}).publicUrl) ? String(pub.data.publicUrl) : '';
      return { bucket:bucket, path:path, packet_url:packetUrl, content_type:contentType };
    }catch(storageErr){
      try{ console.warn('annual meeting archive storage upload failed', storageErr); }catch(_eWarn){}
      return null;
    }
  }

  async function writeArchiveRecord(row, nowIso){
    if(!sb || !row || !row.id) return { ok:false, reason:'missing_context' };
    var attachment = archivePacketAttachment(row);
    var storageMeta = await uploadArchivePacketToStorage(row, attachment);
    var payload = Object.assign({}, (row.packet_payload || {}));
    if(storageMeta && storageMeta.packet_url && !payload.packet_url){
      payload.packet_url = storageMeta.packet_url;
    }
    var archiveRow = {
      source_request_id: row.id,
      company_id: row.company_id || null,
      community_id: row.community_id || null,
      community_name: row.community_name || null,
      meeting_year: archiveMeetingYear(row),
      meeting_date: (row && row.packet_payload && (row.packet_payload.nextAnnualMeetingDate || row.packet_payload.meetingDate)) || null,
      mailed_at: nowIso,
      mailed_by: 'Assistant Email Confirmation',
      packet_filename: attachment && attachment.filename ? String(attachment.filename) : null,
      packet_content_type: storageMeta && storageMeta.content_type ? String(storageMeta.content_type) : (attachment && attachment.type ? String(attachment.type) : 'application/pdf'),
      packet_base64: attachment && attachment.content ? String(attachment.content) : null,
      packet_url: storageMeta && storageMeta.packet_url ? String(storageMeta.packet_url) : null,
      storage_bucket: storageMeta && storageMeta.bucket ? String(storageMeta.bucket) : null,
      storage_path: storageMeta && storageMeta.path ? String(storageMeta.path) : null,
      preview_html: row.preview_html || null,
      packet_payload: payload,
      archived_from_status: row.status || null,
      employee_user_id: row.employee_user_id || null,
      employee_email: row.employee_email || null,
      employee_name: row.employee_name || null,
      supervisor_user_id: row.supervisor_user_id || null,
      supervisor_name: row.supervisor_name || null,
      created_at: nowIso
    };
    try{
      var existing = await sb.from('annual_meeting_archive').select('id, packet_url, storage_bucket, storage_path').eq('source_request_id', row.id).limit(1).maybeSingle();
      if(existing && existing.data && existing.data.id){
        if((archiveRow.packet_url || archiveRow.storage_bucket || archiveRow.storage_path) && !existing.data.packet_url){
          try{
            await sb.from('annual_meeting_archive').update({
              packet_url: archiveRow.packet_url || null,
              storage_bucket: archiveRow.storage_bucket || null,
              storage_path: archiveRow.storage_path || null,
              packet_content_type: archiveRow.packet_content_type || null,
              packet_filename: archiveRow.packet_filename || null,
              packet_payload: archiveRow.packet_payload || {}
            }).eq('id', existing.data.id);
          }catch(_eUpdateExisting){}
        }
        return { ok:true, existing:true };
      }
    }catch(_eExisting){}
    var ins = await sb.from('annual_meeting_archive').insert([archiveRow]);
    if(ins && ins.error) throw ins.error;
    return { ok:true };
  }

  async function confirmMailing(){
    if(!sb){ statusEl.textContent = 'This confirmation page could not connect to Zummee right now. Please try again.'; return; }
    if(!requestId || !token){ statusEl.textContent = 'Missing mailing confirmation link data.'; return; }
    btn.disabled = true;
    statusEl.textContent = 'Confirming mailing…';
    try{
      const q = await sb.from('annual_meeting_packet_requests').select('*').eq('id', requestId).maybeSingle();
      if(q && q.error) throw q.error;
      const row = q && q.data ? q.data : null;
      if(!row) throw new Error('Packet request not found.');
      if(String(row.status || '').toLowerCase() === 'mailed'){
        statusEl.textContent = 'This packet was already marked mailed. Thank you.';
        btn.disabled = true;
        btn.textContent = 'Mailing Already Confirmed';
        return;
      }
      if(String(row.mailing_confirm_token || '') !== token) throw new Error('This mailing confirmation link is invalid or expired.');
      const nowIso = new Date().toISOString();
      let upd = await sb.from('annual_meeting_packet_requests').update({ status:'mailed', mailing_confirmed_at:nowIso, mailed_at:nowIso, mailed_by:'Assistant Email Confirmation' }).eq('id', requestId);
      if(upd && upd.error){
        upd = await sb.from('annual_meeting_packet_requests').update({ status:'mailed', mailing_confirmed_at:nowIso }).eq('id', requestId);
      }
      if(upd && upd.error) throw upd.error;
      try{
        await sb.from('annual_meeting_activity_events').insert([{
          event_type:'annual_packet_mailed',
          title:'Annual Meeting packet mailed',
          detail:(row.community_name || 'Community') + ' packet was marked mailed from the assistant email link.',
          company_id: row.company_id || null,
          community_id: row.community_id || null,
          community_name: row.community_name || null,
          actor_name:'Assistant Email Confirmation',
          target_user_id: row.employee_user_id || null,
          created_at: nowIso
        }]);
      }catch(_e2){}
      try{
        await writeArchiveRecord(row, nowIso);
      }catch(_archiveErr){
        try{ console.warn('annual meeting archive write failed', _archiveErr); }catch(_eWarn){}
      }
      statusEl.textContent = 'Thank you. The packet has been marked mailed and archived.';
      btn.disabled = true;
      btn.textContent = 'Mailing Confirmed';
    }catch(e){
      statusEl.textContent = String((e && e.message) || e || 'Could not confirm mailing.');
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', confirmMailing);
})();
</script>
