  <style>

    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#eef7ff 0%,#f7fafc 100%);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--ink)}
    .wrap{max-width:1180px;margin:28px auto;padding:0 18px 60px}.hero{background:rgba(255,255,255,.96);border:2px solid var(--line);border-radius:30px;padding:28px 30px;box-shadow:0 20px 48px rgba(18,55,89,.10)}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}.title h1{font-size:clamp(34px,4vw,52px);line-height:1;margin:0;color:var(--navy);letter-spacing:-.045em}.title p{margin:10px 0 0;color:var(--muted);font-size:18px;font-weight:650}.logo{height:78px;object-fit:contain;max-width:260px}.context{margin:18px 0 22px;padding:18px 20px;border-radius:22px;background:linear-gradient(135deg,#fff7d6,#fffdf3);border:1.5px solid rgba(212,175,55,.35);font-weight:850;color:var(--navy)}

    .upload{grid-column:1/-1;border:1.5px dashed #88bfff;border-radius:24px;background:#fbfdff;padding:22px}.fileInput::file-selector-button{background:var(--navy);color:#fff;border:0;border-radius:999px;padding:13px 22px;font-weight:950;margin-right:12px}.preview{display:grid;gap:10px;margin-top:12px}.preview img{width:100%;max-height:150px;object-fit:cover;border-radius:14px;border:1px solid #dbe8f7}.actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:12px;margin-top:8px}.btn{border:2px solid var(--navy);border-radius:20px;background:#fff;color:var(--navy);min-height:58px;padding:0 24px;font-size:18px;font-weight:950;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}.btn.primary{background:linear-gradient(180deg,var(--navy),#0d2f4d);color:#fff;box-shadow:0 14px 28px rgba(18,55,89,.22)}.msg{margin:18px 0 0;font-size:18px;font-weight:850}.msg.err{color:var(--danger)}.msg.ok{color:var(--ok)}
    .history{margin-top:26px;background:#fff;border:2px solid var(--line);border-radius:28px;padding:24px;box-shadow:0 14px 34px rgba(18,55,89,.07)}.history h2{margin:0;color:var(--navy);font-size:32px}.empty{margin-top:16px;padding:18px;border:1px dashed rgba(15,53,84,.20);border-radius:18px;color:var(--muted);font-weight:750}.item{margin-top:12px;padding:16px;border:1px solid rgba(15,53,84,.12);border-radius:18px}.item strong{color:var(--navy)}.pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:#fff1c9;color:#785700;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.06em}
    @media(max-width:760px){.wrap{margin:18px auto;padding:0 12px 44px}.hero{padding:24px 18px;border-radius:26px}.top{display:block}.logo{margin-top:14px;height:58px}.grid{grid-template-columns:1fr}.field{grid-column:1/-1}.actions{justify-content:stretch}.btn{width:100%}}

<body>
  <main class="wrap">
    <section class="hero">
      <div class="top">
        <div class="title"><h1>Resident Work Orders</h1><p>Submit a new maintenance request for the selected community.</p></div>
        <img id="companyLogo" class="logo" alt="Company logo" style="display:none" />
      </div>
      <div id="communityContext" class="context">Loading selected community…</div>
      <form id="workOrderForm" class="grid">
        <input type="hidden" id="communityId" name="community_id" />
        <input type="hidden" id="communityName" name="community_name" />
        <input type="hidden" id="companyId" name="company_id" />
        <div class="field owner-field"><label for="ownerSelect">Unit / Address</label><select id="ownerSelect" name="owner_select"><option value="">Loading owners…</option></select><input id="unitNumber" name="unit_number" type="hidden" /><input id="unitManual" name="unit_manual" placeholder="Unit or address" style="display:none;margin-top:10px" /><div id="ownerMeta" class="owner-meta" aria-live="polite"></div></div>
        <div class="field"><label for="residentName">Resident Name</label><input id="residentName" name="resident_name" placeholder="Resident name" /></div>
        <div class="field"><label for="residentEmail">Email</label><input id="residentEmail" name="resident_email" type="email" placeholder="name@email.com" /></div>
        <div class="field"><label for="residentPhone">Phone</label><input id="residentPhone" name="resident_phone" inputmode="tel" placeholder="555-555-5555" /></div>
        <div class="field"><label for="category">Issue Category</label><select id="category" name="category"><option value="general">General</option><option value="plumbing">Plumbing</option><option value="electrical">Electrical</option><option value="hvac">HVAC</option><option value="landscaping">Landscaping</option><option value="common_area">Common Area</option><option value="security">Security / Access</option></select></div>
        <div class="field"><label for="priority">Priority</label><select id="priority" name="priority"><option value="normal">Normal</option><option value="low">Low</option><option value="high">High</option><option value="urgent">Urgent</option></select></div>
        <div class="field full"><label for="subject">Subject</label><input id="subject" name="subject" required placeholder="Brief summary" /></div>
        <div class="field full"><label for="description">Description</label><textarea id="description" name="description" required placeholder="Please describe the issue in detail."></textarea></div>
        <div class="upload"><label for="residentPhotos">Upload Photos</label><input class="fileInput" id="residentPhotos" type="file" multiple accept="image/*" /><div id="photoMeta" class="empty" style="display:none"></div><div id="photoPreview" class="preview"></div></div>
        <div class="actions"><a class="btn" id="backToRwo" href="resident_work_orders.html">Back</a><button class="btn primary" id="submitBtn" type="submit">➤ Submit Work Order</button></div>
      </form>
      <div id="message" class="msg"></div>
    </section>
    <section class="history"><h2>Your Work Orders</h2><p style="color:var(--muted);font-weight:700">Recent requests for this community will appear here after they are submitted.</p><button id="refreshHistory" class="btn" type="button" style="min-height:44px;font-size:15px;padding:0 18px">Refresh</button><div id="historyList" class="empty">Loading your work orders…</div></section>
  </main>
<script>
(function(){
  const REST = 'https://slcwuuwyrgnmlmxpcaim.supabase.co/rest/v1/';
  const FN = 'https://slcwuuwyrgnmlmxpcaim.supabase.co/functions/v1/';
  const $ = id => document.getElementById(id);
  function qp(n){ try{return new URL(location.href).searchParams.get(n)||'';}catch(_e){return '';} }
  function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function isJwt(v){ return /^eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$/.test(String(v||'').trim()); }
  function readStoredJwt(){
    const keys=['sb_access_token','zummee_sb_access_token'];
    for(const k of keys){
      try{ const v=localStorage.getItem(k)||sessionStorage.getItem(k)||''; if(isJwt(v)) return v.trim(); }catch(_e){}
    }
    try{
      const raw=localStorage.getItem('sb-zummee-auth')||localStorage.getItem('sb-slcwuuwyrgnmlmxpcaim-auth-token')||'';
      if(raw){ const obj=JSON.parse(raw); const s=obj.currentSession||obj.session||obj; const t=s&&s.access_token; if(isJwt(t)) return t.trim(); }
    }catch(_e){}
    return '';
  }
  async function getToken(){
    try{
      if(window.ZummeeAuth && typeof window.ZummeeAuth.getAccessToken==='function'){
        const t = await window.ZummeeAuth.getAccessToken();
        if(isJwt(t)) return String(t).trim();
      }
    }catch(_e){}
    return readStoredJwt();
  }
  async function getClient(){ if(typeof window.ensureSupabase==='function') return await window.ensureSupabase(); return window.supabaseClient || window.sb || null; }
  async function api(path, opts={}){ const token = await getToken(); const headers = Object.assign({'apikey':window.SUPABASE_ANON_KEY||'','Content-Type':'application/json','Prefer':'return=representation'}, opts.headers||{}); if(token) headers.Authorization='Bearer '+token; const res=await fetch(REST+path,{...opts,headers}); const text=await res.text(); let data=null; try{data=text?JSON.parse(text):null}catch(_e){data=text} if(!res.ok){ throw new Error((data&&(data.message||data.error_description||data.error))||text||('Request failed '+res.status)); } return data; }
  function context(){
    const cid = qp('community_id') || qp('cid') || localStorage.getItem('zummeeActiveCommunityId') || localStorage.getItem('activeCommunityId') || '';
    const cname = qp('community_name') || qp('name') || localStorage.getItem('zummeeActiveCommunityName') || localStorage.getItem('activeCommunityName') || '';
    const uid = qp('user_id') || qp('uid') || localStorage.getItem('zummee_user_id_v1') || '';
    return {cid:String(cid||'').trim(), cname:String(cname||'').trim(), uid:String(uid||'').trim()};
  }
  async function hydrateCompanyLogo(){
    try{ const cached=localStorage.getItem('zummee_company_logo_url')||localStorage.getItem('companyLogoUrl')||''; if(cached){ $('companyLogo').src=cached; $('companyLogo').style.display='block'; return; } }catch(_e){}
    try{ const rows=await api('company_branding?select=*&limit=1',{method:'GET'}); const logo=(rows&&rows[0]&&(rows[0].logo_url||rows[0].logo||rows[0].image_url))||''; if(logo){$('companyLogo').src=logo; $('companyLogo').style.display='block';} }catch(_e){}
  }
  async function hydrateCompanyFromCommunityId(cid){
    if(!cid) return '';
    const tables=['communities','PropertyCommunities','Community'];
    for(const t of tables){ try{ const rows=await api(t+'?select=id,company_id,company,name&limit=1&id=eq.'+encodeURIComponent(cid),{method:'GET'}); if(rows&&rows[0]) return rows[0].company_id||rows[0].company||''; }catch(_e){} }
    return '';
  }
  function setMsg(msg, ok){ const el=$('message'); el.textContent=msg||''; el.className='msg '+(msg?(ok?'ok':'err'):''); }
  function firstValue(keys){
    for(const k of keys){
      try{ const qv=qp(k); if(qv) return decodeURIComponent(qv); }catch(_e){}
      try{ const lv=localStorage.getItem(k); if(lv) return lv; }catch(_e2){}
      try{ const sv=sessionStorage.getItem(k); if(sv) return sv; }catch(_e3){}
    }
    return '';
  }
  function setIfEmpty(id, value){ const el=$(id); if(el && !String(el.value||'').trim() && String(value||'').trim()) el.value=String(value||'').trim(); }

  let ownerRows = [];
  function pick(row, keys){
    for(const k of keys){
      const v = row && row[k];
      if(v !== undefined && v !== null && String(v).trim()) return String(v).trim();
    }
    return '';
  }
  function ownerUnit(row){ return pick(row, ['unit_number','unit','unit_address','address','resident_unit','resident_address','property_address','street_address','home_address']); }
  function ownerName(row){
    const direct = pick(row, ['owner_name','resident_name','name','full_name','profile_name','display_name','primary_owner','member_name']);
    if(direct) return direct;
    const first = pick(row, ['first_name','owner_first_name','resident_first_name']);
    const last = pick(row, ['last_name','owner_last_name','resident_last_name']);
    return String((first+' '+last).trim());
  }
  function ownerEmail(row){ return pick(row, ['email','resident_email','owner_email','profile_email','primary_email']); }
  function ownerPhone(row){ return pick(row, ['phone','resident_phone','owner_phone','mobile_phone','cell_phone','primary_phone']); }
  function ownerLabel(row){
    const unit = ownerUnit(row);
    const name = ownerName(row);
    if(unit && name) return unit + ' — ' + name;
    return unit || name || ownerEmail(row) || 'Owner record';
  }
  async function queryOwnerTable(table, ctx){
    const attempts = [];
    if(ctx.cid) attempts.push(table+'?select=*&community_id=eq.'+encodeURIComponent(ctx.cid)+'&limit=500');
    if(ctx.cname) attempts.push(table+'?select=*&community_name=eq.'+encodeURIComponent(ctx.cname)+'&limit=500');
    attempts.push(table+'?select=*&limit=500');
    for(const q of attempts){
      try{
        const rows = await api(q, {method:'GET'});
        if(Array.isArray(rows) && rows.length){
          const filtered = rows.filter(r=>{
            const rid = pick(r, ['community_id','communityId','property_id']);
            const rname = pick(r, ['community_name','community','property_name','association_name']);
            if(ctx.cid && rid && rid === ctx.cid) return true;
            if(ctx.cname && rname && rname.toLowerCase() === ctx.cname.toLowerCase()) return true;
            return !rid && !rname;
          });
          return filtered.length ? filtered : rows;
        }
      }catch(_e){}
    }
    return [];
  }
  function applyOwner(row){
    if(!row) return;
    const unit = ownerUnit(row);
    const name = ownerName(row);
    const email = ownerEmail(row);
    const phone = ownerPhone(row);
    if(unit){ $('unitNumber').value = unit; $('unitManual').value = unit; }
    if(name) $('residentName').value = name;
    if(email) $('residentEmail').value = email;
    if(phone) $('residentPhone').value = phone;
    const meta=[];
    if(name) meta.push(name);
    if(email) meta.push(email);
    if(phone) meta.push(phone);
    $('ownerMeta').classList.remove('is-warn');
    $('ownerMeta').textContent = meta.length ? meta.join(' • ') : 'Owner selected.';
  }
  function setManualOwnerMode(message){
    const sel=$('ownerSelect');
    if(sel){ sel.innerHTML='<option value="__manual__">Manual / owner not listed</option>'; sel.value='__manual__'; }
    $('unitManual').style.display='block';
    $('unitManual').value = $('unitNumber').value || $('unitManual').value || '';
    $('ownerMeta').classList.add('is-warn');
    $('ownerMeta').textContent = message || 'Owner list unavailable. Enter the unit/address manually.';
  }
  async function loadOwnerDropdown(){
    const ctx=context();
    const sel=$('ownerSelect');
    if(!sel) return;
    sel.innerHTML='<option value="">Loading owners…</option>';
    $('ownerMeta').textContent='';
    $('unitManual').style.display='none';
    ownerRows=[];
    const tables=['resident_directory','community_residents','owners','owner_directory','residents'];
    for(const table of tables){
      const rows = await queryOwnerTable(table, ctx);
      if(rows.length){ ownerRows = rows; break; }
    }
    ownerRows = ownerRows
      .filter(r=>ownerUnit(r) || ownerName(r) || ownerEmail(r))
      .sort((a,b)=>ownerLabel(a).localeCompare(ownerLabel(b), undefined, {numeric:true, sensitivity:'base'}));
    if(!ownerRows.length){
      setManualOwnerMode('No owner records found for this community. Enter the unit/address manually.');
      return;
    }
    sel.innerHTML='<option value="">Select owner / unit…</option>' + ownerRows.map((r,i)=>'<option value="'+i+'">'+esc(ownerLabel(r))+'</option>').join('') + '<option value="__manual__">Manual / owner not listed</option>';
    sel.onchange=function(){
      if(sel.value==='__manual__'){
        $('unitManual').style.display='block';
        $('unitManual').value = $('unitNumber').value || '';
        $('ownerMeta').classList.add('is-warn');
        $('ownerMeta').textContent='Manual entry enabled.';
        return;
      }
      $('unitManual').style.display='none';
      const idx = Number(sel.value);
      if(Number.isFinite(idx) && ownerRows[idx]) applyOwner(ownerRows[idx]);
    };
    const existingUnit = String($('unitNumber').value || $('unitManual').value || '').trim();
    if(existingUnit){
      const idx = ownerRows.findIndex(r=>ownerUnit(r).toLowerCase() === existingUnit.toLowerCase());
      if(idx >= 0){ sel.value=String(idx); applyOwner(ownerRows[idx]); }
      else { sel.value='__manual__'; $('unitManual').style.display='block'; $('unitManual').value=existingUnit; }
    }
  }
  async function hydrateResidentFields(){
    setIfEmpty('unitNumber', firstValue(['unit','unit_number','resident_unit','address','resident_address','zummeeResidentUnit','zummee_unit']));
    setIfEmpty('residentName', firstValue(['resident_name','name','residentName','profile_name','display_name','zummeeResidentName','zummee_profile_name']));
    setIfEmpty('residentEmail', firstValue(['resident_email','email','residentEmail','profile_email','zummeeResidentEmail','zummee_profile_email']));
    setIfEmpty('residentPhone', firstValue(['resident_phone','phone','residentPhone','profile_phone','zummeeResidentPhone','zummee_profile_phone']));
    try{
      const sb=await getClient();
      let user=null;
      try{ const sess=await sb?.auth?.getSession?.(); user=sess?.data?.session?.user||null; }catch(_e){}
      if(user){
        const meta=user.user_metadata||{};
        setIfEmpty('residentEmail', user.email||meta.email||'');
        setIfEmpty('residentName', meta.name||meta.full_name||meta.profile_name||'');
        setIfEmpty('residentPhone', meta.phone||'');
        try{
          const prof=await sb.from('profiles').select('name,email,phone,unit,unit_number,address').eq('id', user.id).maybeSingle();
          const r=prof?.data||{};
          setIfEmpty('residentName', r.name||'');
          setIfEmpty('residentEmail', r.email||'');
          setIfEmpty('residentPhone', r.phone||'');
          setIfEmpty('unitNumber', r.unit_number||r.unit||r.address||'');
        }catch(_e2){}
      }
    }catch(_e){}
  }
  function applyContext(){
    const ctx=context(); $('communityId').value=ctx.cid; $('communityName').value=ctx.cname;
    if(ctx.cid) localStorage.setItem('zummeeActiveCommunityId',ctx.cid); if(ctx.cname) localStorage.setItem('zummeeActiveCommunityName',ctx.cname);
    $('communityContext').innerHTML = '<strong>Selected community:</strong> '+esc(ctx.cname||ctx.cid||'Not selected')+'<small>New work orders will be routed to this community.</small>';
    const back=new URL('resident_work_orders.html', location.href); if(ctx.cid) back.searchParams.set('community_id',ctx.cid); if(ctx.cname) back.searchParams.set('community_name',ctx.cname); $('backToRwo').href=back.pathname.replace(/^\//,'')+back.search;
    return ctx;
  }
  function renderPhotos(){ const files=Array.from($('residentPhotos').files||[]); $('photoMeta').style.display=files.length?'block':'none'; $('photoMeta').textContent=files.length?files.length+' photo(s) selected.':''; $('photoPreview').innerHTML=''; files.slice(0,6).forEach(f=>{ const img=document.createElement('img'); img.alt=f.name; img.src=URL.createObjectURL(f); $('photoPreview').appendChild(img); }); }
  function fileToBase64(file){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=()=>resolve(String(r.result||'').split(',')[1]||''); r.onerror=reject; r.readAsDataURL(file);});}
  async function uploadPhotos(workOrderId,email){ const files=Array.from($('residentPhotos').files||[]); let count=0; const token=await getToken(); for(const file of files){ const body={work_order_id:workOrderId,uploader_type:'resident',uploader_email:email||'',filename:file.name,content_type:file.type||'image/jpeg',data_base64:await fileToBase64(file)}; const res=await fetch(FN+'upload-work-order-photo',{method:'POST',headers:{'Content-Type':'application/json','apikey':window.SUPABASE_ANON_KEY||'',...(token?{Authorization:'Bearer '+token}:{})},body:JSON.stringify(body)}); if(res.ok) count++; else console.warn('Photo upload failed', await res.text()); } return count; }
  async function createNotification(row,payload){ try{ const sb=await getClient(); if(!sb || typeof sb.rpc!=='function' || !row?.id) return; await sb.rpc('create_notification_event',{p_event_type:'new_work_order',p_priority:'high',p_title:'New Work Order',p_message:'A new resident work order needs review.',p_link_url:'resident_work_orders.html?open_work_order_id='+encodeURIComponent(row.id),p_community_id:payload.community_id||null,p_actor_user_id:null,p_target_user_id:null,p_target_role:'Employee',p_audience_scope:'role',p_source_table:'resident_work_orders',p_source_id:String(row.id),p_metadata:{work_order_id:row.id,source:'resident_submit',resident_name:payload.resident_name||null,unit_number:payload.unit_number||null,subject:payload.subject||null}}); }catch(e){console.warn('Notification create failed',e);} }
  async function loadHistory(){
    const ctx=context(); const list=$('historyList'); list.textContent='Loading your work orders…';
    try{ let q='resident_work_orders?select=id,subject,description,category,priority,status,unit_number,resident_email,submitted_at,updated_at,community_id&limit=25'; if(ctx.cid) q+='&community_id=eq.'+encodeURIComponent(ctx.cid); const email=$('residentEmail').value.trim(); const unit=(($('ownerSelect')&&$('ownerSelect').value==='__manual__') ? $('unitManual').value : $('unitNumber').value).trim(); const rows=await api(q,{method:'GET'}); const filtered=(rows||[]).filter(r=>!email && !unit ? true : (email&&String(r.resident_email||'').toLowerCase()===email.toLowerCase()) || (unit&&String(r.unit_number||'').trim()===unit)); if(!filtered.length){list.className='empty'; list.textContent='No work orders yet. Submit your first request above.'; return;} list.className=''; list.innerHTML=filtered.map(r=>'<div class="item"><strong>'+esc(r.subject||'Resident work order')+'</strong><div style="margin-top:6px;color:var(--muted)">'+esc(r.unit_number||'Resident request')+' · '+esc(r.category||'General')+' · '+esc(r.submitted_at||'Recently submitted')+'</div><div style="margin-top:8px"><span class="pill">'+esc(r.status||'manager_review')+'</span></div></div>').join(''); }catch(e){list.className='empty'; list.textContent='Unable to load existing work orders right now. You can still submit a new request above.'; console.warn(e);}
  }
  async function submit(e){
    e.preventDefault(); setMsg('',true); const btn=$('submitBtn'); btn.disabled=true;
    try{
      const ctx=applyContext(); if(!ctx.cid) throw new Error('This work order link is missing a community. Open it from the selected community.');
      let companyId=$('companyId').value.trim(); if(!companyId) companyId=await hydrateCompanyFromCommunityId(ctx.cid);
      const unitValue=(($('ownerSelect')&&$('ownerSelect').value==='__manual__') ? $('unitManual').value : $('unitNumber').value).trim(); const payload={company_id:companyId||null,community_id:ctx.cid,community_name:ctx.cname||null,resident_name:$('residentName').value.trim(),resident_email:$('residentEmail').value.trim(),resident_phone:$('residentPhone').value.trim(),unit_number:unitValue,subject:$('subject').value.trim(),description:$('description').value.trim(),category:$('category').value,priority:$('priority').value,status:'manager_review',vendor_id:null};
      if(!payload.subject || !payload.description) throw new Error('Please enter a subject and description.');
      // Canonical schema lock: resident_id is intentionally NOT sent. RWO supports resident, employee, board, and manager-created records.
      const rows=await api('resident_work_orders?select=id,community_id,subject,submitted_at',{method:'POST',body:JSON.stringify([payload])});
      const row=Array.isArray(rows)?rows[0]:rows;
      const uploads=row?.id ? await uploadPhotos(row.id,payload.resident_email) : 0;
      await createNotification(row,payload);
      $('workOrderForm').reset(); applyContext(); await loadOwnerDropdown(); renderPhotos(); setMsg('Work order submitted successfully.'+(uploads?' '+uploads+' photo(s) uploaded.':''), true); await loadHistory();
    }catch(err){ let msg=err?.message||'Unable to submit work order.'; if(/resident_id|schema cache/i.test(msg)) msg='Work order schema mismatch fixed: resident_id is not used. Please refresh and try again.'; if(/Expected 3 parts in JWT|jwt/i.test(msg)) msg='Work order session token was invalid. Refresh this page from the Manager Hub and try again.'; setMsg(msg,false); }
    finally{btn.disabled=false;}
  }
  async function init(){ try{ await getClient(); }catch(_e){} applyContext(); await hydrateCompanyLogo(); await hydrateResidentFields(); await loadOwnerDropdown(); renderPhotos(); await loadHistory(); }
  document.addEventListener('DOMContentLoaded', init, {once:true}); $('residentPhotos').addEventListener('change',renderPhotos); $('workOrderForm').addEventListener('submit',submit); $('refreshHistory').addEventListener('click',loadHistory);
})();
</script>
