<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Annual Meeting Approval Packet</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --navy:#17365f;
      --navy-2:#102f4f;
      --muted:#64748b;
      --line:#d8e5f6;
      --line-2:#9ec5ff;
      --bg:#edf4fb;
      --card:#ffffff;
      --soft:#f8fbff;
      --danger:#a61b1b;
      --success:#0f6b3f;
      --scale:.92;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--navy-2);background:linear-gradient(135deg,#dfeaf7,#9fb4ca)}
    body{padding:18px;overflow:hidden}

    .review-shell{
      width:min(1180px,calc(100vw - 28px));
      height:calc(100svh - 36px);
      margin:0 auto;
      border:2px solid var(--line-2);
      border-radius:28px;
      background:#f6f9fd;
      box-shadow:0 30px 80px rgba(16,47,79,.30);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .review-header{
      flex:0 0 auto;
      padding:24px 34px 20px;
      border-bottom:1px solid var(--line);
      background:rgba(248,251,255,.98);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
    }

    .eyebrow{
      margin:0 0 7px;
      color:#617792;
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-weight:950;
    }

    h1{
      margin:0;
      color:var(--navy);
      font-size:34px;
      line-height:1.08;
      letter-spacing:-.035em;
      font-weight:950;
    }

    .meta{
      margin:8px 0 0;
      color:#64748b;
      font-size:16px;
      line-height:1.35;
      font-weight:850;
    }

    .header-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    button,.button-link{
      appearance:none;
      border:2px solid var(--line-2);
      border-radius:18px;
      min-height:46px;
      padding:0 20px;
      background:#fff;
      color:var(--navy);
      font-size:14px;
      font-weight:950;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      white-space:nowrap;
    }

    button.primary{background:var(--navy);border-color:var(--navy);color:#fff}
    button.danger,.button-link.danger{color:var(--danger);border-color:#f2c1c1}
    button:disabled{opacity:.65;cursor:not-allowed}

    .review-body{
      flex:1 1 auto;
      min-height:0;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      background:var(--bg);
      padding:22px;
    }

    .loading-card,.error-card,.status-card{
      max-width:760px;
      margin:40px auto;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      padding:28px;
      box-shadow:0 16px 42px rgba(16,47,79,.12);
      color:var(--navy);
      font-size:17px;
      font-weight:850;
      line-height:1.45;
    }

    .status-card.success{border-color:#b8e3c7;color:var(--success)}
    .status-card.error,.error-card{border-color:#f2c1c1;color:var(--danger)}

    .packet-stage{
      width:100%;
      max-width:none;
      height:auto;
      overflow:visible;
      display:block;
      padding:0 0 20px;
      background:var(--bg);
    }

    .packet-scale-outer{
      width:calc(850px * var(--scale));
      max-width:100%;
      margin:0 auto 22px;
      padding:0 0 28px;
      overflow:visible;
      display:block;
      box-sizing:content-box;
    }

    .packet-scale-inner{
      width:850px;
      max-width:850px;
      transform-origin:top left;
      zoom:var(--scale);
      overflow:visible;
      display:block;
      contain:none;
    }

    .packet-scale-inner.transform-fallback{
      zoom:1 !important;
      transform:scale(var(--scale));
      transform-origin:top left;
    }

    .packet-scale-inner .am-v652-pages{
      width:850px !important;
      max-width:none !important;
      display:flex !important;
      flex-direction:column !important;
      align-items:center !important;
      gap:22px !important;
      padding:0 !important;
      margin:0 !important;
      height:auto !important;
      min-height:auto !important;
      overflow:visible !important;
      contain:none !important;
    }

    .packet-scale-inner .am-v652-page{
      width:850px !important;
      max-width:850px !important;
      min-height:1050px !important;
      height:auto !important;
      box-sizing:border-box !important;
      background:#fff !important;
      border:1px solid #d7e3f1 !important;
      border-radius:18px !important;
      box-shadow:0 16px 38px rgba(16,47,79,.13) !important;
      padding:54px !important;
      color:#102f4f !important;
      overflow:visible !important;
      contain:none !important;
      flex:0 0 auto !important;
    }

    .packet-scale-inner .am-v652-page-header{
      display:flex !important;
      flex-direction:row !important;
      align-items:flex-start !important;
      justify-content:space-between !important;
      gap:22px !important;
      border-bottom:3px solid #102f4f !important;
      padding-bottom:22px !important;
      margin-bottom:28px !important;
    }

    .packet-scale-inner .am-v652-logo,
    .packet-scale-inner img.am-v652-logo,
    .packet-scale-inner .am-v652-page-header img{
      max-width:190px !important;
      max-height:80px !important;
      width:auto !important;
      height:auto !important;
      object-fit:contain !important;
      flex:0 0 auto !important;
      display:block !important;
      margin:0 !important;
    }

    .packet-scale-inner .am-v652-kicker{
      font-size:12px !important;
      letter-spacing:.16em !important;
      color:#6d7f92 !important;
      text-transform:uppercase !important;
      font-weight:900 !important;
    }

    .packet-scale-inner .am-v652-h1{
      font-size:34px !important;
      line-height:1.05 !important;
      letter-spacing:normal !important;
      margin:8px 0 0 !important;
      color:#102f4f !important;
      font-weight:950 !important;
    }

    .packet-scale-inner .am-v652-h2{
      font-size:24px !important;
      line-height:1.15 !important;
      margin:0 0 16px !important;
      color:#102f4f !important;
      font-weight:950 !important;
    }

    .packet-scale-inner .am-v652-meta-grid{
      display:grid !important;
      grid-template-columns:repeat(2,minmax(0,1fr)) !important;
      gap:14px !important;
      margin:22px 0 !important;
    }

    .packet-scale-inner .am-v652-meta{
      border:1px solid #d8e4f0 !important;
      border-radius:16px !important;
      padding:14px 16px !important;
      background:#f8fbff !important;
      box-sizing:border-box !important;
    }

    .packet-scale-inner .am-v652-meta label{
      display:block !important;
      font-size:11px !important;
      letter-spacing:.12em !important;
      text-transform:uppercase !important;
      font-weight:900 !important;
      color:#6d7f92 !important;
      margin-bottom:7px !important;
    }

    .packet-scale-inner .am-v652-meta div{
      font-size:16px !important;
      line-height:1.25 !important;
      font-weight:900 !important;
      color:#102f4f !important;
    }

    .packet-scale-inner .am-v652-box{
      border:2px solid #dce8f4 !important;
      border-radius:18px !important;
      padding:18px 20px !important;
      background:#fbfdff !important;
      margin:20px 0 !important;
      box-sizing:border-box !important;
    }

    .packet-scale-inner p,
    .packet-scale-inner li,
    .packet-scale-inner .am-v652-p,
    .packet-scale-inner .am-v652-li{
      font-size:15px !important;
      line-height:1.55 !important;
      color:#223c59 !important;
    }

    .packet-scale-inner ul,
    .packet-scale-inner ol{padding-left:24px !important;margin:12px 0 !important}

    .review-footer{
      flex:0 0 auto;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:12px;
      padding:14px 22px max(14px,env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      background:rgba(246,249,253,.98);
    }

    .mobile-only{display:none}

    @media(max-width:760px){
      body{padding:7px 6px}
      .review-shell{
        width:calc(100vw - 12px);
        max-width:calc(100vw - 12px);
        height:calc(100svh - 16px);
        max-height:calc(100svh - 16px);
        border-radius:24px;
      }
      .review-header{padding:16px 18px 13px}
      .eyebrow{display:none}
      h1{font-size:21px;line-height:1.12;max-width:calc(100vw - 100px)}
      .meta{font-size:13px;line-height:1.28}
      .header-actions{gap:8px}
      .header-actions .button-link,.header-actions button:not(.mobile-x){display:none}
      .mobile-only{display:inline-flex}
      .mobile-x{
        width:42px;
        min-width:42px;
        height:42px;
        border-radius:15px;
        border:0;
        background:#edf4fb;
        color:var(--navy);
        font-size:28px;
        line-height:1;
        padding:0;
      }
      .review-body{padding:10px}
      .review-footer{padding:10px 14px 14px;gap:9px}
      .review-footer button,.review-footer .button-link{
        min-height:39px;
        min-width:132px;
        border-radius:14px;
        font-size:12.5px;
        padding:0 16px;
      }
      .review-footer{justify-content:flex-end}
      .hide-phone{display:none!important}
      .loading-card,.error-card,.status-card{margin:20px auto;font-size:15px;padding:20px}
    }

    @media(max-width:430px){
      .review-footer{
        display:grid;
        grid-template-columns:1fr;
      }
      .review-footer button,.review-footer .button-link{width:100%}
    }

    @media print{
      body{background:#fff;padding:0;overflow:visible}
      .review-shell{width:auto;height:auto;border:0;box-shadow:none;border-radius:0}
      .review-header,.review-footer{display:none!important}
      .review-body{overflow:visible;background:#fff;padding:0}
      .packet-scale-outer{width:auto;margin:0;padding:0}
      .packet-scale-inner{width:auto;zoom:1;transform:none!important}
      .packet-scale-inner .am-v652-page{box-shadow:none!important;border:0!important;border-radius:0!important;page-break-after:always}
    }
  
    /* v715 isolated print viewport */
    .packet-frame-shell {
      width: 100%;
      overflow: hidden;
      position: relative;
      border-radius: 18px;
      background: #eaf3fb;
      display: block;
      margin: 0 auto;
    }

    .packet-print-frame {
      width: 850px;
      min-width: 850px;
      max-width: 850px;
      border: 0;
      display: block;
      transform-origin: top left;
      background: transparent;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .packet-frame-fallback {
      width: 100%;
      min-height: 300px;
      color: #102f4f;
      font-weight: 800;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 28px;
    }

  
    /* v716 one-page phone packet viewer */
    .packet-page-controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      padding: 12px 4px 4px;
    }

    .packet-page-btn {
      min-height: 44px;
      border-radius: 16px;
      border: 2px solid #9cc5ff;
      background: #fff;
      color: #123a63;
      font-weight: 900;
      font-size: 14px;
      padding: 0 14px;
      cursor: pointer;
    }

    .packet-page-btn:disabled {
      opacity: .42;
      cursor: default;
    }

    .packet-page-indicator {
      color: #123a63;
      font-weight: 950;
      font-size: 14px;
      letter-spacing: .02em;
      white-space: nowrap;
    }

  </style>
</head>

<body>
  <main class="review-shell">
    <header class="review-header">
      <div>
        <p class="eyebrow">Annual Meeting Approval</p>
        <h1 id="pageTitle">Annual Meeting Packet Review</h1>
        <p class="meta" id="pageMeta">Loading approval packet…</p>
      </div>
      <div class="header-actions">
        <a class="button-link" id="backTop" href="board_member_hub_v2.html">Back to Board Hub</a>
        <button type="button" class="primary" id="approveTop">Approve Packet</button>
        <button type="button" class="mobile-only mobile-x" id="closeTop" aria-label="Close">×</button>
      </div>
    </header>

    <section class="review-body" id="reviewBody">
      <div class="loading-card">Preparing packet preview…</div>
    </section>

    <footer class="review-footer">
      <button type="button" class="primary" id="approveBottom">Approve Packet</button>
      <button type="button" id="printButton" class="hide-phone">Print / Save PDF</button>
      <a class="button-link" id="backBottom" href="board_member_hub_v2.html">Back to Board Hub</a>
    </footer>
  </main>


  <script id="approval-review-v701-supabase-config">
    window.SUPABASE_URL = window.SUPABASE_URL || 'https://slcwuuwyrgnmlmxpcaim.supabase.co';
    window.SUPABASE_KEY = window.SUPABASE_KEY || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864';
    window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.SUPABASE_KEY;
  </script>

  <script>
    (function(){
      'use strict';

      const BUILD = '2026-05-09-v722-expected-step-frontend-guard';
      const SUPABASE_URL = window.SUPABASE_URL || window.ZUMMEE_SUPABASE_URL || 'https://slcwuuwyrgnmlmxpcaim.supabase.co';
      const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || window.SUPABASE_KEY || window.ZUMMEE_SUPABASE_ANON_KEY || window.supabaseAnonKey || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864';

      let supabaseClient = null;
      let currentRequest = null;
      let loadedApprovalStep = '';

      const els = {
        title: document.getElementById('pageTitle'),
        meta: document.getElementById('pageMeta'),
        body: document.getElementById('reviewBody'),
        approveTop: document.getElementById('approveTop'),
        approveBottom: document.getElementById('approveBottom'),
        printButton: document.getElementById('printButton'),
        backTop: document.getElementById('backTop'),
        backBottom: document.getElementById('backBottom'),
        closeTop: document.getElementById('closeTop')
      };

      function clean(v){ return String(v == null ? '' : v).trim(); }
      function params(){ return new URLSearchParams(window.location.search || ''); }
      function requestId(){ return clean(params().get('approval_request_id') || params().get('request_id') || params().get('id')); }
      function reviewToken(){ return clean(params().get('token') || params().get('approval_token') || params().get('review_token')); }
      function functionUrl(name){ return SUPABASE_URL.replace(/\/$/, '') + '/functions/v1/' + name; }

      function setBackLinks(row){
        const p = params();
        let href = 'board_member_hub_v2.html';
        const communityId = clean(p.get('community_id') || row?.community_id);
        const communityName = clean(p.get('community_name') || row?.community_name);
        const query = new URLSearchParams();
        if(communityId) query.set('community_id', communityId);
        if(communityName) query.set('community_name', communityName);
        const qs = query.toString();
        if(qs) href += '?' + qs;
        els.backTop.href = href;
        els.backBottom.href = href;
      }

      function showError(message){
        els.body.innerHTML = '<div class="error-card">' + escapeHtml(message) + '</div>';
        els.meta.textContent = 'Packet review unavailable';
        setApproveVisible(false);
      }

      function showStatus(message, type='success'){
        const card = document.createElement('div');
        card.className = 'status-card ' + type;
        card.textContent = message;
        els.body.prepend(card);
        setTimeout(() => card.remove(), 7000);
      }

      function escapeHtml(value){
        return String(value == null ? '' : value)
          .replace(/&/g,'&amp;')
          .replace(/</g,'&lt;')
          .replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;')
          .replace(/'/g,'&#39;');
      }

      function sanitizePreviewHtml(html){
        let out = String(html || '');
        out = out.replace(new RegExp('<' + 'script[\\s\\S]*?<' + '\\/script>', 'gi'), '');
        out = out.replace(/\son[a-z]+\s*=\s*(['"]).*?\1/gi, '');
        out = out.replace(/javascript:/gi, '');
        return out;
      }

      function snapshot(row){
        return row && row.packet_preview_snapshot && typeof row.packet_preview_snapshot === 'object'
          ? row.packet_preview_snapshot
          : {};
      }

      function packetHtmlFrom(row){
        const snap = snapshot(row);
        const keys = ['html','packetHtml','packet_html','previewHtml','preview_html','packet_preview_html'];
        for(const key of keys){
          if(clean(snap[key])) return clean(snap[key]);
        }
        try{
          if(snap.packet && clean(snap.packet.html)) return clean(snap.packet.html);
          if(snap.preview && clean(snap.preview.html)) return clean(snap.preview.html);
          if(snap.document && clean(snap.document.html)) return clean(snap.document.html);
        }catch(e){}
        return '';
      }

      function associationName(row){
        const snap = snapshot(row);
        const settings = snap.settings && typeof snap.settings === 'object' ? snap.settings : {};
        return clean(row.association_legal_name) ||
          clean(snap.associationName) ||
          clean(snap.association_legal_name) ||
          clean(settings.association_legal_name) ||
          clean(settings.associationName) ||
          clean(row.community_name) ||
          'Annual Meeting Packet';
      }

      function meetingDate(row){
        const snap = snapshot(row);
        const settings = snap.settings && typeof snap.settings === 'object' ? snap.settings : {};
        return clean(row.next_annual_meeting_date) ||
          clean(snap.meetingDate) ||
          clean(snap.nextDate) ||
          clean(settings.next_annual_meeting_date) ||
          clean(settings.nextDate);
      }

      function formatDate(value){
        const v = clean(value).slice(0,10);
        if(!v) return '—';
        const d = new Date(v + 'T00:00:00');
        return Number.isNaN(d.getTime())
          ? v
          : d.toLocaleDateString(undefined, { month:'long', day:'numeric', year:'numeric' });
      }

      function statusLabel(row){
        const step = clean(row.current_step || row.approval_status);
        if(step === 'pending_board') return 'Awaiting Board approval';
        if(step === 'pending_supervisor') return 'Awaiting Supervisor approval';
        if(step === 'pending_admin_mailing') return 'Awaiting Admin / mailing follow-up';
        if(step === 'approved' || step === 'complete') return 'Approved';
        return step ? step.replace(/_/g, ' ') : 'Approval Review';
      }

      function setApproveVisible(visible){
        [els.approveTop, els.approveBottom].forEach(btn => {
          btn.style.display = visible ? '' : 'none';
        });
      }


      function injectPacketPrintLayoutLock(inner){
        // v715 fallback only. Primary rendering uses isolated iframe.
        if(!inner) return;
        const old = inner.querySelector('#approval-review-v714-compact-print-page-lock, #approval-review-v715-isolated-print-lock');
        if(old) old.remove();
        const style = document.createElement('style');
        style.id = 'approval-review-v715-isolated-print-lock';
        style.textContent = packetFrameCss();
        inner.appendChild(style);
      }

      function packetFrameCss(){
        return `
          :root {
            --zummee-navy: #102f4f;
            --zummee-text: #203b58;
            --zummee-muted: #6d7f92;
            --zummee-line: #d9e6f3;
            --zummee-soft: #f7fbff;
          }

          html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 850px !important;
            min-width: 850px !important;
            max-width: 850px !important;
            overflow: hidden !important;
            background: transparent !important;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            color: var(--zummee-text) !important;
            -webkit-font-smoothing: antialiased !important;
            text-rendering: geometricPrecision !important;
            -webkit-text-size-adjust: 100% !important;
            text-size-adjust: 100% !important;
          }

          *, *::before, *::after {
            box-sizing: border-box !important;
            -webkit-text-size-adjust: 100% !important;
            text-size-adjust: 100% !important;
          }

          .am-v652-pages {
            width: 850px !important;
            min-width: 850px !important;
            max-width: 850px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 24px !important;
            padding: 0 !important;
            margin: 0 !important;
            height: auto !important;
            max-height: none !important;
            overflow: visible !important;
            transform: none !important;
          }

          .am-v652-page {
            width: 850px !important;
            min-width: 850px !important;
            max-width: 850px !important;
            height: 1100px !important;
            min-height: 1100px !important;
            max-height: 1100px !important;
            overflow: hidden !important;
            transform: none !important;
            background: #ffffff !important;
            border: 1px solid var(--zummee-line) !important;
            border-radius: 18px !important;
            box-shadow: 0 16px 38px rgba(16,47,79,.13) !important;
            padding: 54px !important;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            color: var(--zummee-text) !important;
          }

          .am-v652-page-header {
            display: flex !important;
            flex-direction: row !important;
            align-items: flex-start !important;
            justify-content: space-between !important;
            gap: 24px !important;
            border-bottom: 4px solid var(--zummee-navy) !important;
            padding-bottom: 20px !important;
            margin-bottom: 26px !important;
          }

          .am-v652-logo,
          img.am-v652-logo,
          .am-v652-page-header img,
          img {
            width: auto !important;
            height: auto !important;
            max-width: 165px !important;
            max-height: 68px !important;
            object-fit: contain !important;
          }

          .am-v652-kicker,
          [class*="kicker"],
          label {
            display: block !important;
            font-size: 12px !important;
            line-height: 1.2 !important;
            letter-spacing: .16em !important;
            text-transform: uppercase !important;
            font-weight: 950 !important;
            color: var(--zummee-muted) !important;

      function buildIsolatedPacketFrame(packetHtml){
        const body = els.body;
        if(!body) return false;

        body.innerHTML = `
          <div class="packet-stage">
            <div class="packet-frame-shell" id="packetFrameShell">
              <iframe class="packet-print-frame" id="packetPrintFrame" title="Annual Meeting Packet Preview"></iframe>
            </div>
            <div class="packet-page-controls" id="packetPageControls" hidden>
              <button type="button" class="packet-page-btn" id="packetPrevPage">Previous</button>
              <div class="packet-page-indicator" id="packetPageIndicator">Page 1 of 1</div>
              <button type="button" class="packet-page-btn" id="packetNextPage">Next</button>
            </div>
          </div>
        `;

        const frame = document.getElementById('packetPrintFrame');
        const shell = document.getElementById('packetFrameShell');
        const controls = document.getElementById('packetPageControls');
        const prev = document.getElementById('packetPrevPage');
        const next = document.getElementById('packetNextPage');
        const indicator = document.getElementById('packetPageIndicator');

        if(!frame || !shell) return false;

        const source = `
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=850, initial-scale=1">
              <style>${packetFrameCss()}</style>
            </head>
            <body>${packetHtml || ''}</body>
          </html>
        `;

        let selectedPage = 0;
        let pageCount = 1;
        let scale = 1;

        function applySelectedPage(){
          try{
            const doc = frame.contentDocument;
            const pages = doc ? Array.from(doc.querySelectorAll('.am-v652-page')) : [];
            pageCount = pages.length || 1;

            pages.forEach((page, index) => {
              page.style.display = index === selectedPage ? 'block' : 'none';
              page.setAttribute('data-page-visible', index === selectedPage ? 'true' : 'false');
            });

            const availableWidth = Math.max(280, body.clientWidth - 20);
            const visibleHeight = Math.max(420, window.innerHeight - 310);
            scale = Math.min(1, availableWidth / 850, visibleHeight / 1100) * 0.98;

            const scaledWidth = 850 * scale;
            const scaledHeight = 1100 * scale;
            const shellWidth = shell.clientWidth || body.clientWidth || availableWidth;
            const offsetX = Math.max(0, (shellWidth - scaledWidth) / 2);

            frame.style.width = '850px';
            frame.style.height = '1100px';
            frame.style.transform = `translateX(${offsetX}px) scale(${scale})`;
            frame.dataset.scale = String(scale);
            frame.dataset.offsetX = String(offsetX);

            shell.style.height = Math.ceil(scaledHeight) + 'px';
            shell.dataset.pageCount = String(pageCount);
            shell.dataset.scale = String(scale);
            shell.dataset.offsetX = String(offsetX);
            shell.dataset.selectedPage = String(selectedPage + 1);

            if(controls) controls.hidden = pageCount <= 1;
            if(indicator) indicator.textContent = `Page ${selectedPage + 1} of ${pageCount}`;
            if(prev) prev.disabled = selectedPage <= 0;
            if(next) next.disabled = selectedPage >= pageCount - 1;

            window.__approvalPacketFrameStatus = {
              ok: true,
              build: BUILD,
              mode: 'premium-print-one-page-viewer',
              pageCount,
              selectedPage: selectedPage + 1,
              scale,
              shellHeight: shell.style.height,
              frameWidth: 850,
              frameHeight: 1100,
              offsetX
            };
          }catch(error){
            window.__approvalPacketFrameStatus = {
              ok: false,
              build: BUILD,
              mode: 'premium-print-one-page-viewer',
              error: error && error.message ? error.message : String(error)
            };
          }
        }

        if(prev) {
          prev.onclick = () => {
            selectedPage = Math.max(0, selectedPage - 1);
            applySelectedPage();
          };
        }

        if(next) {
          next.onclick = () => {
            selectedPage = Math.min(pageCount - 1, selectedPage + 1);
            applySelectedPage();
          };
        }

        window.__approvalPacketGoToPage = function(pageNumber){
          const n = Number(pageNumber);
          if(!Number.isFinite(n)) return;
          selectedPage = Math.max(0, Math.min(pageCount - 1, n - 1));
          applySelectedPage();
        };

        frame.srcdoc = source;

        frame.onload = () => {
          try{
            const doc = frame.contentDocument;
            if(doc) {
              doc.querySelectorAll('img').forEach(img => {
                const src = String(img.getAttribute('src') || '').toLowerCase();
                const alt = String(img.getAttribute('alt') || '').toLowerCase();
                if(img.classList.contains('am-v652-logo') || src.includes('logo') || src.includes('sixes') || alt.includes('logo')){
                  img.classList.add('am-v652-logo');
                }
              });
            }
            selectedPage = 0;
            applySelectedPage();
          }catch(error){
            window.__approvalPacketFrameStatus = {
              ok: false,
              build: BUILD,
              mode: 'premium-print-one-page-viewer',
              error: error && error.message ? error.message : String(error)
            };
          }
        };

        window.addEventListener('resize', () => {
          clearTimeout(window.__approvalPacketResizeTimer);
          window.__approvalPacketResizeTimer = setTimeout(applySelectedPage, 120);
        }, { passive: true });

        return true;
      }

      function markLogos(inner){
        inner.querySelectorAll('img').forEach(img => {
          const src = String(img.getAttribute('src') || '').toLowerCase();
          const alt = String(img.getAttribute('alt') || '').toLowerCase();
          if(img.classList.contains('am-v652-logo') || src.includes('logo') || src.includes('sixes') || alt.includes('logo')){
            img.classList.add('am-v652-logo');
          }
          img.addEventListener('load', () => setTimeout(applyScale, 80), { once:false });
        });
      }

      function pageHeightSum(inner){
        const pages = Array.from(inner.querySelectorAll('.am-v652-page'));
        const pagesContainer = inner.querySelector('.am-v652-pages');
        const gap = pagesContainer ? (parseFloat(getComputedStyle(pagesContainer).rowGap || getComputedStyle(pagesContainer).gap || '0') || 22) : 22;
        if(!pages.length) return Math.max(inner.scrollHeight || 0, 1200);

        let total = 0;
        pages.forEach(page => {
          total += Math.max(1050, page.scrollHeight || 0, page.offsetHeight || 0);
        });
        total += gap * Math.max(0, pages.length - 1);
        return Math.max(total, inner.scrollHeight || 0);
      }

      function applyScale(){
        const body = els.body;
        const outer = document.querySelector('.packet-scale-outer');
        const inner = document.querySelector('.packet-scale-inner');
        if(!body || !outer || !inner) return null;

        const available = Math.max(280, body.clientWidth - 20);
        const visibleHeight = Math.max(420, window.innerHeight - 300);
        const scale = Math.min(1, available / 850, visibleHeight / 1100) * 0.92;

        document.documentElement.style.setProperty('--scale', String(scale));
        outer.style.width = Math.ceil(850 * scale) + 'px';

        inner.style.zoom = String(scale);
        inner.style.transform = 'none';
        inner.classList.remove('transform-fallback');
        outer.style.height = 'auto';
        outer.style.minHeight = '0';

        setTimeout(() => {
          if(outer.clientHeight < 120){
            inner.style.zoom = '1';
            inner.style.transform = 'scale(' + scale + ')';
            inner.style.transformOrigin = 'top left';
            inner.classList.add('transform-fallback');
            const raw = pageHeightSum(inner);
            outer.style.height = Math.ceil(raw * scale + 40) + 'px';
            outer.style.minHeight = outer.style.height;
          }
        }, 80);

        return { scale };
      }

      function render(row){
        currentRequest = row;
        loadedApprovalStep = clean(row.current_step || row.approval_status);
        setBackLinks(row);

        const name = associationName(row);
        const date = formatDate(meetingDate(row));
        els.title.textContent = name + ' Packet Review';
        els.meta.textContent = date + ' • ' + statusLabel(row);

        const packetMarkup = packetHtmlFrom(row);
        if(!packetMarkup){
          showError('Packet preview is not available for this approval request.');
          return;
        }

        const safePacketMarkup = sanitizePreviewHtml(packetMarkup);

        if(!buildIsolatedPacketFrame(safePacketMarkup)){
          els.body.innerHTML = `
            <div class="packet-stage">
              <div class="packet-scale-outer">
                <div class="packet-scale-inner">${safePacketMarkup}</div>
              </div>
            </div>
          `;

          const inner = document.querySelector('.packet-scale-inner');
          if(inner) {
            injectPacketPrintLayoutLock(inner);
            markLogos(inner);
          }

          requestAnimationFrame(() => {
            applyScale();
            setTimeout(applyScale, 260);
            setTimeout(applyScale, 900);
          });
        }

        const step = clean(row.current_step || row.approval_status);
        const canApprove = step === 'pending_board' || step === 'pending_supervisor';
        setApproveVisible(canApprove);
        [els.approveTop, els.approveBottom].forEach(btn => {
          if(canApprove){
            btn.disabled = false;
            btn.textContent = 'Approve Packet';
          }else{
            btn.disabled = true;
            btn.textContent = 'Approval Complete';
          }
        });
      }

      async function getSupabase(){
        if(supabaseClient) return supabaseClient;

        if(window.supabaseClient && typeof window.supabaseClient.from === 'function'){
          supabaseClient = window.supabaseClient;
          return supabaseClient;
        }

        if(window.sb && typeof window.sb.from === 'function'){
          supabaseClient = window.sb;
          window.supabaseClient = supabaseClient;
          return supabaseClient;
        }

        if(window.getSupabase && typeof window.getSupabase === 'function'){
          const c = window.getSupabase();
          if(c && typeof c.from === 'function'){
            supabaseClient = c;
            window.supabaseClient = supabaseClient;
            return supabaseClient;
          }
        }

        if(!SUPABASE_ANON_KEY){
          throw new Error('Supabase publishable key is missing on this review page.');
        }

        if(!window.supabase || typeof window.supabase.createClient !== 'function'){
          throw new Error('Supabase client library did not load.');
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });
        window.supabaseClient = supabaseClient;
        window.sb = supabaseClient;
        return supabaseClient;
      }

      async function loadRequest(){
        const id = requestId();
        const token = reviewToken();
        if(!id) throw new Error('Missing approval_request_id in the link.');
        if(!token) throw new Error('Missing approval token in the link.');

        const response = await fetch(functionUrl('annual-approval-review'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ request_id: id, token })
        });

        const payload = await response.json().catch(() => ({}));
        if(!response.ok || !payload.ok){
          throw new Error(payload.error || 'Approval request not found or you do not have access.');
        }

        return payload.request;
      }

      async function approve(){
        if(!currentRequest || !currentRequest.id) return;

        const buttons = [els.approveTop, els.approveBottom];
        buttons.forEach(btn => {
          btn.disabled = true;
          btn.textContent = 'Approving…';
        });

        try{
          const response = await fetch(functionUrl('annual-approval-approve'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              apikey: SUPABASE_ANON_KEY,
              Authorization: `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({
              request_id: currentRequest.id,
              token: reviewToken(),
              expected_step: loadedApprovalStep
            })
          });

          const payload = await response.json().catch(() => ({}));
          if(!response.ok || !payload.ok){
            if(payload && payload.already_advanced){
              throw new Error(payload.error || 'This approval step has already been completed.');
            }
            throw new Error(payload.error || 'Approval failed.');
          }

          currentRequest = payload.request;
          loadedApprovalStep = '';
          showStatus('Packet approved successfully. This approval step is complete and has been sent to the next step.');

          buttons.forEach(btn => {
            btn.disabled = true;
            btn.textContent = 'Approved';
            btn.style.display = 'none';
          });

          render(payload.request);
        }catch(error){
          showStatus(error && error.message ? error.message : String(error), 'error');
          buttons.forEach(btn => {
            btn.disabled = false;
            btn.textContent = 'Approve Packet';
          });
        }
      }

      async function boot(){
        try{
          const row = await loadRequest();
          render(row);
        }catch(error){
          showError(error && error.message ? error.message : String(error));
        }
      }

      els.approveTop.addEventListener('click', approve);
      els.approveBottom.addEventListener('click', approve);
      els.printButton.addEventListener('click', () => window.print());
      els.closeTop.addEventListener('click', () => {
        const href = els.backBottom.getAttribute('href') || 'board_member_hub_v2.html';
        window.location.href = href;
      });
      window.addEventListener('resize', () => setTimeout(applyScale, 120));
      window.addEventListener('orientationchange', () => setTimeout(applyScale, 500));

      window.getApprovalPacketReviewStatus = function(){
        const outer = document.querySelector('.packet-scale-outer');
        const inner = document.querySelector('.packet-scale-inner');
        const frame = document.getElementById('packetPrintFrame');
        const shell = document.getElementById('packetFrameShell');
        return {
          build: BUILD,
          installed: true,
          requestId: requestId(),
          hasToken: !!reviewToken(),
          hasRequest: !!currentRequest,
          loadedApprovalStep,
          hasV719PremiumPrintPage: !!frame,
          frameStatus: window.__approvalPacketFrameStatus || null,
          shellClientHeight: shell ? shell.clientHeight : null,
          shellScrollHeight: shell ? shell.scrollHeight : null,
          frameHeight: frame ? frame.style.height : null,
          frameScale: frame ? frame.dataset.scale : null,
          frameOffsetX: frame ? frame.dataset.offsetX : null,
          outerFound: !!outer,
          innerFound: !!inner,
          pageCount: frame && shell ? Number(shell.dataset.pageCount || 0) : (inner ? inner.querySelectorAll('.am-v652-page').length : 0),
          bodyClientHeight: els.body ? els.body.clientHeight : null,
          bodyScrollHeight: els.body ? els.body.scrollHeight : null,
          outerClientHeight: outer ? outer.clientHeight : null,
          outerScrollHeight: outer ? outer.scrollHeight : null,
          innerScrollHeight: inner ? inner.scrollHeight : null,
          status: currentRequest ? {
            current_step: currentRequest.current_step,
            approval_status: currentRequest.approval_status
          } : null
        };
      };

      boot();
    })();
  </script>
