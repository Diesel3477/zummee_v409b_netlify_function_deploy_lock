<script>
// v840: ensureSupabase Promise shim (clean)
function ensureSupabaseSync(){
  try{
    if(window.sb) return window.sb;
    if(window.supabaseClient) return window.supabaseClient;
    if(window.supabase) return window.supabase;
    if(typeof getSupabaseClientSafe === 'function') return getSupabaseClientSafe();
  }catch(e){}
  return null;
}
function ensureSupabase(){
  return new Promise(function(resolve){
    var c = ensureSupabaseSync();
    if(c) return resolve(c);
    var start = Date.now();
    var t = setInterval(function(){
      var cc = ensureSupabaseSync();
      if(cc){
        clearInterval(t);
        resolve(cc);
      } else if(Date.now() - start > 4000){
        clearInterval(t);
        resolve(null);
      }
    }, 50);
  });
}
</script>

<script>
  // --- Communities dropdown (same behavior as Daily Ops) ---
  (function(){
    const SUPABASE_URL = "https://slcwuuwyrgnmlmxpcaim.supabase.co";
    const SUPABASE_KEY = "sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864";
    let SELECTED_COMMUNITY_KEY = (window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) || "zummee_selected_community_v1";

    async function ensureSupabase() {
      if(window.sb) return window.sb;
      if(!window.supabase) throw new Error("Supabase library not loaded");
      window.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: { storageKey:'sb-zummee-auth', storage: window.localStorage, persistSession:true, autoRefreshToken:true, detectSessionInUrl:true  }
      });
      return window.sb;
    }

    async function getSessionSafe(sb, ms){
      ms = ms || 5000;
      return await Promise.race([
        sb.auth.getSession(),
        new Promise((resolve) => {
          let done = false;
          const sub = sb.auth.onAuthStateChange((event, session) => {
            if(done) return;
            if(event === 'INITIAL_SESSION' || session){
              done = true;
              try{ sub.data.subscription.unsubscribe(); }catch(_e){}
              resolve({ data: { session } });
            }
          });
          setTimeout(() => {
            if(done) return;
            done = true;
            try{ sub.data.subscription.unsubscribe(); }catch(_e){}
            resolve({ data: { session: null }, error: new Error('session timeout') });
          }, ms);
        })
      ]);
    }

    function safeLocalSet(k,v){ try{ localStorage.setItem(k,v); }catch(_e){} }
    function safeLocalGet(k){ try{ return localStorage.getItem(k)||""; }catch(_e){ return ""; } }

    async function requireUid() {
      const sb = await ensureSupabase();
      const s = await getSessionSafe(sb, 5000);
      const uid = s.data?.session?.user?.id;
      if(!uid) throw new Error("Not signed in");
      return uid;
    }

    async function getProfile() {
      const sb = await ensureSupabase();
      const uid = await requireUid();
      const q = await sb.from("profiles").select("*").eq("id", uid).maybeSingle();
      if(q.error) throw q.error;
      return { uid, company:(q.data?.company||"").trim(), selected:(q.data?.selected_community_id||"") };
    }

    function els() {
      return {
        select: document.getElementById("zummeeCommunitySelect"),
        swatch: document.getElementById("zummeeCommunitySwatch"),
        btnAdd: document.getElementById("zummeeCommunityAdd"),
        btnRename: document.getElementById("zummeeCommunityRename"),
        btnRemove: document.getElementById("zummeeCommunityRemove"),
        sync: document.getElementById("zummeeCommunitySync"),
      };
    }

    async function waitForCommunitySelect(timeoutMs){
      const timeout = Number(timeoutMs || 4000);
      const start = Date.now();
      while(Date.now() - start < timeout){
        const e = els();
        if(e.select) return e.select;
        await new Promise(resolve => setTimeout(resolve, 120));
      }
      return null;
    }

    function bindSelectIfReady(){
      const e = els();
      if(!e.select) return false;
      bindSelect(e.select);
      return true;
    }

    function setSwatch(seed){
      const e = els().swatch;
      if(!e) return;
      const s = String(seed||"");
      let h=0; for(let i=0;i<s.length;i++) h=(h*31 + s.charCodeAt(i))>>>0;
      const hue = h % 360;
      e.style.background = `hsl(${hue} 70% 45%)`;
      e.title = seed || "No company";
    }

    function rebindButton(btn, handler){
      if(!btn || !btn.parentNode) return btn;
      try{ btn.onclick = null; btn.removeAttribute("onclick"); }catch(_e){}
      const clone = btn.cloneNode(true);
      try{ clone.onclick = null; clone.removeAttribute("onclick"); }catch(_e){}
      btn.parentNode.replaceChild(clone, btn);
      clone.addEventListener("click", function(ev){
        try{ ev.preventDefault(); ev.stopImmediatePropagation(); }catch(_e){}
        return handler();
      }, true);
      return clone;
    }

    function bindSelect(select) {
      if(!select) return;
      select.onchange = async ()=>{
        const val = String(select.value||"").trim();
        // Write to all known selected-community keys so all pages stay in sync.
        safeLocalSet("zummee_selected_community_id", val);
        safeLocalSet("zummee_selected_community_v1", val);
        try{
          SELECTED_COMMUNITY_KEY = (window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) || SELECTED_COMMUNITY_KEY;
          safeLocalSet(SELECTED_COMMUNITY_KEY, val);
        }catch(_e){}
        try{
          const sb = await ensureSupabase();
          const uid = await requireUid();
          await sb.from("profiles").update({ selected_community_id: val || null }).eq("id", uid);
        }catch(_e){}
        document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: val } }));
      };
    }

    function getLocalCommunitiesKey(){
      return (window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.COMMUNITIES_KEY) || window.COMMUNITIES_KEY || "zummee_communities_v1";
    }

    function readLocalCommunities(){
      try{
        const raw = localStorage.getItem(getLocalCommunitiesKey()) || "[]";
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      }catch(_e){
        return [];
      }
    }

    function writeLocalCommunities(list){
      try{ localStorage.setItem(getLocalCommunitiesKey(), JSON.stringify(list||[])); }catch(_e){}
    }

    // Merge any locally stored communities into Supabase (silent, no UI recursion)
    async function mergeLocalCommunitiesToCloudSilent(ctx){
      try{
        if(!(window.sb && window.sb.from)) return { inserted: 0 };
        if(typeof navigator!=="undefined" && !navigator.onLine) return { inserted: 0 };
        if(!ctx || !ctx.company) return { inserted: 0 };

        const localRaw = readLocalCommunities();
        const local = (localRaw||[])
          .map(x => ({ name: String((typeof x==="string") ? x : ((x && x.name) || "")).trim() }))
          .filter(x => x.name)
          .filter((x,i,arr)=> arr.findIndex(y=>y.name.toLowerCase()===x.name.toLowerCase())===i);
        if(!local.length) return { inserted: 0 };

        const q = await window.sb.from("PropertyCommunities").select("id,name").ilike("company", String(ctx.company).trim());
        if(q.error) return { inserted: 0 };
        const cloudNames = new Set((q.data||[]).map(c=>String(c && c.name || "").trim().toLowerCase()).filter(Boolean));

        const toInsert = local
          .filter(c => !cloudNames.has(c.name.toLowerCase()))
          .map(c => ({ company: String(ctx.company).trim(), name: c.name || null }));
        if(!toInsert.length) return { inserted: 0 };

        const ins = await window.sb.from("PropertyCommunities").insert(toInsert).select("id");
        if(ins.error) return { inserted: 0 };
        return { inserted: (ins.data||[]).length };
      }catch(_e){
        return { inserted: 0 };
      }
    }

    async function syncLocalCommunitiesToCloud(profile){
      const p = profile || await getProfile();
      if(!p.company) throw new Error("Set your Management Company in Profile first.");
      await ensureSupabase();

      const localRaw = readLocalCommunities();
      const local = (localRaw||[])
        .map(x => ({ name: String((typeof x==="string") ? x : ((x && x.name) || "")).trim() }))
        .filter(x => x.name)
        .filter((x,i,arr)=> arr.findIndex(y=>y.name.toLowerCase()===x.name.toLowerCase())===i);

      const cloudQ = await window.sb.from("PropertyCommunities").select("id,name").ilike("company", String(p.company).trim());
      if(cloudQ.error) throw cloudQ.error;
      const cloudNames = new Set((cloudQ.data||[]).map(c=>String(c && c.name || "").trim().toLowerCase()).filter(Boolean));

      const toInsert = local
        .filter(c => !cloudNames.has(c.name.toLowerCase()))
        .map(c => ({ company: String(p.company).trim(), name: c.name }));

      let inserted = 0;
      if(toInsert.length){
        const ins = await window.sb.from("PropertyCommunities").insert(toInsert).select("id");
        if(ins.error) throw ins.error;
        inserted = (ins.data||[]).length;
      }

      // Return updated cloud count for info
      const cloudQ2 = await window.sb.from("PropertyCommunities").select("id", { count: "exact", head: true }).ilike("company", String(p.company).trim());
      const totalCloud = cloudQ2.count || 0;
      return { inserted, totalCloud };
    }

    function configureSyncButton(profile, cloudList){
      const btn = (els() || {}).sync;
      if(!btn) return;
      btn.style.display = "none";
      btn.disabled = false;
      try{ btn.onclick = null; }catch(_e){}

      const online = (typeof navigator!=="undefined") ? !!navigator.onLine : true;
      if(!online){
        btn.style.display = "";
        btn.disabled = true;
        btn.title = "Offline — sync unavailable";
        return;
      }

      let needsSync = false;
      try{
        const localRaw = readLocalCommunities();
        const localNames = new Set((localRaw||[]).map(x => {
          if(typeof x === "string") return x.trim();
          return String((x && x.name) || "").trim();
        }).filter(Boolean).map(n => n.toLowerCase()));

        const cloudNames = new Set((cloudList||[]).map(c => String((c && c.name) || "").trim().toLowerCase()).filter(Boolean));

        for(const n of localNames){
          if(!cloudNames.has(n)) { needsSync = true; break; }
        }
        if(!needsSync && (localRaw||[]).some(x => typeof x === "string")) needsSync = true;
      }catch(_e){
        needsSync = false;
      }

      if(!needsSync) return;

      btn.style.display = "";
      btn.title = "Uploads any locally stored communities into Supabase (merge, no deletes).";

      btn.onclick = async function(){
        btn.disabled = true;
        const oldText = btn.textContent;
        btn.textContent = "Syncing…";
        try{
          const res = await syncLocalCommunitiesToCloud(profile);
          alert(`Synced communities to cloud. Added ${res.inserted}. Cloud total: ${res.totalCloud}.`);
          try{ document.dispatchEvent(new CustomEvent("communities:changed")); }catch(_e){}
        }catch(err){
          alert("Sync failed: " + (err && err.message ? err.message : String(err||"Unknown error")));
        }finally{
          btn.textContent = oldText;
          btn.disabled = false;
        }
      };
    }

    async function listCommunities(profile) {
      // Cloud-first; fallback to local cache if needed.
      try{
        if(window.sb && profile && profile.company){
          try{ if(typeof mergeLocalCommunitiesToCloudSilent==='function') await mergeLocalCommunitiesToCloudSilent({company: String(profile.company).trim(), uid: profile.uid}); }catch(_e){}
          const q = await window.sb
            .from('PropertyCommunities')
            .select('id,name,created_at')
            .ilike('company', String(profile.company).trim())
            .order('name', { ascending: true });
          if(!q.error){
            const cloudList = (q.data||[])
              .filter(c=>c && c.id && c.name)
              .map(c=>({ id:String(c.id), name:String(c.name) }));
            writeLocalCommunities(cloudList);
            return cloudList;
          }
        }
      }catch(_e){ /* fall back */ }

      return (readLocalCommunities()||[])
        .filter(c=>c && c.id && c.name)
        .map(c=>({ id:String(c.id), name:String(c.name) }))
        .sort((a,b)=>a.name.localeCompare(b.name));
    }

    function renderSelect(select, list, selectedId) {
      if(!select) return;
      const desired = String(selectedId||"").trim() || safeLocalGet("zummee_selected_community_id");
      select.innerHTML = "";

      const o0 = document.createElement("option");
      o0.value = "";
      o0.textContent = list.length ? "Select a community" : "No communities yet";
      select.appendChild(o0);

      list.forEach(c=>{
        const o=document.createElement("option");
        o.value = String(c.id);
        o.textContent = c.name;
        select.appendChild(o);
      });

      let resolvedId = "";
      if(desired && list.some(c=>String(c.id)===String(desired))) {
        resolvedId = String(desired);
      } else if(desired) {
        const byName = list.find(c => String(c.name||"").trim().toLowerCase() === String(desired).trim().toLowerCase());
        if(byName) resolvedId = String(byName.id);
      }

      if(resolvedId) {
        select.value = String(resolvedId);
        safeLocalSet("zummee_selected_community_id", String(resolvedId));
        safeLocalSet("zummee_selected_community_v1", String(resolvedId));
        try{ safeLocalSet(SELECTED_COMMUNITY_KEY, String(resolvedId)); }catch(_e){}
        try{ document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: String(resolvedId) } })); }catch(_e){}
        if(String(resolvedId) !== String(desired)){
          (async () => {
            try{
              const uid = await requireUid();
              await window.sb.from("profiles").update({ selected_community_id: resolvedId }).eq("id", uid);
            }catch(_e){}
          })();
        }
      } else {
        select.value = "";
        safeLocalSet("zummee_selected_community_id","");
      }

      select.disabled = false;
      bindSelect(select);
    }

    async function refreshUI() {
      let e = els();
      if(!e.select){
        await waitForCommunitySelect(5000);
        e = els();
      }
      if(!e.select) return;
      try{
        const profile = await getProfile();
        setSwatch(profile.company);
        if(!profile.company){
          renderSelect(e.select, [], "");
          bindSelect(e.select);
          return;
        }
        const list = await listCommunities(profile);
        renderSelect(e.select, list, profile.selected);
        bindSelect(e.select);
        try{ configureSyncButton(profile, list); }catch(_e){}
      }catch(_e){
        renderSelect(e.select, [], "");
        bindSelect(e.select);
      }
    }

    async function addCommunity(){
      const profile = await getProfile();
      if(!profile.company) return alert("Set your Management Company in Profile first.");
      const name = prompt("Community name:");
      if(!name) return;
      const clean = name.trim();
      if(!clean) return;

      // Try cloud insert; fallback to local insert
      try{
        const sb = await ensureSupabase();
        const ins = await sb.from("PropertyCommunities").insert([{ company: profile.company, name: clean }]).select("id").single();
        if(ins.error) throw ins.error;
        await sb.from("profiles").update({ selected_community_id: String(ins.data.id) }).eq("id", profile.uid);
      }catch(_e){
        const list = readLocalCommunities();
        const exists = list.some(c=>String(c.name||"").trim().toLowerCase() === clean.toLowerCase());
        if(exists) return alert("That community already exists in your list.");
        const id = String(Date.now()) + "_" + Math.random().toString(16).slice(2);
        list.push({ id, name: clean });
        writeLocalCommunities(list);
        safeLocalSet("zummee_selected_community_id", id);
      }

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
    }

    async function renameCommunity(){
      const e = els();
      const id = String(e.select?.value||"").trim();
      if(!id) return alert("Select a community first.");
      const cur = e.select.options[e.select.selectedIndex]?.textContent || "";
      const name = prompt("New community name:", cur);
      if(!name) return;
      const clean = name.trim();
      if(!clean) return;

      try{
        const profile = await getProfile();
        const sb = await ensureSupabase();
        const up = await sb.from("PropertyCommunities").update({ name: clean }).eq("id", id).ilike("company", profile.company);
        if(up.error) throw up.error;
      }catch(_e){
        const list = readLocalCommunities();
        const idx = list.findIndex(c=>String(c.id)===String(id));
        if(idx === -1) return;
        list[idx].name = clean;
        writeLocalCommunities(list);
      }

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
      if(e.select) e.select.value = id;
    }

    async function removeCommunity(){
      const e = els();
      const id = String(e.select?.value||"").trim();
      if(!id) return alert("Select a community first.");
      if(!confirm("Remove this community?")) return;

      try{
        const profile = await getProfile();
        const sb = await ensureSupabase();
        const del = await sb.from("PropertyCommunities").delete().eq("id", id).ilike("company", profile.company);
        if(del.error) throw del.error;
        await sb.from("profiles").update({ selected_community_id: null }).eq("id", profile.uid);
      }catch(_e){
        const list = readLocalCommunities().filter(c=>String(c.id)!==String(id));
        writeLocalCommunities(list);
        safeLocalSet("zummee_selected_community_id","");
      }

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
      document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: "" } }));
    }

    document.addEventListener("DOMContentLoaded", async ()=>{
      await waitForCommunitySelect(5000);
      const e = els();
      bindSelectIfReady();
      if(e.btnAdd) e.btnAdd = rebindButton(e.btnAdd, addCommunity);
      if(e.btnRename) e.btnRename = rebindButton(e.btnRename, renameCommunity);
      if(e.btnRemove) e.btnRemove = rebindButton(e.btnRemove, removeCommunity);
      await refreshUI();
      setTimeout(()=>{ try{ refreshUI(); }catch(_e){} }, 350);
      try{ window.__zummeeCommunityMgmtV2Bound = true; }catch(_e){}
    });

    document.addEventListener("communities:changed", ()=>refreshUI());
    window.addEventListener("pageshow", ()=>setTimeout(()=>{ try{ refreshUI(); }catch(_e){} }, 120));
    document.addEventListener("community:changed", ()=>setTimeout(()=>{ try{ refreshUI(); }catch(_e){} }, 120));
  })();
</script>

  <script id="zummeeStaffGuard">
  (async () => {
    if (window.__zummeeStaffGuardRan) return;
    window.__zummeeStaffGuardRan = true;

    async function getClient(){
      try{ if(typeof ensureSupabase === 'function'){ const c = await ensureSupabase(); if(c && c.auth && typeof c.auth.getSession === 'function') return c; } }catch(_e){}
      try{ if(window.supabaseClient && window.supabaseClient.auth && typeof window.supabaseClient.auth.getSession === 'function') return window.supabaseClient; }catch(_e){}
      try{ if(window.sb && window.sb.auth && typeof window.sb.auth.getSession === 'function') return window.sb; }catch(_e){}
      return null;
    }

    const go = (target) => {
      try{ window.location.replace(target); }catch(_e){ window.location.href = target; }
    };

    const sb = await getClient();
    if(!sb){ go('login.html'); return; }

    const sessionRes = await sb.auth.getSession();
    const user = sessionRes && sessionRes.data && sessionRes.data.session ? sessionRes.data.session.user : null;
    if(!user){ go('login.html'); return; }

    const ud = await sb
      .from('userdirectory')
      .select('role')
      .eq('auth_user_id', user.id)
      .single();

    const role = String((ud && ud.data && ud.data.role) || '').trim();
    if(role === 'Resident'){ go('resident_portal.html'); return; }

    document.documentElement.setAttribute('data-staff-role', role || '');
  })();
  </script>

<script>
(function(){
  // ------------------------------
  // Safe localStorage helpers (never throw)
  // ------------------------------
  function safeLocalGet(k){
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  }
  function safeLocalSet(k,v){
    try{ localStorage.setItem(k, v==null ? "" : String(v)); }catch(e){}
  }

  function emergencyPhoneKey(){
    const uid = getUserId();
    const communityId = getActiveCommunityId();
    let base = "zummee_pool_emergency_phone";
    if(uid) base += "__user__" + uid;
    if(communityId) base += "__community__" + communityId;
    return base;
  }
  function emergencyPhoneLockKey(){
    const uid = getUserId();
    const communityId = getActiveCommunityId();
    let base = "zummee_pool_emergency_phone_lock";
    if(uid) base += "__user__" + uid;
    if(communityId) base += "__community__" + communityId;
    return base;
  }
  function readEmergencyPhone(){
    return safeLocalGet(emergencyPhoneKey()) || "";
  }
  function writeEmergencyPhone(val){
    safeLocalSet(emergencyPhoneKey(), val || "");
  }
  function readEmergencyPhoneLocked(){
    return (safeLocalGet(emergencyPhoneLockKey()) || "") === "1";
  }
  function writeEmergencyPhoneLocked(locked){
    safeLocalSet(emergencyPhoneLockKey(), locked ? "1" : "0");
  }

  const OPENING_ITEMS = [
    "Remove pool cover (if applicable)",
    "Inspect pool deck, gates, and signage",
    "Verify safety equipment is present (ring buoy, shepherd hook, first aid)",
    "Check pumps/filters/heaters for leaks and proper operation",
    "Prime/clean skimmer baskets and pump strainer basket",
    "Test water chemistry (pH / chlorine / alkalinity) and adjust",
    "Brush and vacuum pool; empty baskets",
    "Set furniture and confirm pool rules signage is posted",
    "Log opening checklist complete"
  ];

  const CLOSING_ITEMS = [
    "Skim, brush, and vacuum pool thoroughly",
    "Balance water chemistry for closing",
    "Backwash/clean filter; empty baskets",
    "Lower water level (if required for your cover/type)",
    "Winterize lines and equipment (blow out, plug, antifreeze if used)",
    "Shut down and secure pumps/heaters; drain as needed",
    "Remove/store furniture and pool accessories",
    "Install pool cover (if applicable) and secure",
    "Lock gates/secure area and post closing signage",
    "Log closing checklist complete"
  ];

  function getUserId(){
    try { return String(localStorage.getItem("zummee_user_id_v1")||"").trim(); }
    catch(e){ return ""; }
  }

  function getActiveCommunityId(){
    try{
      const liveSelect = document.getElementById("zummeeCommunitySelect");
      const liveValue = String((liveSelect && liveSelect.value) || "").trim();
      if(liveValue) return liveValue;

      return String(
        localStorage.getItem("zummee_selected_community_id") ||
        localStorage.getItem("zummee_selected_community_v1") ||
        ((window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) ? localStorage.getItem(window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) : "") ||
        ""
      ).trim();
    }catch(e){ return ""; }
  }

  function key(kind){
    const uid = getUserId();
    const communityId = getActiveCommunityId();
    let base = "zummee_pool_ops_" + kind;
    if(uid) base += "__user__" + uid;
    if(communityId) base += "__community__" + communityId;
    return base;
  }

  function dateKey(kind){
    return key(kind+"_date");
  }

  function loadDateState(kind){
    try{
      const raw = localStorage.getItem(dateKey(kind));
      if(!raw) return { value: "", locked: false };
      const parsed = JSON.parse(raw);
      return {
        value: (parsed && typeof parsed.value === "string") ? parsed.value : "",
        locked: !!(parsed && parsed.locked)
      };
    }catch(e){
      return { value: "", locked: false };
    }
  }

  function saveDateState(kind, state){
    try{ localStorage.setItem(dateKey(kind), JSON.stringify({ value: state.value || "", locked: !!state.locked })); }catch(e){}
  }

  function syncDateUI(kind){
    const input = document.getElementById(kind === "opening" ? "poolOpeningDate" : "poolClosingDate");
    const btn = document.getElementById(kind === "opening" ? "poolOpeningDateLock" : "poolClosingDateLock");
    if(!input || !btn) return;

    const state = loadDateState(kind);
    if(input.value !== state.value) input.value = state.value;
    input.disabled = !!state.locked;
    // Show state on the button itself (easy to see at a glance)
    btn.textContent = state.locked ? "🔒 Locked" : "🔓 Unlocked";
    btn.title = state.locked ? "Unlock" : "Lock";
    btn.classList.toggle("is-locked", !!state.locked);
    btn.classList.toggle("is-unlocked", !state.locked);
  }

  function initDateField(kind){
    const input = document.getElementById(kind === "opening" ? "poolOpeningDate" : "poolClosingDate");
    if(!input) return;

    if(input.dataset.inited === "1") {
      syncDateUI(kind);
      return;
    }
    input.dataset.inited = "1";

    // Initialize once
    const state = loadDateState(kind);
    input.value = state.value || "";
    input.disabled = !!state.locked;

    input.addEventListener("change", ()=>{
      const st = loadDateState(kind);
      if(st.locked) {
        // revert if locked
        input.value = st.value || "";
        return;
      }
      saveDateState(kind, { value: input.value || "", locked: false });
      syncDateUI(kind);
    });

    syncDateUI(kind);
  }

  window.toggleDateLock = function(kind){
    const input = document.getElementById(kind === "opening" ? "poolOpeningDate" : "poolClosingDate");
    if(!input) return;
    const current = loadDateState(kind);
    const next = { value: (current.locked ? current.value : (input.value || current.value || "")), locked: !current.locked };
    saveDateState(kind, next);
    syncDateUI(kind);
  };

  function load(kind, defaults){
    try{
      const raw = localStorage.getItem(key(kind));
      if(!raw) return defaults.map((label,i)=>({id:i+1,label,done:false}));
      const parsed = JSON.parse(raw);
      const doneByLabel = new Map((parsed||[]).map(x=>[x.label, !!x.done]));
      return defaults.map((label,i)=>({id:i+1,label,done: doneByLabel.get(label) || false}));
    }catch(e){
      return defaults.map((label,i)=>({id:i+1,label,done:false}));
    }
  }

  function save(kind, items){
    try{ localStorage.setItem(key(kind), JSON.stringify(items)); }catch(e){}
  }

  function esc(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function render(containerId, kind, defaults){
    const el = document.getElementById(containerId);
    if(!el) return;
    const items = load(kind, defaults);
    el.innerHTML = items.map(it => (
      '<label class="checklist-item">'+
        '<input type="checkbox" '+(it.done?'checked':'')+' data-kind="'+kind+'" data-label="'+esc(it.label)+'"/>'+
        '<span>'+esc(it.label)+'</span>'+
      '</label>'
    )).join("");

    el.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
      cb.addEventListener("change", (e)=>{
        const label = e.target.getAttribute("data-label");
        const kind = e.target.getAttribute("data-kind");
        const current = load(kind, kind==="opening"?OPENING_ITEMS:CLOSING_ITEMS);
        const updated = current.map(x => x.label===label ? ({...x, done:e.target.checked}) : x);
        save(kind, updated);
      });
    });
  }

  window.resetChecklist = function(kind){
    const defaults = kind==="opening" ? OPENING_ITEMS : CLOSING_ITEMS;
    const items = defaults.map((label,i)=>({id:i+1,label,done:false}));
    save(kind, items);
    draw();
  };

  // ------------------------------
  // Pool Emergency Phone (auto-format + click-to-call)
  // ------------------------------
  function phoneKey(){
    return key("emergency_phone");
  }

  function phoneLockKey(){
    return phoneKey() + "__locked";
  }

  function loadPhoneLocked(){
    try{ return localStorage.getItem(phoneLockKey()) === "1"; }catch(e){ return false; }
  }

  function savePhoneLocked(locked){
    try{ localStorage.setItem(phoneLockKey(), locked ? "1" : "0"); }catch(e){}
  }

  function setPoolPhoneFieldsDisabled(disabled){
    const ids = [
      "poolEmergencyPhone",
      "poolServiceProvider",
      "poolServiceProviderPhone",
      "poolServiceAccount",
      "poolServiceTaxId"
    ];
    ids.forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      el.disabled = !!disabled;
      el.setAttribute("aria-disabled", disabled ? "true" : "false");
    });
  }

  function syncEmergencyLockUI(){
    const input = document.getElementById("poolEmergencyPhone");
    const btn = document.getElementById("poolEmergencyPhoneLock");
    const hint = document.getElementById("poolEmergencyHint");
    const locked = loadPhoneLocked();

    // Master lock: locks ALL fields in the pool phone section
    setPoolPhoneFieldsDisabled(locked);

    if(btn){
      // Show state on the icon itself (big + obvious)
      btn.textContent = locked ? "🔒" : "🔓";
      btn.setAttribute("aria-label", locked ? "Pool phone section locked" : "Pool phone section unlocked");
      btn.title = locked ? "Unlock" : "Lock";
      btn.classList.toggle("is-locked", locked);
      btn.classList.toggle("is-unlocked", !locked);
    }
    if(hint){
      // keep validity hint if valid; otherwise show lock state guidance
      const val = input ? (input.value || "") : "";
      const isValid = val.length === 12;
      if(isValid){
        hint.textContent = "Ready to call.";
      } else {
        hint.textContent = locked ? "Locked. Unlock to edit." : "Enter a 10-digit number.";
      }
    }
  }

  function toggleEmergencyLock(){
    const locked = loadPhoneLocked();
    savePhoneLocked(!locked);
    syncEmergencyUI();      // keeps call button correct
    syncEmergencyLockUI();  // updates input+button
  }

  function formatPhone(raw){
    const digits = String(raw||"").replace(/\D/g, "").slice(0,10);
    const a = digits.slice(0,3);
    const b = digits.slice(3,6);
    const c = digits.slice(6,10);
    if(digits.length <= 3) return a;
    if(digits.length <= 6) return a + "-" + b;
    return a + "-" + b + "-" + c;
  }

  function syncEmergencyUI(){
    const input = document.getElementById("poolEmergencyPhone");
    const call = document.getElementById("poolEmergencyCall");
    const hint = document.getElementById("poolEmergencyHint");
    if(!input) return;

    const val = input.value || "";
    const isValid = val.length === 12; // ###-###-####
    if(call){
      if(isValid){
        call.href = "tel:" + val.replace(/-/g,"");
        call.style.display = "inline-flex";
      } else {
        call.style.display = "none";
        call.href = "#";
      }
    }
    if(hint){
      if(isValid){
        hint.textContent = "Ready to call.";
      } else {
        hint.textContent = loadPhoneLocked() ? "Locked. Unlock to edit." : "Enter a 10-digit number.";
      }
    }
  }

  function hydrateEmergencyPhone(){
    const input = document.getElementById("poolEmergencyPhone");
    const callBtn = document.getElementById("poolEmergencyCall");
    const lockBtn = document.getElementById("poolEmergencyPhoneLock");
    const hint = document.getElementById("poolEmergencyHint");
    if(!input || !lockBtn) return;

    const raw = readEmergencyPhone();
    const locked = readEmergencyPhoneLocked();
    input.value = formatPhone(raw || "");
    input.disabled = !!locked;
    lockBtn.classList.toggle("is-locked", !!locked);
    lockBtn.classList.toggle("is-unlocked", !locked);
    lockBtn.textContent = locked ? "🔒" : "🔓";
    lockBtn.title = locked ? "Unlock" : "Lock";
    if(hint) hint.textContent = locked ? "Locked for this community." : "Enter a 10-digit number.";
    if(callBtn){
      const formatted = formatPhone(raw || "");
      if(formatted && formatted.length === 12){
        callBtn.href = "tel:" + formatted.replace(/-/g, "");
        callBtn.style.display = "inline-flex";
      } else {
        callBtn.href = "#";
        callBtn.style.display = "none";
      }
    }
  }

  function initEmergencyPhone(){
    const input = document.getElementById("poolEmergencyPhone");
    if(!input) return;
    if(input.dataset.inited === "1") {
      hydrateEmergencyPhone();
      syncEmergencyUI();
      syncEmergencyLockUI();
      return;
    }
    input.dataset.inited = "1";

    hydrateEmergencyPhone();
    syncEmergencyUI();
    syncEmergencyLockUI();

    const lockBtn = document.getElementById("poolEmergencyPhoneLock");
    if(lockBtn && lockBtn.dataset.inited !== "1"){
      lockBtn.dataset.inited = "1";
      lockBtn.addEventListener("click", toggleEmergencyLock);
    }

    input.addEventListener("input", ()=>{
      const formatted = formatPhone(input.value);
      input.value = formatted;
      writeEmergencyPhone(formatted);
      syncEmergencyUI();
      syncEmergencyLockUI();
    });
  }

  function draw(){
    render("poolOpeningChecklist","opening",OPENING_ITEMS);
    render("poolClosingChecklist","closing",CLOSING_ITEMS);
    syncDateUI("opening");
    syncDateUI("closing");
  }

  document.addEventListener("DOMContentLoaded", ()=>{
    initDateField("opening");
    initDateField("closing");
    setTimeout(()=>{ try{ initEmergencyPhone(); }catch(_e){} }, 180);
    draw();
  
  // Pool service provider + provider phone + account + tax id (auto-save)
  const spEl = document.getElementById("poolServiceProvider");
  const spPhoneEl = document.getElementById("poolServiceProviderPhone");
  const spCallEl = document.getElementById("poolServiceProviderCall");
  const acctEl = document.getElementById("poolServiceAccount");
  const taxEl = document.getElementById("poolServiceTaxId");

  function serviceKey(suffix){
    const uid = getUserId();
    const communityId = getActiveCommunityId();
    let base = "zummee_pool_service_" + suffix;
    if(uid) base += "__user__" + uid;
    if(communityId) base += "__community__" + communityId;
    return base;
  }
  function readServiceField(suffix){
    return safeLocalGet(serviceKey(suffix)) || "";
  }
  function writeServiceField(suffix, value){
    safeLocalSet(serviceKey(suffix), value || "");
  }

  function syncServiceProviderCall(){
    if(!spCallEl) return;
    const val = spPhoneEl ? (spPhoneEl.value || "") : "";
    const isValid = val.length === 12; // ###-###-####
    if(isValid){
      spCallEl.href = "tel:" + val.replace(/-/g,"");
      spCallEl.style.display = "inline-flex";
    } else {
      spCallEl.style.display = "none";
      spCallEl.href = "#";
    }
  }

  function hydrateServiceFields(){
    if (spEl) spEl.value = readServiceField("provider") || "";
    if (spPhoneEl) spPhoneEl.value = formatPhone(readServiceField("provider_phone") || "");
    if (acctEl) acctEl.value = readServiceField("account") || "";
    if (taxEl) taxEl.value = readServiceField("taxid") || "";
    syncServiceProviderCall();
  }

  hydrateServiceFields();

  if (spEl){
    spEl.addEventListener("change", () => writeServiceField("provider", spEl.value || ""));
  }

  if (spPhoneEl){
    spPhoneEl.addEventListener("input", () => {
      const formatted = formatPhone(spPhoneEl.value);
      spPhoneEl.value = formatted;
      writeServiceField("provider_phone", formatted);
      syncServiceProviderCall();
    });
  }
  if (acctEl){
    acctEl.addEventListener("input", () => writeServiceField("account", (acctEl.value || "").trim()));
  }
  if (taxEl){
    taxEl.addEventListener("input", () => writeServiceField("taxid", (taxEl.value || "").trim()));
  }
  document.addEventListener("community:changed", ()=>{
    try{
      draw();
      syncDateUI("opening");
      syncDateUI("closing");
      hydrateServiceFields();
    }catch(_e){}
  });


  document.addEventListener("community:changed", ()=>{
    setTimeout(()=>{
      try{
        initEmergencyPhone();
        hydrateEmergencyPhone();
        syncEmergencyUI();
        syncEmergencyLockUI();
      }catch(_e){}
    }, 120);
  });

  window.addEventListener("pageshow", ()=>{
    setTimeout(()=>{
      try{
        initEmergencyPhone();
        hydrateEmergencyPhone();
        syncEmergencyUI();
        syncEmergencyLockUI();
      }catch(_e){}
    }, 120);
  });


});
})();

// Modern selector UI that wraps the native <select> (keeps existing behavior & RLS-safe updates)
function initModernCommunityPicker(select){
  try{
    if(!select || select.__zumModernBound) return;
    select.__zumModernBound = true;

    // Build UI
    const host = document.createElement("div");
    host.className = "zummee-communityPicker";
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "zummee-communityBtn";
    btn.setAttribute("aria-haspopup","listbox");
    btn.setAttribute("aria-expanded","false");

    const btnLabel = document.createElement("span");
    btnLabel.textContent = "Select…";
    const chev = document.createElement("span");
    chev.className = "zummee-communityChevron";
    btn.appendChild(btnLabel);
    btn.appendChild(chev);

    const menu = document.createElement("div");
    menu.className = "zummee-communityMenu";
    const search = document.createElement("input");
    search.className = "zummee-communitySearch";
    search.type = "text";
    search.placeholder = "Search communities…";
    const list = document.createElement("div");
    list.className = "zummee-communityList";
    menu.appendChild(search);
    menu.appendChild(list);

    host.appendChild(btn);
    host.appendChild(menu);

    // Insert host before select; then hide select
    select.parentNode.insertBefore(host, select);
    select.style.display = "none";

    function getSelectedText(){
      const opt = select.options[select.selectedIndex];
      return opt ? opt.textContent : "";
    }

    function rebuildList(filter){
      const q = String(filter||"").toLowerCase();
      list.innerHTML = "";
      const opts = Array.from(select.options || []);
      if(!opts.length){
        const empty = document.createElement("div");
        empty.className = "zummee-communityMuted";
        empty.textContent = "No communities available.";
        list.appendChild(empty);
        return;
      }
      opts.forEach(opt=>{
        const name = String(opt.textContent||"");
        if(q && !name.toLowerCase().includes(q)) return;
        const item = document.createElement("button");
        item.type="button";
        item.className="zummee-communityItem";

        const label = document.createElement("span");
        label.textContent = name;

        const check = document.createElement("span");
        check.className = "zummee-communityCheck";
        check.setAttribute("aria-hidden","true");

        item.appendChild(label);
        item.appendChild(check);
        item.setAttribute("role","option");
        item.setAttribute("aria-selected", opt.value===select.value ? "true":"false");
        item.addEventListener("click", ()=>{
          select.value = opt.value;
          try{ select.dispatchEvent(new Event("change")); }catch(_e){}
          closeMenu();
        });
        list.appendChild(item);
      });
      if(!list.children.length){
        const none = document.createElement("div");
        none.className = "zummee-communityMuted";
        none.textContent = "No matches.";
        list.appendChild(none);
      }
    }

    function openMenu(){
      menu.classList.add("open");
      btn.setAttribute("aria-expanded","true");
      rebuildList(search.value);
      setTimeout(()=>{ try{ search.focus(); }catch(_e){} }, 10);
    }
    function closeMenu(){
      menu.classList.remove("open");
      btn.setAttribute("aria-expanded","false");
    }

    btn.addEventListener("click", ()=>{
      if(menu.classList.contains("open")) closeMenu();
      else openMenu();
    });
    search.addEventListener("input", ()=> rebuildList(search.value));

    document.addEventListener("click", (e)=>{
      if(host.contains(e.target)) return;
      closeMenu();
    });

    // Keep label in sync
    const sync = ()=>{
      const t = getSelectedText() || "Select…";
      btnLabel.textContent = t;
    };
    sync();
    select.addEventListener("change", sync);

    // Initial list
    rebuildList("");
  }catch(e){
    console.warn("Modern selector init failed", e);
  }
}

// Ensure modern (searchable) community picker is initialized on every page
  document.addEventListener("DOMContentLoaded", function(){
    try{
      var sel = document.getElementById("zummeeCommunitySelect");
      if(sel && typeof initModernCommunityPicker === "function"){
        initModernCommunityPicker(sel);
      }
    }catch(e){}
  });

</script>
