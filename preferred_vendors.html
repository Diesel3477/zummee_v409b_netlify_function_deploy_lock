  <style>

    .pv-sectionTitle{font-size:28px;line-height:1.05;font-weight:950;color:var(--z-navy-2)}
    .pv-smallPill{display:inline-flex;align-items:center;justify-content:center;border:3px solid var(--z-gold);background:#fff8d9;color:var(--z-navy-2);border-radius:999px;font-size:16px;font-weight:950;padding:8px 18px;white-space:nowrap}
    .pv-form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .pv-field,.pv-select{width:100%;min-height:76px;border:3px solid var(--z-line);border-radius:24px;background:#fff;color:var(--z-navy);font-size:21px;font-weight:850;padding:0 22px;outline:none}
    .pv-select{appearance:auto}
    .pv-notes{grid-column:1/-1}
    .pv-formActions{grid-column:1/-1;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .pv-btn{appearance:none;border:3px solid #9ec1ff;border-radius:24px;background:#fff;color:var(--z-navy);min-height:72px;padding:0 32px;font-size:21px;font-weight:950;cursor:pointer;box-shadow:0 12px 28px rgba(15,47,74,.06)}
    .pv-btnPrimary{background:var(--z-navy);color:#fff;border-color:var(--z-navy);min-width:260px}
    .pv-btnDanger{border-color:#ffc3c3;color:#a32525;background:#fff7f7}

    .pv-status{grid-column:1/-1;font-size:16px;font-weight:850;color:var(--z-muted);min-height:22px}
    .pv-status.error{color:#a32525}.pv-status.ok{color:var(--z-green)}
    .pv-marketplace{margin-top:30px;display:flex;flex-direction:column;gap:26px}
    .pv-category{background:#fff;border:3px solid var(--z-line);border-radius:28px;padding:24px;box-shadow:0 12px 34px rgba(15,47,74,.06)}
    .pv-categoryHead{display:flex;justify-content:space-between;align-items:center;gap:18px;border:2px solid var(--z-line);border-radius:24px;padding:20px 22px;margin-bottom:24px;background:linear-gradient(180deg,#fff,#f7fbff)}

    .pv-grid{display:grid;grid-template-columns:1fr;gap:20px}
    .pv-category.is-collapsed .pv-grid{display:none}
    .pv-vendorCard{border:2px solid var(--z-line);border-radius:24px;background:linear-gradient(180deg,#fff,#f9fcff);padding:22px;display:flex;flex-direction:column;gap:18px;box-shadow:0 10px 24px rgba(15,47,74,.06)}
    .pv-vendorTop{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .pv-vendorName{font-size:28px;line-height:1.05;font-weight:950;color:var(--z-navy-2);letter-spacing:-.03em}
    .pv-vendorContact{font-size:16px;font-weight:850;color:var(--z-muted);margin-top:6px}
    .pv-typePill{display:inline-flex;align-items:center;border:2px solid #a7efc6;background:#e9fff2;color:#08763b;border-radius:999px;font-size:14px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;padding:8px 14px;white-space:nowrap}
    .pv-contactGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .pv-contactBlock{display:block;text-decoration:none;border:2px solid var(--z-line);background:#f7fbff;border-radius:20px;padding:14px 16px;color:var(--z-navy)}
    .pv-contactLabel{display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:950;color:var(--z-muted);margin-bottom:5px}
    .pv-contactValue{display:block;font-size:18px;font-weight:950;word-break:break-word;color:#185bc4}
    .pv-notesBox{border:2px solid var(--z-line);background:#fbfdff;border-radius:20px;padding:14px 16px;font-size:17px;font-weight:750;line-height:1.35;color:var(--z-navy)}
    .pv-cardActions{display:flex;gap:12px;flex-wrap:wrap}
    .pv-cardActions .pv-btn{min-height:52px;font-size:15px;border-radius:18px;padding:0 20px}
    .pv-sponsoredLink{text-decoration:none;color:inherit;display:block}
    .pv-sponsored{overflow:hidden;border:2px solid #e8c549;border-radius:24px;background:linear-gradient(135deg,#fff5d2,#ffe49a 52%,#f2c34a);box-shadow:0 16px 34px rgba(190,145,24,.16)}
    .pv-sponsoredTop{padding:14px 16px 0;display:flex;justify-content:space-between;align-items:center}
    .pv-sponsoredPill{display:inline-flex;align-items:center;gap:8px;border:2px solid rgba(255,255,255,.75);border-radius:999px;background:rgba(255,255,255,.62);padding:7px 12px;font-size:11px;font-weight:950;letter-spacing:.20em;text-transform:uppercase;color:#6f4e00}
    .pv-sponsoredMedia{height:220px;margin:14px 16px 0;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;color:#6f4e00;font-weight:950;font-size:24px;text-align:center}
    .pv-sponsoredMedia img{width:100%;height:100%;object-fit:cover;display:block}
    .pv-sponsoredFooter{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:18px 22px 22px}
    .pv-sponsoredName{font-size:26px;font-weight:950;color:var(--z-navy-2)}
    .pv-sponsoredCta{display:inline-flex;align-items:center;justify-content:center;background:var(--z-navy);color:#fff;border-radius:999px;min-height:54px;padding:0 24px;font-size:16px;font-weight:950;white-space:nowrap}
    .pv-empty{border:2px dashed var(--z-line);border-radius:20px;padding:20px;background:#f9fcff;color:var(--z-muted);font-weight:850}
    .pv-footerStatus{font-size:16px;font-weight:850;color:var(--z-muted);margin-top:18px}
    .pv-hidden{display:none!important}
    @media(max-width:820px){
      body{padding:18px 14px 60px}.pv-page{gap:22px}.pv-hero{grid-template-columns:1fr;padding:26px 24px}.pv-heroRight{align-items:flex-start}.pv-logo{position:absolute;right:42px;top:42px;height:62px}.pv-hubBtn{max-width:none;min-height:62px}.pv-kicker{font-size:12px}h1{font-size:40px;max-width:620px}.pv-sub{font-size:19px;max-width:620px}.pv-panel{padding:24px}.pv-form{grid-template-columns:1fr}.pv-field,.pv-select,.pv-search{min-height:68px;font-size:20px}.pv-contactGrid{grid-template-columns:1fr}.pv-categoryHead{align-items:flex-start}.pv-categoryTitle{font-size:28px}.pv-sponsoredMedia{height:190px}.pv-sponsoredFooter{align-items:flex-start}.pv-sponsoredName{font-size:22px}
    }

      .pv-logo{position:static;height:56px}.pv-heroRight{align-items:stretch}.pv-categoryHead,.pv-vendorTop,.pv-sponsoredFooter{flex-direction:column}.pv-btn,.pv-btnPrimary{width:100%;min-width:0}.pv-cardActions .pv-btn{width:auto}.pv-search{font-size:18px;padding:0 18px}.pv-field,.pv-select{font-size:18px}.pv-sponsoredMedia{height:150px}
    }

<body>
  <main class="pv-page">
    <section class="pv-hero">
      <div>
        <div class="pv-kicker">Company Resource</div>
        <h1>Preferred Vendors</h1>
        <p class="pv-sub">Quick access to approved vendors, sponsor placements, and preferred contacts for your management team.</p>
      </div>
      <div class="pv-heroRight">
        <div class="pv-logoMark" id="pvCompanyLogo" aria-label="Sixes Management Group logo">
          <div class="pv-logoWord">SIXES</div>
          <div class="pv-logoSub">MANAGEMENT GROUP</div>
        </div>
        <a class="pv-hubBtn" href="manager_hub.html">Back to Hub</a>
      </div>
    </section>

    <section class="pv-panel">
      <input class="pv-search" id="pv_search" type="search" placeholder="Search vendors (name, type, contact)..." autocomplete="off" />

      <section class="pv-manage" id="pv_manageCard">
        <div class="pv-manageHead">
          <div class="pv-sectionTitle">Manage Vendors</div>
          <button class="pv-smallPill" id="pv_resetFormBtn" type="button">Add vendor</button>
        </div>
        <form class="pv-form" id="pv_form">
          <input class="pv-field" id="pv_vendorName" type="text" placeholder="Vendor name" autocomplete="off" />
          <select class="pv-select" id="pv_vendorType">
            <option value="">Select vendor type</option>
            <option>Plumbing</option><option>Electrical</option><option>HVAC</option><option>Roofing</option><option>Pest Control</option><option>Landscaping</option><option>Pool</option><option>Cleaning / Janitorial</option><option>Attorneys</option><option>Insurance</option><option>Reserve Study</option><option>Elevator</option><option>Fire Safety</option><option>Security</option><option>Asphalt / Concrete</option><option>Painting</option><option>General Contractor</option><option>Restoration</option><option>Tree Service</option><option>Locksmith</option><option>Appliance Repair</option><option>Waste / Recycling</option><option>Other</option>
          </select>
          <input class="pv-field" id="pv_contactName" type="text" placeholder="Contact name" autocomplete="off" />
          <input class="pv-field" id="pv_phone" type="tel" placeholder="Phone" autocomplete="off" />
          <input class="pv-field" id="pv_email" type="email" placeholder="Email" autocomplete="off" />
          <input class="pv-field pv-notes" id="pv_notes" type="text" placeholder="Notes" autocomplete="off" />
          <input id="pv_editKey" type="hidden" value="" />
          <div class="pv-formActions">
            <button class="pv-btn pv-btnPrimary" id="pv_saveBtn" type="submit">Save Vendor</button>
            <button class="pv-btn pv-hidden" id="pv_cancelBtn" type="button">Cancel Edit</button>
          </div>
          <div class="pv-status" id="pv_manageStatus"></div>
        </form>
      </section>

      <div class="pv-marketplace" id="pv_marketplace"></div>
      <div class="pv-footerStatus" id="pv_count"></div>
    </section>
  </main>
  <script src="shared/preferred-vendors-controller.js?v=2026-05-11-v737"></script>
</body>
</html>
