<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Resident Messages</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="shared/supabase-client.js?v=2026-04-26-196"></script><script src="company_logo_sync.js?v=2026-04-26-196"></script>
  <script>
    (function(){
      try{
        var t = localStorage.getItem('mh2-theme') || localStorage.getItem('zummee-theme') || (localStorage.getItem('zummee_dark_mode') === 'true' ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      }catch(_e){ document.documentElement.setAttribute('data-theme','light'); }
    })();
  </script>
  <link rel="stylesheet" href="dark-mode.css?v=2026-04-27-v266">
  <style>:root{--blue:#12324d;--line:#9bc9ff;--muted:#5f7288}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--blue);background:#eef5fb}.shell{max-width:1100px;margin:0 auto;padding:24px 18px 50px}.hero,.card{background:#fff;border:2px solid var(--line);border-radius:28px;box-shadow:0 18px 46px rgba(18,50,77,.10)}.hero{padding:22px 26px;display:flex;justify-content:space-between;gap:16px;align-items:center}.kicker{font-size:12px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#6c7f94}.hero h1{margin:5px 0 0;font-size:30px}.btn{border:2px solid var(--line);background:#fff;color:var(--blue);border-radius:16px;padding:11px 15px;font-weight:950;text-decoration:none;cursor:pointer}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.layout{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px;margin-top:18px}.card{padding:18px}.list{display:grid;gap:12px}.msg{border:1px solid rgba(18,50,77,.12);border-radius:18px;padding:13px;cursor:pointer}.msg:hover{border-color:#78b8ff}.pill{border-radius:999px;background:#eef6ff;color:#1d4ed8;padding:5px 9px;font-size:10px;font-weight:950;text-transform:uppercase}.top{display:flex;justify-content:space-between;gap:10px}.muted{color:var(--muted);font-size:13px;margin-top:5px}.body{margin-top:9px;color:#2c4660}.bubble{padding:11px 13px;border-radius:16px;background:#f8fbff;border:1px solid rgba(18,50,77,.1);margin:9px 0}.bubble.manager{background:#eef6ff;margin-left:24px}textarea{width:100%;min-height:110px;border:1px solid rgba(18,50,77,.16);border-radius:16px;padding:12px;font:inherit;margin-top:12px}.status{font-weight:850;color:var(--muted);margin-top:9px}.empty{padding:13px;border-radius:18px;background:#fff8e6;border:1px solid rgba(180,120,0,.16);color:#725000;font-weight:800}@media(max-width:820px){.layout{grid-template-columns:1fr}.hero{align-items:flex-start;flex-direction:column}}</style></head><body><main class="shell"><section class="hero"><div><div class="kicker">Employee Inbox</div><h1>Resident Messages</h1></div><a class="btn" href="manager_hub.html">Hub</a></section><section class="layout"><section class="card"><h2>Open Messages</h2><div id="messageList" class="list"><div class="empty">Loading messages…</div></div></section><section class="card"><h2 id="threadTitle">Select a message</h2><div id="threadBody" class="empty">Choose a resident message to reply.</div><textarea id="replyBody" placeholder="Type reply…"></textarea><button class="btn primary" id="replyBtn" type="button">Send Reply</button><div id="status" class="status"></div></section></section></main><script>const $=id=>document.getElementById(id);const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let sb=null,user=null,current=null;async function init(){sb=window.ensureSupabase?await window.ensureSupabase():window.supabaseClient;try{user=(await sb.auth.getUser()).data.user}catch(e){}await loadMessages()}async function loadMessages(){const host=$('messageList');try{let q=sb.from('resident_manager_messages').select('*').order('created_at',{ascending:false}).limit(60);if(user&&user.email)q=q.or(`manager_email.eq.${user.email},manager_email.is.null`);const r=await q;if(r.error)throw r.error;const rows=r.data||[];host.innerHTML=rows.length?rows.map(m=>`<div class="msg" data-id="${esc(m.id)}"><div class="top"><strong>${esc(m.subject||'Message')}</strong><span class="pill">${esc(m.status||'open')}</span></div><div class="muted">${esc(m.resident_name||'Resident')} · ${esc(m.community_name||'Community')}</div><div class="body">${esc(m.message||'').slice(0,150)}</div></div>`).join(''):'<div class="empty">No resident messages yet.</div>'}catch(e){console.error(e);host.innerHTML='<div class="empty">Run RESIDENT_MANAGER_MESSAGING_SETUP.sql to enable messages.</div>'}}async function openMsg(id){current=id;const msg=await sb.from('resident_manager_messages').select('*').eq('id',id).single();const rep=await sb.from('resident_manager_message_replies').select('*').eq('message_id',id).order('created_at',{ascending:true});if(msg.error)return;$('threadTitle').textContent=msg.data.subject||'Resident Message';$('threadBody').className='';$('threadBody').innerHTML=`<div class="muted">${esc(msg.data.resident_name||'Resident')} · ${esc(msg.data.community_name||'Community')}</div>`+(rep.data||[]).map(r=>`<div class="bubble ${r.sender_role==='manager'||r.sender_role==='employee'?'manager':''}"><div class="muted">${esc(r.sender_name||r.sender_role)} · ${new Date(r.created_at).toLocaleString()}</div>${esc(r.body||'')}</div>`).join('')}async function sendReply(){if(!current)return;const body=$('replyBody').value.trim();if(!body)return;try{$('status').textContent='Sending…';const name=user?.user_metadata?.full_name||user?.email||'Property Manager';const email=user?.email||null;const r=await sb.from('resident_manager_message_replies').insert({message_id:current,sender_role:'manager',sender_user_id:user?.id||null,sender_name:name,sender_email:email,body});if(r.error)throw r.error;await sb.from('resident_manager_messages').update({status:'replied',updated_at:new Date().toISOString()}).eq('id',current);$('replyBody').value='';$('status').textContent='Reply sent.';await openMsg(current);await loadMessages()}catch(e){console.error(e);$('status').textContent='Could not send reply.'}}document.addEventListener('click',e=>{const n=e.target.closest('[data-id]');if(n)openMsg(n.getAttribute('data-id'))});$('replyBtn').addEventListener('click',sendReply);init();</script>
