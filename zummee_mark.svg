<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Zummee">
  <!-- Clean Zummee mark: white on transparent, crisp strokes -->
  <rect x="18" y="18" width="92" height="92" fill="none" stroke="#ffffff" stroke-width="8" shape-rendering="geometricPrecision"/>

  <!-- Stylized Z (stroke so it scales cleanly) -->
  <path d="M40 44 H88 L40 84 H88" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="square" stroke-linejoin="bevel" shape-rendering="geometricPrecision"/>
</svg>
