// Phone formatting + inline validation (global)
(function(){
  function phoneDigits(v){
    v = String(v||"");
    // keep digits only
    var d = v.replace(/\D/g,"");
    // allow leading 1
    if(d.length===11 && d.charAt(0)==="1") d = d.slice(1);
    return d;
  }
  function formatPhoneUS(v){
    var d = phoneDigits(v);
    if(d.length!==10) return String(v||"").trim();
    return "(" + d.slice(0,3) + ") " + d.slice(3,6) + "-" + d.slice(6);
  }
  function ensureErrorEl(input){
    if(!input || input.__zummeeErrEl) return input.__zummeeErrEl;
    var el = document.createElement("div");
    el.className = "zummee-inline-error";
    el.style.display = "none";
    el.textContent = "";
    // insert after input
    if(input.parentNode){
      if(input.nextSibling){
        input.parentNode.insertBefore(el, input.nextSibling);
      }else{
        input.parentNode.appendChild(el);
      }
    }
    input.__zummeeErrEl = el;
    return el;
  }
  function setError(input, msg){
    var el = ensureErrorEl(input);
    if(!el) return;
    if(msg){
      el.textContent = msg;
      el.style.display = "block";
      input.classList.add("zummee-has-error");
    }else{
      el.textContent = "";
      el.style.display = "none";
      input.classList.remove("zummee-has-error");
    }
  }
  function validatePhoneInput(input){
    if(!input) return true;
    var raw = (input.value||"").trim();
    if(!raw){ setError(input,""); return true; }
    var d = phoneDigits(raw);
    if(d.length===10){ setError(input,""); return true; }
    // allow user typing; show message if not complete
    setError(input,"Enter a 10-digit phone number.");
    return false;
  }
  function bindOne(input){
    if(!input || input.__zummeePhoneBound) return;
    input.__zummeePhoneBound = true;
    input.addEventListener("input", function(){ validatePhoneInput(input); });
    input.addEventListener("blur", function(){
      var ok = validatePhoneInput(input);
      if(ok){
        var formatted = formatPhoneUS(input.value);
        // only replace if it becomes a standard format
        var d = phoneDigits(input.value);
        if(d.length===10) input.value = formatted;
      }
    });
  }
  function attach(root){
    root = root || document;
    var inputs = root.querySelectorAll('input[type="tel"], input[id*="phone" i], input[name*="phone" i], input[placeholder*="phone" i]');
    for(var i=0;i<inputs.length;i++) bindOne(inputs[i]);
  }
  // expose
  window.ZUMMEE_phoneDigits = phoneDigits;
  window.ZUMMEE_formatPhoneUS = formatPhoneUS;
  window.ZUMMEE_validatePhoneInput = validatePhoneInput;
  window.ZUMMEE_attachPhoneFormatting = attach;
  document.addEventListener("DOMContentLoaded", function(){ attach(document);
    try{
      var mo = new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){
          if(muts[i].addedNodes && muts[i].addedNodes.length){
            for(var j=0;j<muts[i].addedNodes.length;j++){
              var n = muts[i].addedNodes[j];
              if(!n) continue;
              if(n.nodeType===1){ attach(n); }
            }
          }
        }
      });
      mo.observe(document.body, {childList:true, subtree:true});
    }catch(e){}
  });
})();

// US phone formatter for display: (123) 456-7890
function formatPhoneUS(raw){
  var s = String(raw||"").replace(/\D/g,"").slice(0,10);
  if(!s) return "";
  if(s.length < 4) return "(" + s;
  if(s.length < 7) return "(" + s.slice(0,3) + ") " + s.slice(3);
  return "(" + s.slice(0,3) + ") " + s.slice(3,6) + "-" + s.slice(6);
}

      if(ins && ins.error){
        await window.sb.from("profiles").insert([{ id:userId, name:name, phone:phone, company:company }]);
      }
      row = { id:userId, name:name, phone:phone, company:company };
    } else {
      // If blank fields, attempt to upsert from metadata (non-destructive)
      var patch = {};
      if(!row.name && name) patch.name = name;

// Directory cache (speeds up first paint). We render cached rows immediately and refresh in background.
function __dirCacheKey(companyId){ return "zummee_dir_cache_" + String(companyId||"").trim(); }
function __dirCacheGet(companyId){
  try{
    var raw = localStorage.getItem(__dirCacheKey(companyId));
    if(!raw) return null;
    var obj = JSON.parse(raw);
    if(!obj || !obj.t || !Array.isArray(obj.rows)) return null;
    // TTL 10 minutes
    if((Date.now() - obj.t) > 10*60*1000) return null;
    return obj.rows;
  }catch(e){ return null; }
}
function __dirCacheSet(companyId, rows){
  try{
    localStorage.setItem(__dirCacheKey(companyId), JSON.stringify({t:Date.now(), rows: rows||[]}));
  }catch(e){}
}

async function loadCompanyRoster(companyName){
    // New: Prefer userdirectory so newly-approved employees appear immediately
    // (profiles rows are only created when the user logs in).
    // We LEFT-JOIN to profiles for phone/department if available.
    // NOTE: companyName is kept for backward-compat, but we now filter by company_id.
    // This function will be called with a companyId string.
    var companyId = String(companyName||"").trim();
    if(!companyId) return [];

    // IMPORTANT:
    // Do NOT rely on PostgREST embedded joins (userdirectory -> profiles), because
    // many projects do not have an FK relationship configured between these tables.
    // Instead, fetch userdirectory rows first, then hydrate optional profile fields
    // with a second query and merge client-side.

    // userdirectory columns are stable in this build:
    // auth_user_id, company_id, role, approved, profile_name, profile_email, profile_phone
    var q = await window.sb
      .from("userdirectory")
      .select("auth_user_id,role,approved,company_id,profile_name,profile_email,profile_phone")
      .eq("company_id", companyId)
      .eq("approved", true)
      .limit(2000);

    if(q && q.error) throw q.error;

    var udRows = (q && q.data) ? q.data : [];
    var ids = udRows.map(function(r){ return r && r.auth_user_id; }).filter(Boolean);

    // Optional enrichment from profiles (phone/department/etc). If no profile rows exist,
    // we still show the directory using userdirectory fields.
    var profById = {};
    if(ids.length){
      
  // PostgREST "in" has limits on URL length; chunk to be safe.
  var chunkSize = 150;
  var chunks = [];
  for(var i=0;i<ids.length;i+=chunkSize){
    chunks.push(ids.slice(i,i+chunkSize));
  }
  // Fetch profile chunks in parallel to reduce total latency.
  var results = await Promise.all(chunks.map(function(chunk){
    return window.sb
      .from("profiles")
      .select("id,name,phone,department,email")
      .in("id", chunk);
  }));
  results.forEach(function(pq){
    if(!pq || pq.error) return; // non-fatal
    (pq.data||[]).forEach(function(p){
      if(p && p.id) profById[p.id] = p;
    });
  });
}

    var rows = udRows.map(function(r){
      var p = profById[r.auth_user_id] || {};
      return {
        id: r.auth_user_id,
        name: r.profile_name || p.name || "",
        // NOTE: supervisors typically cannot read other users' profiles due to RLS.
        // Phone is therefore sourced from userdirectory.profile_phone (kept in sync by DB trigger)
        // and only falls back to profiles.phone when available.
        phone: r.profile_phone || p.phone || "",
        email: r.profile_email || p.email || "",
        company: "",
        department: p.department || "",
        role: r.role || ""
      };
    });

    // Alphabetical sort (case-insensitive)
    rows.sort(function(a,b){
      var an = String(a.name||"").toLowerCase();
      var bn = String(b.name||"").toLowerCase();
      if(an<bn) return -1;
      if(an>bn) return 1;
      return 0;
    });

    return rows;
  }
function deptClass(dept){

  function esc(s){ return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }

  function render(rows){
    var tbody = document.getElementById("dirTbody");
    var pill = document.getElementById("countPill");
    pill.textContent = rows.length + " employee" + (rows.length===1?"":"s");

    if(!rows.length){
      tbody.innerHTML = '<tr><td colspan="3" class="muted">No employees found for this company.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(function(r){
      var name = r.name || "";
      var email = r.email || "";
      var phoneRaw = r.phone || "";
      var phoneDigits = String(phoneRaw).replace(/\D/g,"");
      var phoneDisp = formatPhoneUS(phoneRaw);
      var phoneCell = phoneDigits ? ('<a class="linkish" href="tel:' + phoneDigits + '">' + esc(phoneDisp || phoneRaw) + '</a>') : '<span class="muted">—</span>';
      var emailCell = email ? ('<a class="linkish" href="mailto:' + encodeURIComponent(email) + '">' + esc(email) + '</a>') : '<span class="muted">—</span>';

      return '<tr>' +
        '<td><div style="font-weight:950">' + esc(name) + '</div></td>' + 
        '<td>' + (phoneDigits ? ('<a class="linkish" href="tel:' + phoneDigits + '">' + esc(phoneDisp||phone) + '</a>') : '<span class="muted">—</span>') + '</td>' +
        '<td>' + emailCell + '</td>' +
      '</tr>';
    }).join("");
  }

  function applyFilter(allRows){
    var q = (document.getElementById("q").value || "").trim().toLowerCase();

    return allRows.filter(function(r){

    });

      document.getElementById("myCompany").textContent = companyName || "—";

      if(!companyId){
        document.getElementById("status").textContent = "Your account is not linked to a management company yet. Please ask a supervisor/admin to approve you or set your company.";
        document.getElementById("goProfile").style.display = "inline-flex";
        render([]);
        return;
      }

      document.getElementById("status").textContent = "Loading employees…";

// Fast paint: render cached directory immediately while we refresh in background.
var cachedRows = __dirCacheGet(companyId);
if(cachedRows && cachedRows.length){
  try{
    document.getElementById("status").textContent = "Loading employees… (showing cached)";
    window.__allCompanyRows = (cachedRows||[]).slice().sort(function(a,b){
      var na = String((a&&a.name)||"").toLowerCase();
      var nb = String((b&&b.name)||"").toLowerCase();
      return na.localeCompare(nb);
    });
    render(applyFilter(window.__allCompanyRows));
  }catch(e){}
}
      var allRows = await loadCompanyRoster(companyId);

      // ensure current user's email shows
      allRows = allRows.map(function(r){
        if(!r.email && r.id === user.id) r.email = profile._email || (user.email||"");
        return r;
      });

      document.getElementById("status").textContent = "";
      // Alphabetical order by name (requested)
      allRows = (allRows||[]).slice().sort(function(a,b){
        var na = String((a&&a.name)||"").toLowerCase();
        var nb = String((b&&b.name)||"").toLowerCase();
        return na.localeCompare(nb);
      });

      __dirCacheSet(companyId, allRows);
      window.__allCompanyRows = allRows;
      render(applyFilter(allRows));

      document.getElementById("q").addEventListener("input", function(){
        render(applyFilter(window.__allCompanyRows || []));
      });

      document.getElementById("refreshBtn").addEventListener("click", async function(){
        document.getElementById("status").textContent = "Refreshing…";
        var fresh = await loadCompanyRoster(companyId);
        fresh = fresh.map(function(r){ if(!r.email && r.id===user.id) r.email = profile._email || (user.email||""); return r; });
        fresh = (fresh||[]).slice().sort(function(a,b){
          var na = String((a&&a.name)||"").toLowerCase();
          var nb = String((b&&b.name)||"").toLowerCase();
          return na.localeCompare(nb);
        });
        window.__allCompanyRows = fresh;
        render(applyFilter(fresh));
        document.getElementById("status").textContent = "";
      });

      var signOutBtn = document.getElementById("signOutBtn");
      if(signOutBtn){
        signOutBtn.addEventListener("click", async function(){
          try{
            if(window.ZummeeAuth && typeof window.ZummeeAuth.signOut === "function"){
              const r = window.ZummeeAuth.signOut();
              if(r && typeof r.then === "function") await r;
              return;
            }
          }catch(_e0){}
          try{ await window.sb.auth.signOut(); }catch(_e1){}
          try{
            [localStorage, sessionStorage].forEach(function(store){
              try{
                for(var i=store.length-1;i>=0;i--){
                  var k = store.key(i);
                  if(!k) continue;
                  if(k === 'sb-zummee-auth' || /^sb-.*-auth-token$/.test(k) || /^sb-zummee-auth/.test(k)){
                    try{ store.removeItem(k); }catch(_e2){}
                  }
                }
              }catch(_e3){}
            });

          window.location.replace("login.html");
        });
      }

    }catch(e){
      console.error(e);
      document.getElementById("status").textContent = "Could not load company directory." + (e && e.message ? e.message : String(e));
    }
  });

  <script id="zummeeStaffGuard">
  (async () => {
    if (window.__zummeeStaffGuardRan) return;
    window.__zummeeStaffGuardRan = true;

    async function getClient(){
      try{ if(typeof ensureSupabase === 'function'){ const c = await ensureSupabase(); if(c && c.auth && typeof c.auth.getSession === 'function') return c; } }catch(_e){}
      try{ if(window.supabaseClient && window.supabaseClient.auth && typeof window.supabaseClient.auth.getSession === 'function') return window.supabaseClient; }catch(_e){}
      try{ if(window.sb && window.sb.auth && typeof window.sb.auth.getSession === 'function') return window.sb; }catch(_e){}
      return null;
    }

    const go = (target) => {
      try{ window.location.replace(target); }catch(_e){ window.location.href = target; }
    };

    const sb = await getClient();
    if(!sb){ go('login.html'); return; }

    const sessionRes = await sb.auth.getSession();
    const user = sessionRes && sessionRes.data && sessionRes.data.session ? sessionRes.data.session.user : null;
    if(!user){ go('login.html'); return; }

    const ud = await sb
      .from('userdirectory')
      .select('role')
      .eq('auth_user_id', user.id)
      .single();

    const role = String((ud && ud.data && ud.data.role) || '').trim();
    if(role === 'Resident'){ go('resident_portal.html'); return; }

    document.documentElement.setAttribute('data-staff-role', role || '');
  })();

    async function getSessionSafe(sb, ms){
      ms = ms || 5000;
      return await Promise.race([
        sb.auth.getSession(),
        new Promise((resolve) => {
          let done = false;
          const sub = sb.auth.onAuthStateChange((event, session) => {
            if(done) return;
            if(event === 'INITIAL_SESSION' || session){
              done = true;
              try{ sub.data.subscription.unsubscribe(); }catch(_e){}
              resolve({ data: { session } });
            }
          });
          setTimeout(() => {
            if(done) return;
            done = true;
            try{ sub.data.subscription.unsubscribe(); }catch(_e){}
            resolve({ data: { session: null }, error: new Error('session timeout') });
          }, ms);
        })
      ]);
    }

    function safeLocalSet(k,v){ try{ localStorage.setItem(k,v); }catch(_e){} }
    function safeLocalGet(k){ try{ return localStorage.getItem(k)||""; }catch(_e){ return ""; } }

    async function requireUid() {
      const sb = await ensureSupabase();
      const s = await getSessionSafe(sb, 5000);
      const uid = s.data?.session?.user?.id;
      if(!uid) throw new Error("Not signed in");
      return uid;
    }

    async function getProfile() {
      const sb = await ensureSupabase();
      const uid = await requireUid();

      // selected community is stored on profiles (user preference)
      let profRow = null;
      let selected = "";
      try{
        const qp = await sb.from("profiles").select("selected_community_id,company,company_id,role").eq("id", uid).maybeSingle();
        if(!qp.error && qp.data){
          profRow = qp.data;
          selected = String(qp.data.selected_community_id||"").trim();
        }
      }catch(_e){}

      // role + company_id are authoritative on userdirectory in this build
      let ud = null;
      try{
        const qu = await sb.from("userdirectory").select("company_id,role,approved,profile_name,profile_email").eq("auth_user_id", uid).maybeSingle();
        if(!qu.error) ud = qu.data;
      }catch(_e){}

      const company_id = String(ud?.company_id || profRow?.company_id || "").trim();
      let company = String(profRow?.company || "").trim();
      const role = String(ud?.role || profRow?.role || "").trim();

      if(!company && company_id){
        try{
          const qc = await sb.from("Companies").select("name,code").eq("id", company_id).maybeSingle();
          if(!qc.error && qc.data){
            company = String(qc.data.name || qc.data.code || "").trim();
          }
        }catch(_e){}
      }

      return { uid, company, company_id, role, selected };
    }

    function els() {
      return {
        select: document.getElementById("zummeeCommunitySelect"),
        swatch: document.getElementById("zummeeCommunitySwatch"),
        btnAdd: document.getElementById("zummeeCommunityAdd"),
        btnRename: document.getElementById("zummeeCommunityRename"),
        btnRemove: document.getElementById("zummeeCommunityRemove"),
      };
    }

    function setSwatch(company){
      const e = els().swatch;
      if(!e) return;
      let h=0; for(let i=0;i<company.length;i++) h=(h*31 + company.charCodeAt(i))>>>0;
      const hue = h % 360;
      e.style.background = `hsl(${hue} 70% 45%)`;
      e.title = company || "No company";
    }

    function rebindButton(btn, handler){
      if(!btn || !btn.parentNode) return btn;
      const clone = btn.cloneNode(true);
      btn.parentNode.replaceChild(clone, btn);
      clone.onclick = handler;
      return clone;
    }

    function hardBind(btn, handler){
      if(!btn) return btn;
      // remove inline onclick if any
      try{ btn.onclick = null; btn.removeAttribute("onclick"); }catch(_e){}
      // Remove any previously attached listeners by replacing node (inline attrs will be re-applied below if present in HTML, so also remove onclick)
      const clone = btn.cloneNode(true);
      try{ clone.onclick = null; clone.removeAttribute("onclick"); }catch(_e){}
      btn.parentNode && btn.parentNode.replaceChild(clone, btn);
      // Capture-phase handler to prevent any other handlers from firing (old + new)
      clone.addEventListener("click", function(ev){
        try{ ev.preventDefault(); }catch(_e){}
        try{ ev.stopImmediatePropagation(); }catch(_e){}
        return handler();
      }, true);
      return clone;
    }

    function bindSelect(select) {
      if(!select) return;
      select.onchange = async ()=>{
        const val = String(select.value||"").trim();
        // Write to all known selected-community keys (incl. user-scoped) so all pages stay in sync.
        safeLocalSet("zummee_selected_community_id", val);
        safeLocalSet("zummee_selected_community_v1", val);
        try{ safeLocalSet((window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) || SELECTED_COMMUNITY_KEY || "zummee_selected_community_v1", val); }catch(_e){}
        try{
          const sb = await ensureSupabase();
          const uid = await requireUid();
          await sb.from("profiles").update({ selected_community_id: val || null }).eq("id", uid);
        }catch(_e){}
        document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: val } }));
      };
    }

    function getLocalCommunitiesKey(profile){
      // Uses user-scoped key if available (set by ZUMMEE_applyUserScope).
      const k = (window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.COMMUNITIES_KEY) || window.COMMUNITIES_KEY || "zummee_communities_v1";
      return k;
    }

    function readLocalCommunities(profile){
      try{
        const raw = localStorage.getItem(getLocalCommunitiesKey(profile)) || "[]";
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      }catch(_e){
        return [];
      }
    }

    function writeLocalCommunities(profile, list){
      try{ localStorage.setItem(getLocalCommunitiesKey(profile), JSON.stringify(list||[])); }catch(_e){}
    }

    // Company lookup helper (Daily Ops)
    // Some shared builds expose window.getCompanyRow; ensure it exists here so
    // community assignment filtering can resolve company_id when needed.
    async function getCompanyRow(companyNameOrId){
      try{
        const sb = await ensureSupabase();
        const v = String(companyNameOrId||"").trim();
        if(!v) return null;
        const isUuid = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(v);
        if(isUuid){
          const q = await sb.from('Companies').select('id,name,code,active').eq('id', v).maybeSingle();
          return q && !q.error ? (q.data||null) : null;
        }
        // Prefer exact-ish name match, then code match.
        let q = await sb.from('Companies').select('id,name,code,active').ilike('name', v).limit(1);
        if(q && !q.error && Array.isArray(q.data) && q.data.length) return q.data[0];
        q = await sb.from('Companies').select('id,name,code,active').ilike('code', v).limit(1);
        if(q && !q.error && Array.isArray(q.data) && q.data.length) return q.data[0];
      }catch(_e){}
      return null;
    }
    try{ window.getCompanyRow = window.getCompanyRow || getCompanyRow; }catch(_e){}

    async function listCommunities(profile) {
      // Cloud-first: Daily Ops dropdown.
      // Admin/Supervisor: all company communities.
      // Employee: ONLY assigned communities.
      profile = profile || {};
      const company = String(profile.company||"").trim();
      if(!company) return [];

      const role = String(profile.role||"").trim().toLowerCase();
      const dept = String(profile.department||profile.dept||"").trim().toLowerCase();
      const isPriv = role.includes("admin") || role.includes("supervisor") || role.includes("companyadmin") ||
                     dept.includes("admin") || dept.includes("supervisor") || dept.includes("companyadmin");

      try{
        if(window.sb){
          try{ if(typeof mergeLocalCommunitiesToCloudSilent==='function') await mergeLocalCommunitiesToCloudSilent({company}); }catch(_e){}

          // Employee: fetch assigned ids first
          let assignedIds = [];
          if(!isPriv){
            const uid = String(profile.uid || profile.id || profile.user_id || "").trim();
            if(!uid) return [];
            try{
              // Resolve company_id and community ids, then fetch assignments for this user within that company
              let companyId = String(profile.company_id||"").trim();
              if(!companyId){
                const crow = await (window.getCompanyRow ? window.getCompanyRow(company) : getCompanyRow(company));
                companyId = crow && crow.id ? String(crow.id).trim() : "";
              }
              let ids = [];
              if(companyId){
                const qc = await window.sb.from('PropertyCommunities').select('id').eq('company_id', companyId);
                if(!qc.error && Array.isArray(qc.data)) ids = qc.data.map(r=>r.id).filter(Boolean);
              }
              let qa = { data: [] };
              if(ids.length){
                qa = await window.sb
                  .from('CommunityAssignments')
                  .select('community_id')
                  .eq('user_id', uid)
                  .in('community_id', ids);
              }
              if(qa.error) throw qa.error;
              assignedIds = (qa.data||[]).map(r=>String(r.community_id||"").trim()).filter(Boolean);
            }catch(e){
              console.warn("Daily Ops: CommunityAssignments read failed:", e);
              assignedIds = [];
            }
            if(!assignedIds.length) return [];
          }

          let qb = window.sb
            .from('PropertyCommunities')
            .select('id,name,created_at');

          if(!isPriv){
            qb = qb.in('id', assignedIds);
          }

          // Always filter by company_id (source of truth). If missing, resolve from company name.
          let cid = String(profile.company_id||"").trim();
          if(!cid){
            const crow = await (window.getCompanyRow ? window.getCompanyRow(company) : getCompanyRow(company));
            cid = crow && crow.id ? String(crow.id).trim() : "";
          }
          if(cid) qb = qb.eq('company_id', cid);

          const q = await qb.order('name', { ascending: true });
          if(!q.error){
            const cloudList = (q.data||[])
              .filter(c=>c && c.id && c.name)
              .map(c=>({ id:String(c.id), name:String(c.name) }));
            // Update local cache so other pages stay consistent offline.
            writeLocalCommunities(profile, cloudList);
            return cloudList;
          }else{
            console.warn("Daily Ops: PropertyCommunities read failed:", q.error);
          }
        }
      }catch(_e){ /* fall back */ }

      // Offline fallback: user-scoped local list
      const list = readLocalCommunities(profile);
      return list
        .filter(c=>c && c.id && c.name)
        .map(c=>({ id:String(c.id), name:String(c.name) }))
        .sort((a,b)=>a.name.localeCompare(b.name));
    }

    function renderSelect(select, list, selectedId) {
      if(!select) return;
      const desired = String(selectedId||"").trim() || safeLocalGet("zummee_selected_community_id");
      // Overwrite local cache with cloud list so all pages stay consistent
    select.innerHTML = "";
      const o0 = document.createElement("option");
      o0.value = "";
      o0.textContent = list.length ? "Select a community" : "No communities yet";
      select.appendChild(o0);

      list.forEach(c=>{
        const o=document.createElement("option");
        o.value = String(c.id);
        o.textContent = c.name;
        select.appendChild(o);
      });

      // Support legacy selections where selected_community_id stored the COMMUNITY NAME.
      // If desired isn't an id in the list, try matching by name and migrate to id.
      let resolvedId = "";
      if(desired && list.some(c=>String(c.id)===String(desired))) {
        resolvedId = String(desired);
      } else if(desired) {
        const byName = list.find(c => String(c.name||"").trim().toLowerCase() === String(desired).trim().toLowerCase());
        if(byName) resolvedId = String(byName.id);
      }

      if(resolvedId) {
        select.value = String(resolvedId);
        // IMPORTANT: keep localStorage in sync with the visible selection.
        // Some pages (like Daily Ops) scope data by localStorage selected-community id.
        // If we only set the <select> value from the Profile, the UI looks correct
        // but other modules think no community is selected.
        safeLocalSet("zummee_selected_community_id", String(resolvedId));
        safeLocalSet("zummee_selected_community_v1", String(resolvedId));
        try{ safeLocalSet((window.ZUMMEE_KEYS && window.ZUMMEE_KEYS.SELECTED_COMMUNITY_KEY) || SELECTED_COMMUNITY_KEY || "zummee_selected_community_v1", String(resolvedId)); }catch(_e){}
        // Nudge dependent modules to re-evaluate gated content.
        try{ document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: String(resolvedId) } })); }catch(_e){}

        // If we matched by name, migrate the profile-selected value to the UUID id.
        if(String(resolvedId) !== String(desired)){
          (async () => {
            try{
              const uid = await requireUid();
              await window.sb.from("profiles").update({ selected_community_id: resolvedId }).eq("id", uid);
            }catch(_e){ /* non-fatal */ }
          })();
        }
      } else {
        select.value = "";
        safeLocalSet("zummee_selected_community_id","");
      }
      select.disabled = false;
      bindSelect(select);
    }

    async function refreshUI() {
      const {select} = els();
      if(!select) return;
      try{
        const profile = await getProfile();
        setSwatch(profile.company);
        if(!profile.company){
          renderSelect(select, [], "");
          // Daily Ops content is gated by community selection.
          // If the dropdown is populated programmatically, the browser won't fire a "change" event.
          // Force a visibility recalculation so the boxes show/hide correctly.
          try{ if(typeof applyCommunityVisibility === "function") applyCommunityVisibility(); }catch(_e){}
          return;
        }
        const list = await listCommunities(profile);
        renderSelect(select, list, profile.selected);
        // Same as above: ensure the gated content reflects the dropdown value.
        try{ if(typeof applyCommunityVisibility === "function") applyCommunityVisibility(); }catch(_e){}
      }catch(e){
        console.error(e);
        renderSelect(select, [], "");
        try{ if(typeof applyCommunityVisibility === "function") applyCommunityVisibility(); }catch(_e){}
      }
    }

    async function addCommunity(){
      const profile = await getProfile();
      if(!profile.company) return alert("Set your Management Company in Profile first.");
      const name = prompt("Community name:");
      if(!name) return;
      const clean = name.trim();
      if(!clean) return;

      const list = readLocalCommunities(profile);
      const exists = list.some(c=>String(c.name||"").trim().toLowerCase() === clean.toLowerCase());
      if(exists) return alert("That community already exists in your list.");

      const id = String(Date.now()) + "_" + Math.random().toString(16).slice(2);
      list.push({ id, name: clean });
      writeLocalCommunities(profile, list);

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
      const {select} = els();
      if(select){ select.value = String(id); select.dispatchEvent(new Event("change")); }
    }

    async function renameCommunity(){
      const e = els();
      const profile = await getProfile();
      const id = String(e.select?.value||"").trim();
      if(!id) return alert("Select a community first.");
      const cur = e.select.options[e.select.selectedIndex]?.textContent || "";
      const name = prompt("New community name:", cur);
      if(!name) return;
      const clean = name.trim();
      if(!clean) return;

      const list = readLocalCommunities(profile);
      const idx = list.findIndex(c=>String(c.id)===String(id));
      if(idx === -1) return;
      list[idx].name = clean;
      writeLocalCommunities(profile, list);

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
      if(e.select) e.select.value = id;
    }

    async function removeCommunity(){
      const e = els();
      const profile = await getProfile();
      const id = String(e.select?.value||"").trim();
      if(!id) return alert("Select a community first.");
      if(!confirm("Remove this community from your list?")) return;

      const list = readLocalCommunities(profile).filter(c=>String(c.id)!==String(id));
      writeLocalCommunities(profile, list);

      // Clear selected if it was removed
      try{
        const sb = await ensureSupabase();
        await sb.from("profiles").update({ selected_community_id: null }).eq("id", profile.uid);
      }catch(_e){}
      safeLocalSet("zummee_selected_community_id","");

      document.dispatchEvent(new CustomEvent("communities:changed"));
      await refreshUI();
      document.dispatchEvent(new CustomEvent("community:changed", { detail: { community_id: "" } }));
    }

    document.addEventListener("DOMContentLoaded", ()=>{
      const e = els();
      bindSelect(e.select);
      if(e.btnAdd) e.btnAdd = rebindButton(e.btnAdd, addCommunity);
      if(e.btnRename) e.btnRename = rebindButton(e.btnRename, renameCommunity);
      if(e.btnRemove) e.btnRemove = rebindButton(e.btnRemove, removeCommunity);
      refreshUI();
      // Mark v2 community management as active so legacy wiring blocks don't double-bind.
      try{ window.__zummeeCommunityMgmtV2Bound = true; }catch(_e){}
    });

    document.addEventListener("communities:changed", ()=>refreshUI());
  })();
</script>

<script id="zummeeCommunityController_v1">
/* Unified Community Controller — single source of truth for all pages (v2092) */
(function(){
  const KEY="activeCommunityId";

  function getSelect(){
    return document.getElementById("zummeeCommunitySelect");
  }

  function isPlaceholder(opt){
    const v = (opt?.value || "").trim();
    const t = (opt?.textContent || "").trim().toLowerCase();
    if(!v) return true;
    return (t === "select" || t === "select..." || t === "— select —" || t === "-- select --");
  }

  function firstRealValue(sel){
    const opts = Array.from(sel?.options || []);
    for(const o of opts){
      if(!isPlaceholder(o)) return o.value;
    }
    return "";
  }

  function syncLabel(){
    const sel=getSelect();
    if(!sel) return;
    const txt=sel.selectedOptions?.[0]?.textContent?.trim();
    if(!txt) return;
    [
      document.getElementById("mzCommunityPickerLabel"),
      document.getElementById("zummeeCommunityLabel"),
      document.querySelector(".communityPickerLabel"),
      document.querySelector("[data-community-label]"),
      // Hub header uses this label class
      document.querySelector(".zummee-header__communityLabelValue")
    ].filter(Boolean).forEach(el=>{ try{ el.textContent=txt; }catch(_e){} });
  }

  function applySaved(){
    const sel=getSelect();
    if(!sel) return;

    const saved=(localStorage.getItem(KEY)||"").trim();

    // If saved exists and option exists, apply it.
    if(saved){
      const opt=sel.querySelector('option[value="'+CSS.escape(saved)+'"]');
      if(opt){
        sel.value=saved;
      }
    }

    // If still placeholder/empty, choose first real option.
    const currentOpt = sel.selectedOptions?.[0];
    if(!sel.value || isPlaceholder(currentOpt)){
      const first = firstRealValue(sel);
      if(first){
        sel.value = first;
      }
    }

    if(sel.value){
      localStorage.setItem(KEY, sel.value);
    }

    syncLabel();
  }

  function wire(){
    const sel=getSelect();
    if(!sel) return;

    if(!sel.__zummeeBound){
      sel.__zummeeBound=true;
      sel.addEventListener("change", ()=>{
        const opt = sel.selectedOptions?.[0];
        if(sel.value && !isPlaceholder(opt)){
          localStorage.setItem(KEY, sel.value);
        }
        syncLabel();
      });
    }

    applySaved();
  }

  function start(){
    wire();

    // Observe for header rebuild / option repopulation (Hub does this)
    const obs = new MutationObserver(()=>{ if(getSelect()) wire(); });
    obs.observe(document.body,{childList:true,subtree:true});

    // Retry window during load
    let tries=0;
    const t=setInterval(()=>{
      wire();
      tries++;
      if(tries>120) clearInterval(t);
    },100);
  }

  document.addEventListener("DOMContentLoaded", start);
  start();
})();
</script>
