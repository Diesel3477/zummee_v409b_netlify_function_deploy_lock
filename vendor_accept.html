  <main class="wrap">
    <section class="card">
      <h1>Accepting Job…</h1>
      <div class="sub">Zummee is confirming this maintenance request for the assigned vendor.</div>
      <div id="status" class="status show"><span class="spinner" id="spinner"></span><span id="statusText">Processing your acceptance…</span></div>
      <div class="box">
        <div class="label">Work Order</div>
        <div class="value" id="workOrderValue">Loading…</div>
      </div>
      <div class="box">
        <div class="label">Vendor Email</div>
        <div class="value" id="vendorEmailValue">Loading…</div>
      </div>
      <div class="actions">
        <a id="viewBtn" class="btn secondary" href="#">View Full Work Order</a>
        <a id="contactBtn" class="btn secondary" href="#">Manager Contact</a>
        <a id="completeBtn" class="btn secondary" href="#">Mark Job Complete</a>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const workOrderId = params.get('work_order_id') || '';
    const vendorEmail = (params.get('vendor_email') || '').trim();
    const token = (params.get('token') || '').trim();
    const managerName = params.get('manager_name') || 'Manager';
    const managerPhone = params.get('manager_phone') || '';
    const companyName = params.get('company_name') || 'Property Management';

    const statusEl = document.getElementById('status');
    const statusTextEl = document.getElementById('statusText');
    const spinnerEl = document.getElementById('spinner');
    document.getElementById('workOrderValue').textContent = workOrderId || 'Missing';
    document.getElementById('vendorEmailValue').textContent = vendorEmail || 'Missing';

    const commonQs =
      'work_order_id=' + encodeURIComponent(workOrderId) +
      '&vendor_email=' + encodeURIComponent(vendorEmail) +
      '&token=' + encodeURIComponent(token) +
      '&manager_name=' + encodeURIComponent(managerName) +
      '&manager_phone=' + encodeURIComponent(managerPhone) +
      '&company_name=' + encodeURIComponent(companyName);

    document.getElementById('viewBtn').href = 'vendor_work_order.html?' + commonQs;
    document.getElementById('contactBtn').href = 'vendor_contact.html?' + commonQs;
    document.getElementById('completeBtn').href = 'vendor_complete.html?work_order_id=' + encodeURIComponent(workOrderId) + '&vendor_email=' + encodeURIComponent(vendorEmail) + '&token=' + encodeURIComponent(token);

    function setStatus(text, ok){
      statusTextEl.textContent = text;
      statusEl.className = 'status show ' + (ok ? 'ok' : 'err');
      if (spinnerEl) spinnerEl.style.display = 'none';
      document.title = ok ? 'Job Accepted | Zummee' : 'Unable to Accept Job | Zummee';
      const h1 = document.querySelector('h1');
      if (h1) h1.textContent = ok ? 'Job Accepted' : 'Acceptance Failed';
    }

    async function run(){
      if(!workOrderId || !vendorEmail || !token){
        setStatus('This secure link is missing required information.', false);
        return;
      }
      try{
        const res = await fetch('https://slcwuuwyrgnmlmxpcaim.supabase.co/functions/v1/accept-vendor-job', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': (window.SUPABASE_ANON_KEY || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864'),
            'Authorization': 'Bearer ' + (window.SUPABASE_ANON_KEY || 'sb_publishable_DqOtjzlLWph7-bFjKlFN0w_kSpPI864')
          },
          body: JSON.stringify({
            work_order_id: workOrderId,
            vendor_email: vendorEmail,
            token
          })
        });
        const raw = await res.text();
        let data = null;
        try{ data = raw ? JSON.parse(raw) : null; }catch(_e){ data = raw; }
        if(!res.ok){
          const details = data && typeof data.details === 'object' ? JSON.stringify(data.details) : (data && data.details ? String(data.details) : '');
          throw new Error((data && (data.error || data.message)) || details || raw || 'Unable to accept this job.');
        }
        setStatus((data && data.message) || 'This work order has been accepted and moved to active.', true);
      }catch(err){
        const message = err && err.message ? err.message : 'Unable to accept this job.';
        if(/already/i.test(message) || /accepted/i.test(message)){
          setStatus(message, true);
          return;
        }
        setStatus(message, false);
      }
    }

    run();
  </script>
