  <style>
    :root{--blue:#12324d;--line:#9bc9ff;--muted:#5f7288;--ok:#166534;--bad:#991b1b}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--blue);background:linear-gradient(180deg,#f1f7ff 0%,#edf5fd 50%,#f8fbff 100%)}.shell{max-width:1160px;margin:0 auto;padding:24px 22px 54px}.hero,.card{background:rgba(255,255,255,.96);border:2px solid var(--line);border-radius:34px;box-shadow:0 18px 46px rgba(18,50,77,.10)}.hero{padding:24px 28px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.kicker{font-size:13px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#6c7f94}.hero h1{margin:4px 0 0;font-size:32px;line-height:1.04;letter-spacing:-.04em}.heroRight{display:flex!important;flex-direction:column!important;align-items:flex-end!important;gap:10px!important}.heroLogo{height:54px;max-width:210px;object-fit:contain;display:none}.heroLogo.is-visible{display:block}.btn{border:2px solid var(--line);background:#fff;color:var(--blue);border-radius:18px;padding:12px 16px;font-weight:950;font-size:15px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease,background .14s ease}.btn:active{transform:scale(.98)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 10px 20px rgba(18,50,77,.18)}.btn.danger{color:#b91c1c;border-color:#fecaca;background:#fff7f7}.btn.ghost{background:#f8fbff}.card{margin-top:22px;padding:24px}.card h2{margin:0;font-size:28px;letter-spacing:-.04em}.sub{margin:7px 0 0;color:var(--muted);font-size:16px;line-height:1.35;max-width:760px}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-top:18px;padding:12px;border:1px solid rgba(155,201,255,.55);border-radius:22px;background:linear-gradient(135deg,#fbfdff,#f4f9ff)}.pill{display:inline-flex;border-radius:999px;padding:8px 12px;background:#eef6ff;border:1px solid rgba(59,130,246,.18);font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;color:#1d4ed8}.status{font-size:14px;font-weight:850;color:var(--muted)}.status.ok{color:var(--ok)}.status.bad{color:var(--bad)}.reviewGrid{margin-top:18px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.approval{border:1.5px solid rgba(155,201,255,.78);border-radius:28px;background:linear-gradient(180deg,#fff 0%,#fbfdff 100%);overflow:hidden;box-shadow:0 14px 30px rgba(18,50,77,.08);display:grid;grid-template-rows:auto 1fr}.approvalMedia{position:relative;background:#eef5fb}.approvalMedia img{width:100%;height:285px;object-fit:cover;display:block;background:#eef5fb}.approvalBadge{position:absolute;left:14px;top:14px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);color:#92400e;border:1px solid rgba(180,83,9,.18);font-size:12px;font-weight:950;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 8px 18px rgba(15,23,42,.10)}.clickHint{position:absolute;right:14px;bottom:14px;padding:7px 10px;border-radius:999px;background:rgba(18,50,77,.88);color:#fff;font-size:12px;font-weight:900}.imageButton{all:unset;display:block;width:100%;cursor:pointer}.approvalBody{padding:16px;display:flex;flex-direction:column;gap:12px}.approvalMeta{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;color:var(--muted);font-size:13px;font-weight:850}.approvalMeta strong{display:block;color:var(--blue);font-size:15px;margin-bottom:2px}.approvalDate{text-align:right;white-space:nowrap}.captionBox{border:1px solid rgba(18,50,77,.10);border-radius:18px;background:#fff;padding:12px 13px;color:#2c4660;line-height:1.44;min-height:64px}.approvalActions{margin-top:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{grid-column:1/-1;margin-top:2px;padding:22px;border:1px dashed rgba(18,50,77,.18);border-radius:22px;background:#fbfdff;color:var(--muted);font-weight:850;text-align:center}.modalBackdrop{position:fixed;inset:0;background:rgba(8,20,38,.54);display:none;align-items:center;justify-content:center;padding:22px;z-index:9999}.modalBackdrop.is-open{display:flex}.previewModal{width:min(920px,96vw);max-height:92vh;background:#fff;border:2px solid var(--line);border-radius:28px;box-shadow:0 24px 80px rgba(0,0,0,.28);overflow:hidden;display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,.8fr)}.previewModal img{width:100%;height:100%;min-height:420px;object-fit:cover;background:#eef5fb}.previewPanel{padding:20px;display:flex;flex-direction:column;gap:12px}.previewPanel h3{margin:0;font-size:24px;letter-spacing:-.03em}.previewPanel p{margin:0;color:#465f78;line-height:1.45}.previewActions{margin-top:auto;display:grid;gap:10px}html.dark-mode body{background:#071426;color:#f4f8ff}html.dark-mode .hero,html.dark-mode .card,html.dark-mode .approval,html.dark-mode .previewModal{background:#10213a;border-color:#2c6ecb;box-shadow:0 18px 46px rgba(0,0,0,.28)}html.dark-mode .toolbar,html.dark-mode .captionBox{background:#0b1b31;border-color:#2c4d7a;color:#e8f2ff}html.dark-mode .sub,html.dark-mode .status,html.dark-mode .approvalMeta,html.dark-mode .previewPanel p{color:#b9c8dc}html.dark-mode .approvalMeta strong,html.dark-mode .card h2,html.dark-mode .hero h1,html.dark-mode .previewPanel h3{color:#f4f8ff}html.dark-mode .btn{background:#0b1b31;color:#f4f8ff;border-color:#3b82f6}html.dark-mode .btn.primary{background:#3b82f6;color:#fff}html.dark-mode .btn.danger{background:#3a1520;color:#fecaca;border-color:#7f1d1d}html.dark-mode .pill{background:#10294a;color:#dbeafe;border-color:#3b82f6}html.dark-mode .empty{background:#0b1b31;color:#b9c8dc;border-color:#2c4d7a}@media(max-width:860px){.shell{padding:18px 14px 42px}.hero{padding:22px;grid-template-columns:1fr auto}.hero h1{font-size:29px}.heroLogo{height:46px;max-width:170px}.card{padding:18px;border-radius:24px}.reviewGrid{grid-template-columns:1fr}.approvalMedia img{height:230px}.previewModal{grid-template-columns:1fr}.previewModal img{min-height:260px;max-height:52vh}.approvalActions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div><div class="kicker">Management Review</div><h1>Community Gallery Approvals</h1></div>
      <div class="heroRight"><img id="pageCompanyLogo" class="heroLogo" alt="Company logo"><a class="btn" id="backHubBtn" href="manager_hub.html">Back to Hub</a></div>
    </section>
    <section class="card">
      <h2>Photos Awaiting Approval</h2>
      <p class="sub">Managers, employees, and board members can review resident-submitted photos before they appear in the Community Experience gallery.</p>
      <div class="toolbar"><span class="pill" id="communityPill">Selected community</span><button class="btn" id="refreshBtn" type="button">Refresh</button></div>
      <div id="approvalStatus" class="status"></div>
      <div id="approvalGrid" class="reviewGrid"></div>
      <div id="previewBackdrop" class="modalBackdrop" aria-hidden="true"></div>
    </section>
  </main>
<script>
const $=id=>document.getElementById(id);const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function getClient(){if(window.ensureSupabase)return await window.ensureSupabase();return window.supabaseClient||window.sb||null}let ctx={communityId:'',communityName:'',companyId:''};let pendingRows=[];function publicImageUrl(path){try{const sb=window.supabaseClient||window.sb;if(!path)return'';if(/^https?:\/\//i.test(path))return path;return sb.storage.from('community-gallery').getPublicUrl(path).data.publicUrl}catch(e){return path||''}}function setStatus(msg,type){const el=$('approvalStatus');el.textContent=msg||'';el.className='status '+(type||'')}async function loadContext(){ctx.communityId=localStorage.getItem('zummee_selected_community_id')||localStorage.getItem('activeCommunityId')||localStorage.getItem('currentCommunityId')||'';ctx.communityName=localStorage.getItem('currentCommunityName')||localStorage.getItem('zummeeCurrentCommunityName')||localStorage.getItem('selectedCommunityName')||'Selected community';ctx.companyId=localStorage.getItem('zummee_company_id')||localStorage.getItem('company_id')||'';$('communityPill').textContent=ctx.communityName;try{const sb=await getClient();if(sb&&ctx.companyId){const r=await sb.from('companies').select('logo_path').eq('id',ctx.companyId).maybeSingle();if(r.data&&r.data.logo_path){const path=r.data.logo_path;const url=/^https?:\/\//i.test(path)?path:sb.storage.from('company_logos').getPublicUrl(path).data.publicUrl;const img=$('pageCompanyLogo');img.src=url;img.classList.add('is-visible');img.style.display='block'}}}catch(e){}await loadPending()}function applyCommunityFilter(q){return q.eq('community',ctx.communityName)}async function loadPending(){const sb=await getClient();const grid=$('approvalGrid');if(!sb){setStatus('Gallery approvals are still loading.','bad');return}try{setStatus('Loading pending photos…','');let q=sb.from('community_gallery').select('*').eq('status','pending').order('created_at',{ascending:true});q=applyCommunityFilter(q);const r=await q;if(r.error)throw r.error;pendingRows=r.data||[];grid.innerHTML=pendingRows.length?pendingRows.map(renderRow).join(''):'<div class="empty">No resident photos waiting for approval.</div>';setStatus(pendingRows.length?`${pendingRows.length} photo${pendingRows.length===1?'':'s'} awaiting approval.`:'All caught up.','ok')}catch(e){console.error(e);grid.innerHTML='';setStatus('Could not load gallery approvals. Check community_gallery permissions if needed.','bad')}}function renderRow(row){const img=publicImageUrl(row.image_url||row.image_path||row.photo_url);const submitted=row.submitted_by||row.resident_name||'Resident';const created=new Date(row.created_at||Date.now()).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});const caption=row.caption||'No caption added.';return `<article class="approval" data-post="${esc(row.id)}"><div class="approvalMedia"><button class="imageButton" type="button" data-preview="${esc(row.id)}"><img src="${esc(img)}" alt="Resident submitted photo" loading="lazy"><span class="approvalBadge">Pending Review</span><span class="clickHint">Tap to preview</span></button></div><div class="approvalBody"><div class="approvalMeta"><div><strong>${esc(submitted)}</strong><span>${esc(ctx.communityName)}</span></div><div class="approvalDate">${esc(created)}</div></div><div class="captionBox">${esc(caption)}</div><div class="approvalActions"><button class="btn primary" type="button" data-approve="${esc(row.id)}">Approve & Publish</button><button class="btn danger" type="button" data-reject="${esc(row.id)}">Reject</button></div></div></article>`}function openPreview(id){const row=pendingRows.find(x=>String(x.id)===String(id));if(!row)return;const img=publicImageUrl(row.image_url||row.image_path||row.photo_url);const submitted=row.submitted_by||row.resident_name||'Resident';const created=new Date(row.created_at||Date.now()).toLocaleString();const caption=row.caption||'No caption added.';const b=$('previewBackdrop');b.innerHTML=`<div class="previewModal" role="dialog" aria-modal="true" aria-label="Gallery photo preview"><img src="${esc(img)}" alt="Resident submitted photo preview"><div class="previewPanel"><span class="pill">Pending Review</span><h3>${esc(submitted)}</h3><p>${esc(ctx.communityName)} • ${esc(created)}</p><div class="captionBox">${esc(caption)}</div><div class="previewActions"><button class="btn primary" type="button" data-approve="${esc(row.id)}">Approve & Publish</button><button class="btn danger" type="button" data-reject="${esc(row.id)}">Reject</button><button class="btn ghost" type="button" data-close-preview>Close Preview</button></div></div></div>`;b.classList.add('is-open');b.setAttribute('aria-hidden','false')}function closePreview(){const b=$('previewBackdrop');if(!b)return;b.classList.remove('is-open');b.setAttribute('aria-hidden','true');b.innerHTML=''}async function decide(id,status){const sb=await getClient();if(!sb||!id)return;try{setStatus(status==='approved'?'Approving photo…':'Rejecting photo…','');const u=await sb.from('community_gallery').update({status:status,approved_at:new Date().toISOString(),approved_by:(localStorage.getItem('zummee_user_email')||localStorage.getItem('user_email')||'Staff')}).eq('id',id);if(u.error)throw u.error;closePreview();const el=document.querySelector(`[data-post="${CSS.escape(id)}"]`);if(el)el.remove();pendingRows=pendingRows.filter(x=>String(x.id)!==String(id));setStatus(status==='approved'?'Photo approved and published to the community gallery.':'Photo rejected.','ok');setTimeout(loadPending,350)}catch(e){console.error(e);setStatus('Could not update this photo. Check update permission on community_gallery.','bad')}}document.addEventListener('click',function(ev){const preview=ev.target.closest('[data-preview]');const close=ev.target.closest('[data-close-preview]');const a=ev.target.closest('[data-approve]');const r=ev.target.closest('[data-reject]');if(preview){ev.preventDefault();openPreview(preview.getAttribute('data-preview'));return}if(close){ev.preventDefault();closePreview();return}if(ev.target.id==='previewBackdrop'){closePreview();return}if(a){ev.preventDefault();decide(a.getAttribute('data-approve'),'approved');return}if(r){ev.preventDefault();if(confirm('Reject this resident photo?'))decide(r.getAttribute('data-reject'),'rejected')}});document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closePreview()});$('refreshBtn').addEventListener('click',loadPending);loadContext();
</script>
