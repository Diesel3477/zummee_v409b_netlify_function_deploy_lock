  <div id="slides"></div>

  <script>
    const data = JSON.parse(localStorage.getItem('ap_presentation_data') || '{}');
    const container = document.getElementById('slides');

    function normalizeTheme(theme) {
      theme = String(theme || '').toLowerCase();
      if (theme === 'navy') return 'midnight';
      if (theme === 'gradient') return 'slate';
      return ['midnight','slate','light'].includes(theme) ? theme : 'midnight';
    }

    document.body.classList.add(`theme-${normalizeTheme(data.theme)}`);

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function fmtDate(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      const d = new Date(raw + 'T12:00:00');
      if (isNaN(d.getTime())) return raw;
      return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function paragraphHtml(text) {
      const lines = String(text || '').split(/\n+/).map(v => v.trim()).filter(Boolean);
      if (!lines.length) return '<span class="empty-state">No content entered.</span>';
      return lines.map(line => `<p>${esc(line)}</p>`).join('');
    }

    function listHtml(text) {
      const items = String(text || '').split(/\n+/).map(v => v.trim()).filter(Boolean);
      if (!items.length) return '<span class="empty-state">No content entered.</span>';
      return `<ul>${items.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`;
    }

    function compactText(parts) {
      return parts.map(v => String(v || '').trim()).filter(Boolean).join(' • ');
    }

    function sectionSlide(title, html, options = {}) {
      const el = document.createElement('section');
      el.className = 'slide body-slide';
      el.innerHTML = `
        <div class="slide-shell">
          <div class="eyebrow">Annual Meeting Presentation</div>
          <div class="section-title">${esc(title)}</div>
          <div class="content-card">
            <div class="content">${html}</div>
          </div>
        </div>
        <div class="footer">${esc(options.footer || data.management_company || '')}</div>
        <div class="footer-right">Zummee Management Assistant</div>
      `;
      container.appendChild(el);
    }


    function moneyNumber(value) {
      const raw = String(value || '').trim();
      if (!raw) return 0;
      const cleaned = raw.replace(/,/g, '').replace(/^\((.*)\)$/, '-$1').replace(/[^0-9.-]/g, '');
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function fmtMoney(value) {
      const num = typeof value === 'number' ? value : moneyNumber(value);
      const abs = Math.abs(num).toLocaleString(undefined, { maximumFractionDigits: 0 });
      return num < 0 ? `($${abs})` : `$${abs}`;
    }

    function meetingYear() {
      const raw = String(data.meeting_date || '').trim();
      const d = raw ? new Date(raw + 'T12:00:00') : new Date();
      return isNaN(d.getTime()) ? new Date().getFullYear() : d.getFullYear();
    }

    function fiscalWindow() {
      const meeting = meetingYear();
      return { older: meeting - 2, newer: meeting - 1, meeting };
    }

    function varianceClass(value) {
      return value < 0 ? 'variance-negative' : 'variance-positive';
    }

    function keyChangeHtml(label, variance) {
      const amount = fmtMoney(variance);
      if (!label) return '';
      if (variance === 0) return `<div class="key-change"><strong>Key change:</strong> ${esc(label)} was flat to budget.</div>`;
      const direction = variance > 0 ? 'favorable to budget' : 'below budget';
      return `<div class="key-change"><strong>Key change:</strong> ${esc(label)} was ${direction} by ${esc(amount)}.</div>`;
    }

    function safeReportRows() {
      try {
        const parsed = JSON.parse(String(data.financial_reports_json || '[]'));
        return Array.isArray(parsed) ? parsed : [];
      } catch (_e) {
        return [];
      }
    }

    function financialOverviewHtml() {
      const notes = paragraphHtml(data.financial_overview);
      return `
        <div class="financial-summary-grid">
          <div class="stat-card">
            <div class="stat-label">Operating Balance</div>
            <div class="stat-value">${esc(data.operating_balance || '$0')}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Reserve Balance</div>
            <div class="stat-value">${esc(data.reserve_balance || '$0')}</div>
          </div>
        </div>
        <div class="content-note">${notes}</div>
      `;
    }

    function balanceSheetHtml() {
      const years = fiscalWindow();
      const rows = [
        ['Operating Funds', data.prior_operating, data.current_operating],
        ['Reserve Funds', data.prior_reserve, data.current_reserve],
        ['Starting Reserve', data.prior_reserve_start, data.current_reserve_start],
        ['Ending Reserve', data.prior_reserve_end, data.current_reserve_end],
      ];
      const rowMetrics = rows.map(([label, prior, current]) => ({
        label,
        prior: prior || '$0',
        current: current || '$0',
        diff: moneyNumber(current) - moneyNumber(prior)
      }));
      const highlightLabel = rowMetrics.slice().sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))[0]?.label || '';
      const totalPrior = moneyNumber(data.prior_operating) + moneyNumber(data.prior_reserve);
      const totalCurrent = moneyNumber(data.current_operating) + moneyNumber(data.current_reserve);
      return `
        <div class="financial-table-shell">
          <div class="financial-table-kicker">Completed fiscal years ${years.older} and ${years.newer}</div>
          <div class="financial-table-grid">
            <div class="ft-head">Bank Accounts</div>
            <div class="ft-head num">${years.older}</div>
            <div class="ft-head num">${years.newer}</div>
            ${rowMetrics.map(row => {
              const highlight = row.label === highlightLabel ? ' ft-highlight' : '';
              return `
                <div class="ft-cell ft-row-label${highlight}">${esc(row.label)}</div>
                <div class="ft-cell num${highlight}">${esc(row.prior)}</div>
                <div class="ft-cell num${highlight}">${esc(row.current)}</div>
              `;
            }).join('')}
            <div class="ft-cell ft-row-label ft-total">Total Funds</div>
            <div class="ft-cell num ft-total">${esc(fmtMoney(totalPrior))}</div>
            <div class="ft-cell num ft-total">${esc(fmtMoney(totalCurrent))}</div>
          </div>
        </div>
      `;
    }

    function incomeStatementHtml() {
      const years = fiscalWindow();
      const rows = [
        ['Assessments', data.inc_assessments_actual, data.inc_assessments_budget, data.inc_assessments_next],
        ['Interest Income', data.inc_interest_actual, data.inc_interest_budget, data.inc_interest_next],
        ['Fines', data.inc_fines_actual, data.inc_fines_budget, data.inc_fines_next],
        ['Late Fees', data.inc_late_actual, data.inc_late_budget, data.inc_late_next],
        ['Estoppel', data.inc_estoppel_actual, data.inc_estoppel_budget, data.inc_estoppel_next],
      ].map(([label, actual, budget, next]) => ({
        label, actual: actual || '$0', budget: budget || '$0', next: next || '$0',
        actualNum: moneyNumber(actual), budgetNum: moneyNumber(budget), nextNum: moneyNumber(next)
      }));
      let totalActual = 0, totalBudget = 0, totalNext = 0;
      rows.forEach(row => { totalActual += row.actualNum; totalBudget += row.budgetNum; totalNext += row.nextNum; row.variance = row.actualNum - row.budgetNum; });
      const highlightLabel = rows.slice().sort((a, b) => Math.abs(b.variance) - Math.abs(a.variance))[0]?.label || '';
      const body = rows.map(row => {
        const highlight = row.label === highlightLabel ? ' ft-highlight' : '';
        return `
          <div class="ft-cell ft-row-label${highlight}">${esc(row.label)}</div>
          <div class="ft-cell num${highlight}">${esc(row.actual)}</div>
          <div class="ft-cell num${highlight}">${esc(row.budget)}</div>
          <div class="ft-cell num ${varianceClass(row.variance)}${highlight}">${esc(fmtMoney(row.variance))}</div>
          <div class="ft-cell num${highlight}">${esc(row.next)}</div>
        `;
      }).join('');
      return `
        <div class="financial-table-shell">
          <div class="financial-table-kicker">Comparing ${years.older} actual and budget against ${years.newer} budget</div>
          ${keyChangeHtml(highlightLabel, rows.find(row => row.label === highlightLabel)?.variance || 0)}
          <div class="financial-table-grid income">
            <div class="ft-head">Revenue</div>
            <div class="ft-head num">${years.older} Actual</div>
            <div class="ft-head num">${years.older} Budget</div>
            <div class="ft-head num">Variance</div>
            <div class="ft-head num">${years.newer} Budget</div>
            ${body}
            <div class="ft-cell ft-row-label ft-total">Total Revenue</div>
            <div class="ft-cell num ft-total">${esc(fmtMoney(totalActual))}</div>
            <div class="ft-cell num ft-total">${esc(fmtMoney(totalBudget))}</div>
            <div class="ft-cell num ft-total ${varianceClass(totalActual - totalBudget)}">${esc(fmtMoney(totalActual - totalBudget))}</div>
            <div class="ft-cell num ft-total">${esc(fmtMoney(totalNext))}</div>
          </div>
        </div>
      `;
    }

    function financialReportsHtml() {
      const years = fiscalWindow();
      const rows = safeReportRows().filter(row => String(row && row.label || '').trim());
      if (!rows.length) return '<span class="empty-state">No content entered.</span>';
      const normalized = rows.map(row => {
        const actual = row.prior_actual || row.actual || row.priorActual || '$0';
        const budget = row.prior_budget || row.budget || row.priorBudget || '$0';
        const next = row.current_budget || row.next_budget || row.currentBudget || '$0';
        const varianceNum = moneyNumber(actual) - moneyNumber(budget);
        const isTotal = /total|excess/i.test(String(row.label || ''));
        return { label: row.label, actual, budget, next, varianceNum, isTotal };
      });
      const detailRows = normalized.filter(row => !row.isTotal);
      const highlightLabel = detailRows.slice().sort((a, b) => Math.abs(b.varianceNum) - Math.abs(a.varianceNum))[0]?.label || '';
      let totalActual = 0, totalBudget = 0, totalNext = 0;
      detailRows.forEach(row => { totalActual += moneyNumber(row.actual); totalBudget += moneyNumber(row.budget); totalNext += moneyNumber(row.next); });
      const body = normalized.map(row => {
        const variance = fmtMoney(row.varianceNum);
        const highlight = !row.isTotal && row.label === highlightLabel ? ' ft-highlight' : '';
        return `
          <div class="ft-cell ft-row-label${row.isTotal ? ' ft-total' : ''}${highlight}">${esc(row.label)}</div>
          <div class="ft-cell num${row.isTotal ? ' ft-total' : ''}${highlight}">${esc(row.actual)}</div>
          <div class="ft-cell num${row.isTotal ? ' ft-total' : ''}${highlight}">${esc(row.budget)}</div>
          <div class="ft-cell num ${varianceClass(row.varianceNum)}${row.isTotal ? ' ft-total' : ''}${highlight}">${esc(variance)}</div>
          <div class="ft-cell num${row.isTotal ? ' ft-total' : ''}${highlight}">${esc(row.next)}</div>
        `;
      }).join('');
      const totalsRow = normalized.some(row => row.isTotal) ? '' : `
        <div class="ft-cell ft-row-label ft-total">Total Expenses</div>
        <div class="ft-cell num ft-total">${esc(fmtMoney(totalActual))}</div>
        <div class="ft-cell num ft-total">${esc(fmtMoney(totalBudget))}</div>
        <div class="ft-cell num ft-total ${varianceClass(totalActual - totalBudget)}">${esc(fmtMoney(totalActual - totalBudget))}</div>
        <div class="ft-cell num ft-total">${esc(fmtMoney(totalNext))}</div>
      `;
      return `
        <div class="financial-table-shell">
          <div class="financial-table-kicker">Comparing ${years.older} actual and budget against ${years.newer} budget</div>
          ${keyChangeHtml(highlightLabel, detailRows.find(row => row.label === highlightLabel)?.varianceNum || 0)}
          <div class="financial-table-grid reports">
            <div class="ft-head">Expense Category</div>
            <div class="ft-head num">${years.older} Actual</div>
            <div class="ft-head num">${years.older} Budget</div>
            <div class="ft-head num">Variance</div>
            <div class="ft-head num">${years.newer} Budget</div>
            ${body}
            ${totalsRow}
          </div>
        </div>
      `;
    }

    function buildBoardHtml() {
      const board = String(data.board_members || '').split(/\n+/).map(v => v.trim()).filter(Boolean);
      const nominees = String(data.nominees || '').split(/\n+/).map(v => v.trim()).filter(Boolean);
      if (!board.length && !nominees.length) return '<span class="empty-state">No content entered.</span>';
      return `
        <div class="split-block">
          <div>
            <div class="subsection-title">Current Board Members</div>
            ${board.length ? `<ul>${board.map(item => `<li>${esc(item)}</li>`).join('')}</ul>` : '<span class="empty-state">No board members entered.</span>'}
          </div>
          <div>
            <div class="subsection-title">Nominees / Candidates</div>
            ${nominees.length ? `<ul>${nominees.map(item => `<li>${esc(item)}</li>`).join('')}</ul>` : '<span class="empty-state">No nominees entered.</span>'}
          </div>
        </div>
      `;
    }


    function titleSlide() {
      const prepared = compactText([
        fmtDate(data.meeting_date),
        data.prepared_by ? 'Prepared by ' + data.prepared_by : ''
      ]);
      const el = document.createElement('section');
      el.className = 'slide title-slide';
      el.innerHTML = `
        <div class="slide-shell title-cluster">
          <div class="eyebrow">Annual Meeting Presentation</div>
          <h1 class="title">${esc(data.community_name || 'Annual Presentation')}</h1>
          ${prepared ? `<div class="meta-row"><span>${esc(prepared)}</span></div>` : ''}
          ${String(data.management_company || '').trim() ? `
            <div class="company-bar">
              <div class="company-label">Management Company</div>
              <div class="company-name">${esc(data.management_company)}</div>
            </div>
          ` : ''}
        </div>
        <div class="footer">${esc(data.management_company || '')}</div>
        <div class="footer-right">Zummee Management Assistant</div>
      `;
      container.appendChild(el);
    }

    titleSlide();
    sectionSlide('Agenda', listHtml(data.agenda));
    sectionSlide('Year in Review', paragraphHtml(data.year_in_review));
    sectionSlide('Capital Improvements', paragraphHtml(data.capital_improvements));
    sectionSlide('Goals & Upcoming Projects', paragraphHtml(data.goals));
    sectionSlide('Financial Overview', financialOverviewHtml());
    sectionSlide('Balance Sheet and Reserve', balanceSheetHtml());
    sectionSlide(`${fiscalWindow().older} Income vs ${fiscalWindow().older} Budget and ${fiscalWindow().newer} Budget`, incomeStatementHtml());
    sectionSlide(`${fiscalWindow().older} Expenses vs ${fiscalWindow().older} Budget and ${fiscalWindow().newer} Budget`, financialReportsHtml());
    sectionSlide('Board & Candidates', buildBoardHtml());
    sectionSlide('Resident Portal & Zummee', paragraphHtml(data.portal_notes));
    sectionSlide('Adjournment', '<p>Thank you for attending.</p>');
  </script>
<script src="company_logo_sync.js"></script>

  <script src="shared/dark-mode.js?v=2026-04-27-v266"></script>
