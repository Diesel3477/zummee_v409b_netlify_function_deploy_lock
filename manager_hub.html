<script>
(function(){
  var mh2LightningTimer = null;

  function stopLightning(hero){
    if(mh2LightningTimer){
      clearTimeout(mh2LightningTimer);
      mh2LightningTimer = null;
    }
    if(hero) hero.classList.remove('flash');
  }

  function scheduleLightning(hero){
    stopLightning(hero);
    if(!hero || !hero.classList.contains('wx-thunder')) return;

    function flashLoop(){
      if(!hero || !hero.classList.contains('wx-thunder')) return;
      if(Math.random() < 0.25){
        hero.classList.add('flash');
        setTimeout(function(){
          if(hero) hero.classList.remove('flash');
        }, 120 + Math.random() * 120);
      }
      mh2LightningTimer = setTimeout(flashLoop, 2000 + Math.random() * 3000);
    }

    mh2LightningTimer = setTimeout(flashLoop, 1200);
  }

  var prevRenderWeatherModel = window.renderWeatherModel;
  window.renderWeatherModel = function(){
    var result = prevRenderWeatherModel && prevRenderWeatherModel.apply(this, arguments);
    try{
      var hero = document.getElementById('weatherHeroCard') || document.querySelector('.mh2-weather-hero');
      if(hero && hero.classList.contains('wx-thunder')){
        scheduleLightning(hero);
      }else{
        stopLightning(hero);
      }
    }catch(_e){}
    return result;
  };

  window.addEventListener('beforeunload', function(){
    stopLightning(document.getElementById('weatherHeroCard') || document.querySelector('.mh2-weather-hero'));
  });
})();
</script>

<script>

(function(){
  if (window.__MH2_SIGNOUT_HARDENED_V87__) return;

  function getSb(){
    try{

      }
    }catch(_e){}
    return null;
  }
  function clearZummeeSessionHints(){
    var keepPrefixes = ['mh2-theme','mh2-favorite','mh2-card-order','mh2-weather-zip:','mh2-last-weather-zip'];
    var removeExact = {'sb-zummee-auth':1,'sb-slcwuuwyrgnmlmxpcaim-auth-token':1,'zummeeAuth':1,'zummee_user':1,'ZUMMEE_AUTH':1,'zummeeCurrentUser':1,'zummeeCurrentProfile':1,'currentUser':1,'currentProfile':1};

      for (var i = localStorage.length - 1; i >= 0; i--){
        var k = localStorage.key(i) || '';
        var keep = keepPrefixes.some(function(prefix){ return k === prefix || k.indexOf(prefix) === 0; });
        if (keep) continue;
        var lk = k.toLowerCase();
        if (removeExact[k] || k.indexOf('supabase.auth.token') >= 0 || k.indexOf('sb-') === 0 || lk.indexOf('auth') >= 0){
          try{ localStorage.removeItem(k); }catch(_e){}
        }
      }
    }catch(_e){}
    try{ sessionStorage.clear(); }catch(_e){}
  }
  function showZummeeSignOutConfirm(){
    return new Promise(function(resolve){
      var overlay = document.getElementById('mh2SignOutModalOverlay');
      try{ if (overlay) overlay.remove(); }catch(_e){}
      overlay = document.createElement('div');
      overlay.id = 'mh2SignOutModalOverlay';
      overlay.className = 'mh2-signout-modal-overlay';
      overlay.innerHTML = '<div class="mh2-signout-modal" role="dialog" aria-modal="true" aria-labelledby="mh2SignOutTitle"><div class="mh2-signout-modal-kicker">Zummee</div><h2 id="mh2SignOutTitle">Sign out?</h2><p>Are you sure you want to sign out of the Manager Hub?</p><div class="mh2-signout-modal-actions"><button type="button" class="mh2-signout-cancel">Cancel</button><button type="button" class="mh2-signout-confirm">Sign out</button></div></div>';
      document.body.appendChild(overlay);
      var cancel = overlay.querySelector('.mh2-signout-cancel');
      var confirm = overlay.querySelector('.mh2-signout-confirm');
      function close(val){
        try{ document.removeEventListener('keydown', onKey, true); }catch(_e){}
        try{ overlay.classList.add('closing'); setTimeout(function(){ overlay.remove(); }, 120); }catch(_e){ try{ overlay.remove(); }catch(_e2){} }

      document.addEventListener('keydown', onKey, true);
      overlay.addEventListener('click', function(e){ if(e.target === overlay) close(false); });
      cancel.addEventListener('click', function(){ close(false); });
      confirm.addEventListener('click', function(){ close(true); });
      setTimeout(function(){ try{ confirm.focus(); }catch(_e){} }, 40);
    });
  }
  async function performManagerHubSignOut(evt){
    try{ if(evt){ evt.preventDefault(); evt.stopPropagation(); if(evt.stopImmediatePropagation) evt.stopImmediatePropagation(); } }catch(_e){}
    var ok = await showZummeeSignOutConfirm();

    try{
      var sb = getSb();
      if (sb && sb.auth && typeof sb.auth.signOut === 'function') await sb.auth.signOut({ scope:'global' });
    }catch(err){ try{ console.warn('[MH2] Supabase signOut warning', err); }catch(_e){} }

    setTimeout(function(){ try{ window.location.assign(dest); }catch(_e){} }, 150);
    setTimeout(function(){ try{ window.top.location.href = dest; }catch(_e){} }, 500);

  }
  window.zummeeManagerHubSignOut = performManagerHubSignOut;

  function wire(){

  document.addEventListener('click', function(evt){
    var target = evt.target && evt.target.closest ? evt.target.closest('#mh2SignOutBtn') : null;

})();
</script>

<script id="mh2-inline-ai-dictation-v253">
(function(){
  function $(id){ return document.getElementById(id); }
  function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }
  function sendToAssistant(prompt){
    var input = $('mh2AiPrompt');
    var text = (prompt || (input && input.value) || '').trim();
    if(!text){ if(input) input.focus(); return; }
    try{ sessionStorage.setItem('zummee_ai_prefill_prompt', text); }catch(e){}
    window.location.href = 'zummee_ai_assistant.html';
  }
  var recognition = null, isListening = false, listenTimeout = null, finalTranscript = '';
  var nativeDictationArmed = false, nativeDictationTimer = null, nativeStartingValue = '';
  function updateDictateUI(active, nativeMode){
    var btn = $('mh2AiDictateBtn'); if(!btn) return;
    if(active && nativeMode){ btn.classList.add('is-listening'); btn.textContent='Use keyboard mic…'; btn.setAttribute('aria-pressed','true'); return; }
    if(active){ btn.classList.add('is-listening'); btn.textContent='Listening… tap to stop'; btn.setAttribute('aria-pressed','true'); }
    else { btn.classList.remove('is-listening'); btn.textContent='Dictate'; btn.setAttribute('aria-pressed','false'); }
  }
  function runAssistantAfterDictation(){
    setTimeout(function(){ var send = $('mh2AiSendBtn'); if(send) send.click(); else sendToAssistant(finalTranscript); }, 250);
  }
  function stopDictation(autoRun){
    if(!isListening){ updateDictateUI(false); return; }
    isListening = false;
    clearTimeout(listenTimeout); listenTimeout = null;
    try{ if(recognition) recognition.stop(); }catch(e){}
    updateDictateUI(false);
    if(autoRun && finalTranscript) runAssistantAfterDictation();
  }
  function armNativeIOSDictation(){
    var input = $('mh2AiPrompt'); if(!input) return;
    nativeDictationArmed = true;
    nativeStartingValue = (input.value || '').trim();
    updateDictateUI(true, true);
    input.focus();
    input.setAttribute('placeholder', 'Use the iPad keyboard microphone, then pause.');
    clearTimeout(nativeDictationTimer);
    nativeDictationTimer = setTimeout(function(){ nativeDictationArmed = false; updateDictateUI(false); }, 15000);
  }
  function startDictation(){
    var input = $('mh2AiPrompt');
    if(isIOS()){
      armNativeIOSDictation();
      return;
    }
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ if(input){ input.focus(); input.setAttribute('placeholder','Type your request or use your device keyboard microphone.'); } return; }
    clearTimeout(listenTimeout); finalTranscript = '';
    recognition = new SR();
    recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=false; recognition.maxAlternatives=1;
    recognition.onresult = function(ev){
      var spoken = ev.results && ev.results[0] && ev.results[0][0] ? ev.results[0][0].transcript : '';
      finalTranscript = (spoken || '').trim();
      if(input && finalTranscript){ input.value = finalTranscript; input.focus(); }
      stopDictation(!!finalTranscript);
    };
    recognition.onerror = function(){ stopDictation(false); };
    recognition.onend = function(){ if(isListening) stopDictation(!!finalTranscript); else updateDictateUI(false); };
    isListening = true; updateDictateUI(true);
    try{ recognition.start(); }catch(e){ stopDictation(false); return; }
    listenTimeout = setTimeout(function(){ stopDictation(!!finalTranscript); }, 7000);
  }
  function bindAiInline(){
    var input=$('mh2AiPrompt'), send=$('mh2AiSendBtn'), dictate=$('mh2AiDictateBtn');
    document.querySelectorAll('[data-ai-prompt]').forEach(function(btn){ btn.addEventListener('click', function(){ if(input){ input.value=btn.getAttribute('data-ai-prompt')||''; input.focus(); }}); });
    if(send) send.addEventListener('click', function(){ sendToAssistant(); });
    if(input){
      input.addEventListener('keydown', function(e){ if((e.metaKey||e.ctrlKey)&&e.key==='Enter') sendToAssistant(); });

        if(!nativeDictationArmed) return;
        clearTimeout(nativeDictationTimer);

          var current = (input.value || '').trim();
          nativeDictationArmed = false;
          updateDictateUI(false);
          if(current && current !== nativeStartingValue){ finalTranscript = current; runAssistantAfterDictation(); }

    if(dictate) dictate.addEventListener('click', function(){
      if(nativeDictationArmed){ nativeDictationArmed=false; clearTimeout(nativeDictationTimer); updateDictateUI(false); return; }
      if(isListening) stopDictation(!!finalTranscript); else startDictation();
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', bindAiInline); else bindAiInline();

<script id="mh2-annual-approval-alert-hard-lock-v288">
(function(){
  function $(id){ return document.getElementById(id); }
  function esc(v){ return String(v == null ? '' : v).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];}); }
  function getSb(){
    try{ if(window.supabaseClient && typeof window.supabaseClient.from === 'function') return window.supabaseClient; }catch(e){}
    try{ if(window.sb && typeof window.sb.from === 'function') return window.sb; }catch(e){}
    try{ if(window.getSupabase){ var c=window.getSupabase(); if(c && typeof c.from === 'function') return c; } }catch(e){}
    return null;
  }
  function isUuid(v){ return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(String(v||'').trim()); }
  function selectedCommunity(){
    var sel=$('zummeeCommunitySelect');
    var id='', name='';
    if(sel){
      var raw=String(sel.value||'').trim();
      if(isUuid(raw)) id=raw;
      name=String(sel.options && sel.selectedIndex>=0 ? (sel.options[sel.selectedIndex].textContent||'') : '').trim();
    }
    if(!id){ try{ var vals=[localStorage.getItem('zummeeActiveCommunityId'),localStorage.getItem('activeCommunityId'),localStorage.getItem('currentCommunityId'),localStorage.getItem('zummee_selected_community_id')]; for(var vi=0;vi<vals.length;vi++){ if(isUuid(vals[vi])){ id=String(vals[vi]).trim(); break; } } }catch(e){} }
    if(!name){ try{ name=String(localStorage.getItem('currentCommunityName')||localStorage.getItem('zummeeCurrentCommunityName')||'').trim(); }catch(e){} }
    return {id:id,name:name};
  }
  function norm(v){ return String(v||'').toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' '); }
  function statusIsOpen(row){
    var st=String((row&&row.status)||'').toLowerCase().trim().replace(/[\s-]+/g,'_');
    if(!st) return true;
    if(st.indexOf('reject')>-1) return false;
    if(st.indexOf('mail')>-1) return false;
    if(st.indexOf('sent_to_admin')>-1) return false;
    if(st==='approved' || st==='complete' || st==='completed' || st==='closed') return false;
    if(st.indexOf('approved_ready')>-1) return false;
    return st.indexOf('pending')>-1 || st.indexOf('board')>-1 || st.indexOf('supervisor')>-1 || st.indexOf('approval')>-1 || st==='draft';
  }
  function parseWhen(row){
    var raw = row && (row.submitted_at || row.created_at || row.updated_at || row.created || row.date || '');
    raw=String(raw||'').trim();
    if(!raw) return null;
    var t=Date.parse(raw);
    if(isFinite(t)) return new Date(t);
    var m=raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
    m=raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(m) return new Date(Number(m[3]), Number(m[1])-1, Number(m[2]));
    return null;
  }
  function isOverdue(row){
    var d=parseWhen(row);
    if(!d || !isFinite(d.getTime())) return false;
    return (Date.now() - d.getTime()) >= (2*24*60*60*1000);
  }
  function matchesCommunity(row, ctx){
    if(!row) return false;
    var rid=String(row.community_id||row.communityId||'').trim();
    if(ctx.id && rid && rid===ctx.id) return true;
    var rname=norm(row.community_name||row.community||row.property_name||row.association_name||row.name);
    var cname=norm(ctx.name);
    return !!(cname && rname && cname===rname);
  }
  function paint(openCount, overdueCount, ctx){
    var el=$('mh2AlertApprovals');
    if(!el) return;
    ctx = ctx || {};
    var tone = overdueCount>0 ? 'is-urgent' : (openCount>0 ? 'is-attention' : 'is-good');
    var badge = overdueCount>0 ? (String(overdueCount)+' OVERDUE') : (openCount>0 ? (String(openCount)+' OPEN') : 'CLEAR');
    var copy = overdueCount>0
      ? (String(overdueCount)+' annual meeting approval item'+(overdueCount===1?' has':'s have')+' been open more than 2 days for '+(ctx.name||'the selected community')+'.')
      : (openCount>0 ? (String(openCount)+' annual meeting approval item'+(openCount===1?' is':'s are')+' still in progress for '+(ctx.name||'the selected community')+'.') : 'No active items');

    // v537: allow the first paint and any real community/data change, but do not rebuild
    // the Annual card DOM when the exact same community + payload is repainted by legacy timers.
    // This stops the visible text blink while preserving community switching.
    var communityKey = String(ctx.id || '') + '|' + String(ctx.name || '');
    var renderKey = JSON.stringify({ community: communityKey, tone: tone, badge: badge, copy: copy, open: openCount, overdue: overdueCount });
    if(window.__mh2AnnualApprovalLastRenderKey === renderKey){
      try{ window.__mh2AnnualApprovalDuplicatePaintBlocked = (window.__mh2AnnualApprovalDuplicatePaintBlocked || 0) + 1; }catch(_e){}
      return;
    }
    window.__mh2AnnualApprovalLastRenderKey = renderKey;

    el.classList.remove('is-urgent','is-attention','is-good');
    el.classList.add(tone);
    el.setAttribute('href', (window.mh2IsPrivileged ? 'annual_meeting_approvals.html' : 'annual_meeting_status.html'));
    el.innerHTML = '<div class="mh2-alert-top"><div class="mh2-alert-title">Annual meeting approvals</div><div class="mh2-alert-badge">'+esc(badge)+'</div></div><div class="mh2-alert-copy">'+esc(copy)+'</div>';
    try{ window.__mh2AnnualApprovalAlertDebug={community:ctx,open:openCount,overdue:overdueCount,paintedAt:new Date().toISOString(),renderKey:renderKey}; }catch(e){}
  }
  async function refreshAnnualAlert(){
    var sb=getSb();
    if(!sb) return;
    var ctx=selectedCommunity();
    try{
      var q=sb.from('annual_meeting_packet_requests').select('*').limit(200);
      if(ctx.id) q=q.eq('community_id', ctx.id);
      var res=await q;
      if(res && res.error) throw res.error;
      var rows=Array.isArray(res&&res.data)?res.data:[];
      if(!ctx.id && ctx.name) rows=rows.filter(function(r){ return matchesCommunity(r,ctx); });
      var open=rows.filter(statusIsOpen);
      var overdue=open.filter(isOverdue);
      paint(open.length, overdue.length, ctx);
      try{ window.__mh2AnnualApprovalRows=rows; window.__mh2AnnualApprovalOpenRows=open; window.__mh2AnnualApprovalOverdueRows=overdue; }catch(e){}
    }catch(e){
      try{ console.warn('[MH2] annual approval hard-lock failed', e); window.__mh2AnnualApprovalAlertError=e; }catch(_e){}
    }
  }
  window.mh2RefreshAnnualApprovalSmartAlert = refreshAnnualAlert;
  function schedule(){ setTimeout(refreshAnnualAlert,250); setTimeout(refreshAnnualAlert,1200); setTimeout(refreshAnnualAlert,3500); }
  document.addEventListener('DOMContentLoaded', function(){
    schedule();
    var sel=$('zummeeCommunitySelect');
    if(sel) sel.addEventListener('change', function(){ setTimeout(refreshAnnualAlert,150); setTimeout(refreshAnnualAlert,1000); });
    setInterval(refreshAnnualAlert, 15000);
  });
  if(document.readyState !== 'loading') schedule();
})();
</script>



<script id="zummee-v410k-app-context-auth-guard">
(function(){
  if(window.__ZUMMEE_V410K_APP_CONTEXT_AUTH_GUARD__) return;
  window.__ZUMMEE_V410K_APP_CONTEXT_AUTH_GUARD__ = true;
  var UUID_RE=/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  function readUserId(){
    var keys=['zummee_user_id_v1','zummeeUserId','activeUserId','currentUserId'];
    for(var i=0;i<keys.length;i++){
      try{
        var v=String(localStorage.getItem(keys[i])||sessionStorage.getItem(keys[i])||'').trim();
        if(UUID_RE.test(v)) return v;
      }catch(_e){}
    }
    return '';
  }
  window.validateZummeeSession = async function(){
    var localUserId=readUserId();
    var hasSession=false;
    try{
      var sb=window.supabaseClient||window.sb||(typeof window.ensureSupabaseSync==='function'?window.ensureSupabaseSync():null);
      if(sb&&sb.auth&&typeof sb.auth.getSession==='function'){
        var res=await sb.auth.getSession();
        hasSession=!!(res&&res.data&&res.data.session);
      }
    }catch(_e){}
    if(!hasSession && !localUserId){
      try{ window.location.href='login.html'; }catch(_e){}
      return false;
    }
    if(localUserId){
      try{
        ['zummee_user_id_v1','zummeeUserId','activeUserId','currentUserId'].forEach(function(k){
          localStorage.setItem(k,localUserId); sessionStorage.setItem(k,localUserId);
        });
      }catch(_e){}
    }
    return true;
  };
})();
</script>

<script id="zummee-v380-auth-ready-helper">

  window.zummeeWaitForAuthReady = async function(client, opts){
    opts = opts || {};
    var attempts = Number(opts.attempts || 24);
    var delay = Number(opts.delay || 125);
    if(!client || !client.auth || typeof client.auth.getSession !== 'function') return null;
    for(var i=0;i<attempts;i++){
      try{
        var res = await client.auth.getSession();
        var session = res && res.data && res.data.session;

      }catch(_e){}
      await new Promise(function(resolve){ setTimeout(resolve, delay); });

    return null;
  };

  function statusOf(row){

    return String((row&&(row.status||row.workflow_status||row.review_status))||md.status||md.workflow_status||md.review_status||'open').toLowerCase().trim();
  }
  function isCurrent(row){
    if(!row) return false;
    if(row.deleted_at||row.archived_at||row.completed_at||row.reviewed_at) return false;
    var st=statusOf(row);
    if(/reviewed|complete|completed|closed|archived|done|resolved|cancel|cancelled|reject|rejected|approved|converted|agenda|minutes|deleted|inactive/i.test(st)) return false;
    return true;
  }
  function isOverdue(row){
    var raw=row&&(row.due_date||row.review_due_date||row.deadline||(row.metadata&&row.metadata.due_date));
    if(!raw) return false;
    var d=new Date(String(raw).slice(0,10)+'T00:00:00');
    if(isNaN(d.getTime())) return false;
    var today=new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
    return d.getTime()<today.getTime();
  }
  function setText(id,value){var el=$(id); if(el) el.textContent=String(value);}
  function render(payload){
    payload=payload||{};
    var count=Number(payload.count)||0, overdue=Number(payload.overdue)||0;
    var ctx=context();
    var card=$('mh2AlertBoard');
    if(card){
      card.classList.remove('is-good','is-attention','is-urgent');
      card.classList.add(overdue?'is-urgent':(count?'is-attention':'is-good'));
      card.setAttribute('href','board_member_hub_v2.html'+(ctx.id?'?community_id='+encodeURIComponent(ctx.id):''));
      var title=card.querySelector('.mh2-alert-title'), badge=card.querySelector('.mh2-alert-badge'), copy=card.querySelector('.mh2-alert-copy');
      if(title) title.textContent=overdue?'Board review overdue':'Board review status';
      if(badge) badge.textContent=overdue?(overdue+' OVERDUE'):(count?'OPEN':'STABLE');
      if(copy) copy.textContent=overdue?(count+' current board item'+(count===1?'':'s')+' ready for review, '+overdue+' overdue.'):(count?(count+' current board item'+(count===1?'':'s')+' ready for review.'):'No current board items for review.');
    }
    setText('mh2BoardOverdueCount',count);
    setText('mh2BoardOverdueNote',count?('Needs review in '+(ctx.name||'selected community')+'.'):'Current board items for the selected community.');
    setText('mh2BoardItemsPill',count);
    setText('mh2BoardStatusPill',overdue?('Overdue '+overdue):(count?('Open '+count):'Clear'));
    try{ document.documentElement.setAttribute('data-zummee-smart-alerts-v426-ready','1'); }catch(e){}
    window.__ZUMMEE_V462_BOARD_SMART_LOCK__={ctx:ctx,count:count,overdue:overdue,source:payload.source||'notification_events'};
  }
  async function load(){
    var ctx=context(); if(!isUuid(ctx.id)){render({count:0,overdue:0,source:'no-community'}); return;}
    try{
      if(window.ZummeeBoardData&&typeof window.ZummeeBoardData.getBoardReviewItems==='function'){
        var shared=await window.ZummeeBoardData.getBoardReviewItems(ctx.id,{sb:client(),communityName:ctx.name});
        if(shared && !shared.error && Array.isArray(shared.rows)){ render({count:shared.rows.length,overdue:shared.rows.filter(isOverdue).length,source:'shared-notification_events'}); return; }
      }
    }catch(e){ console.warn('[v462 Manager Hub board smart card] shared board source skipped',e); }
    var sb=client(); if(!sb){render({count:0,overdue:0,source:'no-client'}); return;}
    try{
      var q=await sb.from('notification_events').select('id,title,message,metadata,created_at,event_type,community_id').eq('community_id',ctx.id).eq('event_type','board_item_submitted').order('created_at',{ascending:false}).limit(500);
      if(q.error) throw q.error;
      var rows=(Array.isArray(q.data)?q.data:[]).filter(isCurrent);
      render({count:rows.length,overdue:rows.filter(isOverdue).length,source:'notification_events-direct'});
    }catch(e){
      console.warn('[v462 Manager Hub board smart card] direct notification_events load failed',e);
      render({count:0,overdue:0,source:'notification_events-error'});
    }
  }
  function schedule(){
    // v500: disabled legacy Board Review writer. The shared manager-hub-data-layer.js owns this card.
    try{ console.info('[v500 board no-flash lock] legacy board smart writer disabled'); }catch(_e){}
  }
  window.__ZUMMEE_V462_BOARD_SMART_LOCK_DISABLED__ = true;
})();
</script>






<script id="zummee-native-community-controller-v605">
/*
  v605 native community controller.
  Long-term pattern:
  - page dropdown is hydrated by shared/community-state.js
  - no dropdown cloning
  - no bridge patches
  - no page-specific default-to-first-community behavior
*/
(function(){
  if(window.__ZummeeNativeCommunityControllerV605) return;
  window.__ZummeeNativeCommunityControllerV605 = true;

  function findCommunitySelect(){
    return document.getElementById("zummeeCommunitySelect") ||
      document.getElementById("maintenanceCommunitySelect") ||
      document.getElementById("communitySelect") ||
      document.querySelector('select[id*="community" i]');
  }

  function pageName(){
    var path = String(location.pathname || "").toLowerCase();
    if(path.indexOf("manager_hub") >= 0) return "manager-hub";
    if(path.indexOf("community_inspections") >= 0) return "community-inspections";
    if(path.indexOf("resident_work_orders") >= 0) return "work-orders";
    if(path.indexOf("maintenance_updates") >= 0) return "live-maintenance";
    return "zummee-page";
  }

  function refreshPageData(active){
    active = active || {};
    var id = active.id || active.community_id || "";
    var name = active.name || active.community_name || "";
    try{
      window.currentCommunityId = id;
      window.activeCommunityId = id;
      window.selectedCommunityId = id;
      if(name) window.currentCommunityName = name;
    }catch(_e){}

    // Manager Hub known surfaces.
    if(pageName() === "manager-hub"){
      [
        "bootstrapCommunityGlobals",
        "applyWeatherContext",
        "loadWeather",
        "loadWeatherForCommunity",
        "loadSmartAlerts",
        "refreshSmartAlerts",
        "loadActivityFeed",
        "refreshActivityFeed",
        "loadBoardSubmittedItems",
        "refreshBoardStatus",
        "loadApprovalSummary",
        "refreshAnnualAlert",
        "loadManagerHubData"
      ].forEach(function(fn){
        try{ if(typeof window[fn] === "function") window[fn](); }catch(_e){}
      });
    }

    // Work Orders / Maintenance / Inspections.
    [
      "loadWorkOrders",
      "loadUpdates",
      "loadEvents",
      "populateVendorSelect",
      "populateVendorDropdown",
      "loadInspectionData",
      "refreshVendorDropdownForActiveCommunity"
    ].forEach(function(fn){
      try{
        if(typeof window[fn] === "function"){
          if(fn === "loadWorkOrders") window[fn]({ clearSelection:true, liveRefreshReason:"community-v605" });
          else window[fn]();
        }
      }catch(_e){}
    });

    try{ window.dispatchEvent(new CustomEvent("zummee:community-changed", { detail:{ id:id, community_id:id, name:name, source:pageName() } })); }catch(_e){}
    try{ document.dispatchEvent(new CustomEvent("community:changed", { detail:{ community_id:id, communityId:id, name:name } })); }catch(_e){}
  }

  async function init(){
    if(!window.ZummeeCommunityState) return;
    var select = findCommunitySelect();

    // Not every page has a visible dropdown yet, but the page still needs active state.
    if(!select){
      var activeOnly = await window.ZummeeCommunityState.ensureActiveCommunity({ silent:true });
      if(activeOnly) refreshPageData(activeOnly);
      return;
    }

    await window.ZummeeCommunityState.bindNativeDropdown(select, {
      source: pageName(),
      onChange: refreshPageData
    });

    var active = window.ZummeeCommunityState.getActiveCommunity();
    if(active && active.id){
      if(select.value !== active.id){
        try{ select.value = active.id; }catch(_e){}
      }
      refreshPageData(active);
    }
  }

  function syncVisibleSelect(){
    try{
      if(!window.ZummeeCommunityState) return;
      var active = window.ZummeeCommunityState.getActiveCommunity();
      var select = findCommunitySelect();
      if(active && active.id && select && select.value !== active.id) select.value = active.id;
    }catch(_e){}
  }

  if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", init, { once:true });
  else setTimeout(init, 60);

  window.addEventListener("pageshow", function(){ setTimeout(init, 80); setTimeout(syncVisibleSelect, 350); });
  window.addEventListener("focus", syncVisibleSelect);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) syncVisibleSelect(); });
})();
</script>

<script>
/* v403 URL context lock: Manager Hub owns auth/community context and passes it explicitly. */
(function(){
  'use strict';
  if (window.__ZUMMEE_V403_BOARD_V2_ROUTE_LOCK__) return;
  window.__ZUMMEE_V403_BOARD_V2_ROUTE_LOCK__ = true;
  const UUID_RE=/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
  const isUuid=v=>UUID_RE.test(String(v||'').trim());
  const enc=v=>encodeURIComponent(String(v||''));
  function store(k,v){try{ if(v) { localStorage.setItem(k,v); sessionStorage.setItem(k,v); }}catch(e){}}
  function read(k){try{return String(localStorage.getItem(k)||sessionStorage.getItem(k)||'').trim();}catch(e){return '';}}
  function selectedCommunity(){
    const params=new URLSearchParams(location.search);
    let id=String(params.get('community_id')||params.get('cid')||'').trim();
    let name=String(params.get('community_name')||params.get('name')||'').trim();
    const sel=document.getElementById('zummeeCommunitySelect')||document.querySelector('select[data-community-select],#communitySelect,#communityDropdown,select');
    if(!isUuid(id) && sel){
      if(isUuid(sel.value)) id=String(sel.value).trim();
      const opt=sel.options&&sel.selectedIndex>=0?sel.options[sel.selectedIndex]:null;
      if(!name && opt) name=String(opt.textContent||'').trim();
    }
    if(!isUuid(id)){
      const vals=[window.currentCommunityId, window.currentCommunity&&window.currentCommunity.id, read('zummee_selected_community_id'), read('activeCommunityId'), read('zummeeActiveCommunityId'), read('currentCommunityId')];
      for(const v of vals){ if(isUuid(v)){ id=String(v).trim(); break; } }
    }
    if(!name){ name=read('zummeeCurrentCommunityName')||read('currentCommunityName')||read('activeCommunityName')||''; }
    return {id,name};
  }
  async function getUserId(){
    const stored=read('zummee_user_id_v1')||read('zummeeUserId')||read('activeUserId')||read('currentUserId');
    if(isUuid(stored)) return stored;
    try{
      const sb=window.supabaseClient||(window.getSupabase&&window.getSupabase())||null;
      const res=sb&&sb.auth&&await sb.auth.getSession();
      const id=res&&res.data&&res.data.session&&res.data.session.user&&res.data.session.user.id;
      if(isUuid(id)){ ['zummee_user_id_v1','zummeeUserId','activeUserId','currentUserId'].forEach(k=>store(k,id)); return id; }
    }catch(e){}
    return '';
  }
  async function persistAssignedCommunities(){
    try{
      const userId=await getUserId();
      if(!isUuid(userId)) return;
      let list=[];
      if(window.ZummeeDataLayer && typeof window.ZummeeDataLayer.getAssignedCommunities==='function'){
        list=await window.ZummeeDataLayer.getAssignedCommunities({userId:userId});
      }
      if(!Array.isArray(list) || !list.length){
        try{ list=JSON.parse(localStorage.getItem('zummee_assigned_communities_v1')||sessionStorage.getItem('zummee_assigned_communities_v1')||'[]'); }catch(_e){ list=[]; }
      }
      list=(Array.isArray(list)?list:[]).map(c=>({id:String(c.id||c.community_id||'').trim(), community_id:String(c.id||c.community_id||'').trim(), name:String(c.name||c.community_name||'').trim()})).filter(c=>isUuid(c.id));
      if(!list.length) return;
      localStorage.setItem('zummee_assigned_communities_v1', JSON.stringify(list));
      sessionStorage.setItem('zummee_assigned_communities_v1', JSON.stringify(list));
      window.__zummeeAssignedCommunities=list;
      console.info('[v403 board route] saved assigned communities', list.length);
    }catch(e){ console.warn('[v403 board route] could not persist assigned communities', e); }
  }
  async function boardV2Url(extra){
    const c=selectedCommunity(); const userId=await getUserId();
    if(isUuid(c.id)){ ['zummee_selected_community_id','activeCommunityId','zummeeActiveCommunityId','currentCommunityId'].forEach(k=>store(k,c.id)); }
    if(c.name){ ['zummeeCurrentCommunityName','currentCommunityName','activeCommunityName'].forEach(k=>store(k,c.name)); }
    const p=[];
    if(isUuid(c.id)) p.push('community_id='+enc(c.id));
    if(c.name) p.push('community_name='+enc(c.name));
    if(isUuid(userId)) p.push('user_id='+enc(userId));
    if(extra) p.push(String(extra).replace(/^\?/,''));
    return '/board_member_hub_v2.html' + (p.length?'?'+p.join('&'):'');
  }
  async function openBoardHub(extra){ window.location.href=await boardV2Url(extra); }
  window.goToBoardHub=function(){ openBoardHub(); };
  window.openBoardMemberHub=function(){ openBoardHub(); };
  function patchLinks(){
    document.querySelectorAll('a[href*="board_member_hub"],button[data-board-hub],button[data-open-board-hub]').forEach(el=>{
      if(el.__zummeeV400BoardPatched) return; el.__zummeeV400BoardPatched=true;
      if(el.tagName==='A') el.setAttribute('href','#');
      el.addEventListener('click', function(ev){
        const raw=String(el.getAttribute('href')||'');
        if(raw==='#'||/board_member_hub/.test(raw)){ ev.preventDefault(); ev.stopPropagation(); openBoardHub(raw.includes('#calendar')?'section=calendar':''); }
      }, true);
    });
    ['mh2AlertBoard','boardMemberHubCard'].forEach(id=>{ const a=document.getElementById(id); if(a&&a.tagName==='A') a.setAttribute('href','#'); });
  }
  document.addEventListener('DOMContentLoaded',()=>{ persistAssignedCommunities(); patchLinks(); setInterval(patchLinks,1500); });
  window.addEventListener('pageshow',()=>{ persistAssignedCommunities(); patchLinks(); });
})();
</script>
